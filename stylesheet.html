<style>

    /* --- Game & Bounty Banner Effects --- */
    .game-bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      animation: slowZoom 15s linear infinite alternate;
      z-index: 0;
    }
    
    .bounty-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.15;
      background-image: radial-gradient(#FFFFFF 1.5px, transparent 1.5px);
      background-size: 24px 24px;
      animation: drift 20s linear infinite;
      z-index: 0;
    }

    @keyframes slowZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }

    :root {
      /* Next-Gen Glass Tokens */
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-bg-dark: rgba(15, 18, 30, 0.8);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-border-dark: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(20px) saturate(180%);
      
      /* Google Play Store Theme (Default) */
      --play-green: #01875f;
      --play-green-hover: #006b4b;
      --play-green-light: rgba(1, 135, 95, 0.1);
      
      /* Vibrant Google Accents */
      --g-blue: #1A73E8;
      --g-red: #EA4335; 
      --g-yellow: #FBBC04; 
      --g-green: #34A853;
      
      /* Clean Backgrounds & Surfaces */
      --bg: #F8F9FA;
      --surface: #FFFFFF; 
      --surface-hover: #F1F3F4; 
      --surface-2: #E8EAED;
      
      /* Standard Google Text Colors */
      --text-main: #202124;
      --text-muted: #5F6368; 
      --text-hint: #80868B;
      
      /* Crisp Borders */
      --border: #DADCE0; 
      --border-strong: #BDC1C6;

      /* Premium Shadows */
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.12);
      
      --font-google: 'Google Sans', sans-serif;
      --font-display: 'Google Sans Display', sans-serif;
      --font-body: 'Roboto', sans-serif;
      
      /* Modern Radius */
      --radius-sm: 10px;
      --radius-md: 16px; 
      --radius-lg: 24px; 
      --radius-xl: 32px;
      
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --ticker-h: 36px;
      --header-h: 72px; 
      --tab-h: 56px;
    }

    body { 
      background-color: var(--bg);
      /* Note: Background image is handled by the Parallax Grid effect at the bottom of the stylesheet! */
    }

    body { 
      background-color: var(--bg); 
      /* Subtle scrolling diagonal candy stripes! */
      background-image: repeating-linear-gradient(45deg, rgba(255, 71, 133, 0.03) 0, rgba(255, 71, 133, 0.03) 15px, transparent 15px, transparent 30px);
      background-size: 42px 42px; 
      background-position: 0 0; 
      animation: drift 40s linear infinite;
    }

    @keyframes drift { 
      0% { background-position: 0 0; } 
      100% { background-position: -400px 400px; } 
    }
    /* --- CANDY POP THEME --- */

      --play-green-hover: #E0005E; 
      --play-green-light: rgba(255, 71, 133, 0.12);
      --g-blue: #42A5F5;
      --g-red: #FF5252; 
      --g-yellow: #FFCA28; 
      --g-green: #66BB6A;
      --bg: #FEF0F5;
      --surface: #FFFFFF; 
      --surface-hover: #FCE4EC;

      --radius-md: 18px; 
      --radius-lg: 24px; 
      --radius-xl: 32px;
    }

      background-image: repeating-linear-gradient(45deg, rgba(255, 71, 133, 0.03) 0, rgba(255, 71, 133, 0.03) 15px, transparent 15px, transparent 30px);

      animation: drift 40s linear infinite;
    }
    [data-theme="dark"] { --bg: #18191A; --surface: #242526; --surface-hover: #3A3B3C; --surface-2: #3A3B3C;
      --text-main: #E4E6EB; --text-muted: #B0B3B8; --text-hint: #6E7074; --border: #3A3B3C; --border-strong: #555; --shadow-sm: 0 1px 4px rgba(0,0,0,0.4); --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 36px rgba(0,0,0,0.7); --play-green: #3DBA8C; --play-green-hover: #5CE68B; --play-green-light: rgba(61,186,140,0.13);
    }

    [data-theme="kawaii"] { --bg: #FFF0F5; --surface: #FFFFFF; --surface-hover: #FFE4E1; --surface-2: #FFE4E1;
      --text-main: #5D4037; --text-muted: #8D6E63; --text-hint: #BCAAA4; --border: #FFB7B2; --border-strong: #FF9AA2;

    [data-theme="neon"] { --bg: #090014; --surface: #12002B; --surface-hover: #1E0047; --surface-2: #1E0047;
      --text-main: #00E5FF; --text-muted: #B026FF; --text-hint: #7A1EB8; --border: #B026FF; --border-strong: #00E5FF;
      --play-green: #FF007F; --play-green-hover: #FF3399; --play-green-light: rgba(255,0,127,0.2);
    }
    [data-theme="neon"] body { background: repeating-linear-gradient(0deg, #090014, #090014 2px, #12002B 2px, #12002B 4px); animation: none; }

    [data-theme="hacker"] { --bg: #000; --surface: #0a0a0a; --surface-hover: #111; --surface-2: #111; --text-main: #0f0; --text-muted: #0a0; --text-hint: #050;
      --border: #0f0; --border-strong: #0f0; --play-green: #0f0; --play-green-hover: #0c0; --play-green-light: rgba(0,255,0,0.15); font-family: 'Courier New', monospace !important;
    }
    [data-theme="hacker"] .app-icon { border: 1px solid #0f0; box-shadow: 0 0 10px #0f0; } [data-theme="hacker"] body { background-image: none; animation: none; }
    
    [data-theme="retro_crt"] { --bg: #1a120b; --surface: #2c1e11; --surface-hover: #3d2b18; --surface-2: #3d2b18; --text-main: #ffb000; --text-muted: #a67300; --text-hint: #704c00; --border: #a67300; --border-strong: #ffb000; --play-green: #ffb000; --play-green-hover: #cc8d00; --play-green-light: rgba(255,176,0,0.15);
    }
    [data-theme="retro_crt"]::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 9999; background-size: 100% 4px, 3px 100%; pointer-events: none; }
    [data-theme="retro_crt"] body { background-image: none; animation: none; }
    
    [data-theme="vvip"] { --bg: #050505; --surface: #0a0a0a; --surface-hover: #141414; --surface-2: #111111; --text-main: #F3E5AB; --text-muted: #8E7C5B; --text-hint: #5C4F33; --border: #D4AF37; --border-strong: #BF953F; --play-green: #D4AF37; --play-green-hover: #F3E5AB; --play-green-light: rgba(212, 175, 55, 0.15); --shadow-sm: 0 1px 4px rgba(212, 175, 55, 0.2); --shadow-md: 0 4px 16px rgba(212, 175, 55, 0.15);
    }
    [data-theme="vvip"] body { background-image: none; animation: none; }
    
    .tier-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:12px; display:inline-block; text-transform:uppercase; letter-spacing:0.5px; }
    .tier-basic { box-shadow: 0 0 0 3px var(--border) !important; }

    .tier-silver { box-shadow: 0 0 0 3px #C0C0C0, 0 0 12px rgba(192,192,192,0.8) !important; } .badge-silver { background: rgba(192,192,192,0.2); color: #a0a0a0; border: 1px solid #C0C0C0; }
    .tier-gold { box-shadow: 0 0 0 3px #FFD700, 0 0 15px rgba(255,215,0,0.9) !important; } .badge-gold { background: rgba(255,215,0,0.2); color: #d4af37; border: 1px solid #FFD700; }

    @keyframes pulsePlat { 0%, 100% { box-shadow: 0 0 0 3px #00E5FF, 0 0 10px rgba(0,229,255,0.5); } 50% { box-shadow: 0 0 0 3px #00E5FF, 0 0 25px rgba(0,229,255,1); } }
    .tier-diamond { box-shadow: 0 0 0 4px #b9f2ff, 0 0 30px #C589F9 !important; animation: pulseDia 1.5s infinite; background: linear-gradient(135deg, #01875F, #1A73E8) !important; color: white !important;} .badge-diamond { background: linear-gradient(135deg, rgba(26,115,232,0.2), rgba(197,137,249,0.2)); color: #C589F9; border: 1px solid #C589F9; }
    @keyframes pulseDia { 0%, 100% { box-shadow: 0 0 0 4px #b9f2ff, 0 0 15px #C589F9; } 50% { box-shadow: 0 0 0 4px #C589F9, 0 0 35px #b9f2ff; } }
    
    .hof-arena { background: linear-gradient(180deg, #0d0f1a 0%, #1a1a2e 100%); border-radius: var(--radius-xl); padding: 50px 20px 20px; position: relative; overflow: hidden; margin-bottom: 24px; box-shadow: inset 0 0 50px rgba(0,0,0,0.6), var(--shadow-md); display: flex; flex-direction: column; align-items: center; }
    .hof-ambient { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .float-emoji { position: absolute; font-size: 28px; opacity: 0.05; animation: floatUp linear infinite; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10%, 90% { opacity: 0.08; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }
    .podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-top: 30px; position: relative; z-index: 1; }
    .podium-step { display:flex; flex-direction:column; align-items:center; width:140px; position:relative; animation: slideUpPodium 0.8s cubic-bezier(0.1,1,0.2,1) backwards; }
    @keyframes slideUpPodium { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .podium-crown { position: absolute; top: -38px; font-size: 38px; filter: drop-shadow(0 0 12px #FFD700); animation: bobCrown 2.5s ease-in-out infinite; z-index: 5; }
    @keyframes bobCrown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .podium-name { font-size:15px; font-weight:700; color:#fff; margin-bottom:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-align:center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .podium-avatar { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:bold; font-family:var(--font-google); margin-bottom:-24px; z-index:2; position:relative; background:var(--surface-2); color:var(--text-main); }
    .podium-block { width:100%; border-radius:16px 16px 0 0; text-align:center; padding-top:34px; font-family:var(--font-google); font-weight:bold; box-shadow:var(--shadow-md); color:#111; display:flex; flex-direction:column; justify-content:flex-start; position: relative; overflow: hidden; }
    .podium-block::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent); transform: rotate(45deg); animation: glare 4s linear infinite; }
    @keyframes glare { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
    .podium-score { font-size:14px; margin-top:6px; opacity:0.95; }
    .podium-1 .podium-block { height:180px; background: linear-gradient(135deg, #b9f2ff, #C589F9); box-shadow: 0 0 40px rgba(197,137,249,0.5), inset 0 0 20px rgba(255,255,255,0.5); color:#fff; }
    .podium-2 .podium-block { height:130px; background: linear-gradient(135deg, #E0F7FA, #00E5FF); box-shadow: 0 0 20px rgba(0,229,255,0.4), inset 0 0 15px rgba(255,255,255,0.5); }
    .podium-3 .podium-block { height:100px; background: linear-gradient(135deg, #FFF8E1, #FFD700); box-shadow: 0 0 20px rgba(255,215,0,0.4), inset 0 0 15px rgba(255,255,255,0.5); }
    .flex-btn { position: absolute; top: 20px; right: 20px; z-index: 10; background: linear-gradient(135deg, #FFD700, #F57F17); color: #000; border: none; padding: 10px 20px; border-radius: 100px; font-weight: bold; font-family: var(--font-google); cursor: pointer; display: none; box-shadow: 0 4px 14px rgba(255,215,0,0.5); transition: transform 0.2s; font-size: 13px; }
    .flex-btn:hover { transform: scale(1.05); }
    #hofVIPModal .modal-card { background: linear-gradient(135deg, #1a1a2e, #0f0f1a); border: 2px solid #FFD700; box-shadow: 0 0 50px rgba(255,215,0,0.3); }

    .wallet-chip { display:flex; align-items:center; gap:6px; background:var(--surface-hover); padding:6px 12px; border-radius:100px; font-family:var(--font-google); font-weight:700; color:var(--text-main); cursor:pointer; transition:all var(--transition); border:1px solid var(--border); }
    .wallet-chip:hover { background:var(--surface-2); border-color:var(--play-green); transform:scale(1.02); }
    .bounty-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; margin-bottom:24px; box-shadow:var(--shadow-sm); }
    .bounty-header { display:flex; align-items:center; gap:8px; font-family:var(--font-google); font-size:16px; font-weight:bold; margin-bottom:12px; color:var(--play-green); }
    .bounty-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .bounty-row:last-child { border-bottom:none; padding-bottom:0; }
    .bounty-desc { font-size:13px; color:var(--text-main); font-weight:500; }
    .bounty-reward { font-size:12px; font-weight:bold; color:var(--play-green); background:var(--play-green-light); padding:3px 8px; border-radius:8px; }
    .bounty-meta { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .bounty-progress-wrap { flex: 1; margin-top: 8px; margin-right: 16px; }
    .bounty-progress-bg { background: var(--surface-2); height: 6px; border-radius: 3px; overflow: hidden; }
    .bounty-progress-fill { background: linear-gradient(90deg, var(--play-green), #34A853); height: 100%; width: 0%; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .bounty-text-prog { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 500; font-family: var(--font-google); }
    .bounty-claim-btn { background: var(--play-green); color: white; border: none; padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all var(--transition); text-transform: uppercase; letter-spacing: 0.5px; }
    .bounty-claim-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 2px 8px rgba(1,135,95,0.4); }
    .bounty-claim-btn:disabled { background: var(--surface-2); color: var(--text-hint); cursor: not-allowed; box-shadow: none; transform: none; }
    .bounty-claim-btn.claimed { background: transparent; color: var(--play-green); border: 1.5px solid var(--play-green-light); cursor: default; }

    .store-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; }
    .perk-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); transition:all var(--transition); cursor:pointer; display:flex; flex-direction:column; }
    .perk-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--g-yellow); }

    .perk-info { padding:16px; flex:1; display:flex; flex-direction:column; }
    .perk-title { font-family:var(--font-google); font-size:16px; font-weight:bold; margin-bottom:4px; }
    .perk-desc { font-size:13px; color:var(--text-muted); line-height:1.4; margin-bottom:16px; flex:1; }

    .perk-card:hover .perk-buy { background:var(--g-yellow); color:#000; }
    
    .settings-row { display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px; font-size: 14px; font-weight: 500; }
    .settings-slider { -webkit-appearance: none; width: 50%; height: 6px; border-radius: 3px; background: var(--surface-2); outline: none; }
    .settings-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--play-green); cursor: pointer; }
    
    .fb-select, .fb-textarea { width: 100%; display: block; padding: 12px 16px; margin-bottom: 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text-main); font-family: var(--font-body); font-size: 14px; outline: none; transition: all var(--transition); appearance: none; }
    .fb-select:focus, .fb-textarea:focus { border-color: var(--play-green); background: var(--surface); box-shadow: 0 0 0 3px var(--play-green-light); }
    .fb-textarea { min-height: 120px; resize: vertical; margin-bottom: 4px; line-height: 1.5; }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;} html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);color:var(--text-main);overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh;transition:background var(--transition),color var(--transition);}
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 32px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      position: sticky;
      top: var(--ticker-h);
      z-index: 1010;
      border-bottom: 1px solid var(--glass-border);
      height: var(--header-h);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }
    
    [data-theme="dark"] header {
      background: var(--glass-bg-dark);
      border-bottom-color: var(--glass-border-dark);
    }
    .logo-area{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:500;font-family:var(--font-google);cursor:pointer;color:var(--text-main);white-space:nowrap;flex-shrink:0;text-decoration:none;transition:opacity var(--transition);}
    .logo-area:hover{opacity:0.85;} .logo-area svg{width:28px;height:28px;flex-shrink:0;}
    .search-wrap {
      flex: 1;
      max-width: 600px;
      position: relative;
    }

      font-family: var(--font-google);

      outline: none;
      transition: all var(--transition);
    }

      color: white;
    }

      border-color: var(--g-blue);
      box-shadow: var(--shadow-md), 0 0 0 4px rgba(26, 115, 232, 0.1);
      width: 105%;
      margin-left: -2.5%;
    }
    
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }
    .search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;display:none;padding:2px;border-radius:50%;}
    .header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:auto;}
    .icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;transition:background var(--transition);} .icon-btn:hover{background:var(--surface-hover);}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--play-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-google);font-size:14px;cursor:pointer;text-transform:uppercase;transition:transform var(--transition),box-shadow var(--transition);flex-shrink:0;box-shadow:0 2px 8px rgba(1,135,95,0.3);} .avatar:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(1,135,95,0.4);}
    .tabs {
      display: flex;
      gap: 12px;
      padding: 12px 32px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);

    /* 2. 3D HOVER CARDS WITH GLOSSY GLARE */
    .app-card {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
      perspective: 1000px;
    }
    .app-icon-wrap {
      overflow: hidden; /* Contains the glare */
      border-radius: 26%;
      transform-style: preserve-3d;
      position: relative;
    }
    /* The Glare Ray */
    .app-icon-wrap::after {
      content: ''; 
      position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); 
      transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 5; pointer-events: none;
    }
    /* The 3D Lift */
    .app-card:hover {
      transform: translateY(-8px) scale(1.03) rotateX(4deg) rotateY(-3deg);

    .app-card:hover .app-icon-wrap::after { left: 200%; }
