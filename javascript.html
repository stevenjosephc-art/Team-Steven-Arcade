  'Cafe Tycoon': {
    cat: 'Strategy', engine: 'canvas', icon: 'https://play-lh.googleusercontent.com/hUwQi8a5g5C5K391wqRmMqIQkP2hk4m3d6gCGN0nutOzV28z7UlYohIfHrgnI5gRzA', dev: 'Brew Labs', rating: 4.9, installs: 'New!',
    
    init: function() {
      canvas.width = 960; canvas.height = 640;
      canvas.style.aspectRatio = '960/640'; canvas.style.maxHeight = '80vh';
      
      var self = this;
      if(!this.monitor) {
         this.monitor = setInterval(() => {
            if (activeGameTitle !== 'Cafe Tycoon') {
               canvas.style.aspectRatio = '700/480'; canvas.style.maxHeight = '65vh';
               clearInterval(self.monitor); self.monitor = null;
            }
         }, 500);
      }

      this.fc = 0; rawScore = 0; this.over = false;
      let minutes = activeDiff === 'Easy' ? 3 : (activeDiff === 'Medium' ? 2.5 : 2);
      this.timer = minutes * 60 * 60; 
      
      this.cash = 0;
      this.totalCash = 0;
      this.clickPower = 1;
      this.dps = 0; 
      
      // --- NEW: ANTI-CHEAT & OVERTIME VARS ---
      this.clicksThisSecond = 0;
      this.lastSecondTime = Date.now();
      this.overheated = 0; // If > 0, the cup is locked!
      this.overtimePurchases = 0; // Hard cap overtime
      this.overtimeCost = 2500;
      // --- NEW: CAFFEINE RUSH VARS ---
      this.combo = 0;
      this.rushTimer = 0;
      // ---------------------------------------
      
      this.popups = []; this.particles = []; this.steamBg = [];
      for(let i=0; i<40; i++) this.steamBg.push({x: Math.random()*960, y: Math.random()*640, s: Math.random()*15+10, v: Math.random()*1+0.5, o: Math.random()*0.15+0.05});

      // Fixed upgrade math: Removed the baseCost scaling bug
      this.upgrades = [
         { name: 'Tip Jar (Click +1)', baseCost: 25, cost: 25, count: 0, type: 'click', val: 1, c: '#A1887F', desc: 'Customers leave spare change' },
         { name: 'Barista (+2/sec)', baseCost: 100, cost: 100, count: 0, type: 'auto', val: 2, c: '#4FC3F7', desc: 'Brews coffee automatically' },
         { name: 'Espresso Machine (+15/sec)', baseCost: 1200, cost: 1200, count: 0, type: 'auto', val: 15, c: '#81C995', desc: 'Commercial grade brewing power' },
         { name: 'Drive-Thru (+80/sec)', baseCost: 15000, cost: 15000, count: 0, type: 'auto', val: 80, c: '#FBC02D', desc: 'Serves commuters on the go' },
         { name: 'Franchise (+400/sec)', baseCost: 180000, cost: 180000, count: 0, type: 'auto', val: 400, c: '#B026FF', desc: 'Open locations nationwide' },
         { name: 'Global Monopoly (+2k/sec)', baseCost: 2500000, cost: 2500000, count: 0, type: 'auto', val: 2000, c: '#FF3B30', desc: 'Coffee is now a global currency' }
      ];
      this.coreScale = 1.0;
      
      var hint = document.getElementById('gameCanvasHint');
      if(hint) { hint.innerHTML = '<b>SPACEBAR/CLICK</b> the Coffee to earn Cash | Buy upgrades to generate passive income!'; hint.style.display = 'block'; }
    },
    
    click: function(x, y) {
      if(this.over || isPaused) return;

      // 1. Click the Coffee Cup (Left Side)
      let cx = 260, cy = 360, cr = 140;
      if (Math.hypot(x - cx, y - cy) < cr) {
          
          // --- ANTI-AUTOCLICKER LOGIC ---
          let now = Date.now();
          if (now - this.lastSecondTime > 1000) { 
              this.clicksThisSecond = 0; 
              this.lastSecondTime = now; 
          }
          this.clicksThisSecond++;
          
          // If they click more than 15 times a second, lock the cup for 3 seconds!
          if (this.clicksThisSecond > 15) {
              if (this.overheated <= 0 && typeof showToast === 'function') {
                  showToast("🔥 CUP OVERHEATED! Slow down!");
                  if(typeof playSound === 'function') playSound('crash');
              }
              this.overheated = 180; // 3 seconds (60fps)
          }
          if (this.overheated > 0) return; // Prevent earning if locked
          // ------------------------------

          // --- CAFFEINE RUSH LOGIC ---
          let isRush = this.rushTimer > 0;
          let earned = isRush ? (this.clickPower * 3) : this.clickPower;
          
          if (!isRush) {
              this.combo += 2; // Build combo heat
              if (this.combo >= 100) {
                  this.rushTimer = 600; // 10 seconds at 60 FPS
                  this.combo = 0;
                  if(typeof showToast === 'function') showToast('⚡ CAFFEINE RUSH! 3x CLICK POWER!');
                  if(typeof playSound === 'function') playSound('win');
              }
          }

          this.cash += earned;
          this.totalCash += earned;
          this.coreScale = isRush ? 1.15 : 1.05; // Bigger pump during rush
          
          if(this.fc % 3 === 0 && typeof playSound === 'function') playSound('jump');
          this.popups.push({ x: x + (Math.random()*40-20), y: y - 20, txt: '+$'+earned, a: 1, c: isRush ? '#00E5FF' : '#FFD700' });
          if(typeof particlesEnabled !== 'undefined' && particlesEnabled) {
             for(let i=0; i<3; i++) this.particles.push({x: x, y: y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, c: isRush ? '#00E5FF' : '#EFEBE9'});
          }
          return;
      }

      // 2. Buy Upgrades (Right Side)
      let startY = 60;
      for(let i=0; i<this.upgrades.length; i++) {
          let u = this.upgrades[i];
          let bx = 520, by = startY + i * 92, bw = 400, bh = 80;
          if (x > bx && x < bx + bw && y > by && y < by + bh) {
              if (this.cash >= u.cost) {
                  if(typeof playSound === 'function') playSound('coin');
                  this.cash -= u.cost;
                  u.count++;
                  
                  if (u.type === 'click') this.clickPower += u.val;
                  else this.dps += u.val;
                  
                  // FIXED MATH: Classic 15% incremental scaling
                  u.cost = Math.floor(u.baseCost * Math.pow(1.15, u.count));
                  
                  if(typeof particlesEnabled !== 'undefined' && particlesEnabled) {
                     for(let p=0; p<15; p++) this.particles.push({x: bx + bw/2, y: by + bh/2, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, c: u.c});
                  }
              } else {
                  if(typeof playSound === 'function') playSound('crash');
              }
              return;
          }
      }

      // 3. Buy Overtime Check (With Hard Caps!)
      let timeBx = 30, timeBy = 135, timeBw = 180, timeBh = 45;
      if (x > timeBx && x < timeBx + timeBw && y > timeBy && y < timeBy + timeBh) {
          if (this.overtimePurchases >= 5) {
              if(typeof showToast === 'function') showToast('❌ Max Overtime Reached!');
              if(typeof playSound === 'function') playSound('crash');
              return;
          }
          if (this.cash >= this.overtimeCost) {
              if(typeof playSound === 'function') playSound('coin');
              this.cash -= this.overtimeCost;
              this.timer += 10 * 60; 
              this.overtimePurchases++;
              this.popups.push({ x: timeBx + timeBw/2, y: timeBy - 10, txt: '+10 SECONDS!', a: 1, c: '#4ADE80' });
              
              // Only scale 2.5x instead of 5.0x
              this.overtimeCost = Math.floor(this.overtimeCost * 2.5);
          } else {
              if(typeof playSound === 'function') playSound('crash');
              if(typeof showToast === 'function') showToast('❌ Need $' + this.overtimeCost.toLocaleString() + ' for Overtime!');
          }
          return;
      }
    },
    
    // QoL: Spacebar/Enter brewing
    handleKey: function(key) {
      if (this.over) return;
      if (key === ' ' || key === 'Spacebar' || key === 'Enter') {
          this.click(260, 360); 
      }
    },
    
    update: function() {
      if(this.over) return;
      this.fc++;
      this.timer--;

      // --- CAFFEINE RUSH TICKER ---
      if (this.rushTimer > 0) {
          this.rushTimer--;
      } else if (this.combo > 0 && this.fc % 4 === 0) {
          this.combo--; // Drain combo rapidly if they stop clicking!
      }

      // Generate passive income (60 frames per second = dps / 60 per frame)
      if (this.dps > 0) {
          let gain = this.dps / 60;
          this.cash += gain;
          this.totalCash += gain;
      }

      // Constantly sync total cash to rawScore for the Arcade wrapper!
      rawScore = Math.floor(this.totalCash);

      // Animations
      if(this.coreScale > 1.0) this.coreScale -= 0.005;
      
      this.popups.forEach(p => { p.y -= 1.5; p.a -= 0.02; });
      this.popups = this.popups.filter(p => p.a > 0);
      
      this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
      this.particles = this.particles.filter(p => p.life > 0);
      
      this.steamBg.forEach(b => { 
          b.y -= b.v; 
          b.x += Math.sin(this.fc * 0.05 + b.s) * 0.5; // Drift side to side
          if(b.y < -50) { b.y = 690; b.x = Math.random() * 960; }
      });
      
      if (this.timer <= 0) {
          this.over = true;
          if(typeof playSound === 'function') playSound('win');
          if(typeof particlesEnabled !== 'undefined' && particlesEnabled && typeof launchConfetti === 'function') launchConfetti();
          setTimeout(() => triggerGameOver('Cafe Franchised! Final Revenue: $' + Math.floor(this.totalCash).toLocaleString()), 1500);
      }
    },
    
    draw: function() {
      var W = 960, H = 640;
      
      // --- SCREEN SHAKE WRAPPER ---
      ctx.save(); 
      if (this.rushTimer > 0) {
          ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*8);
      }
      
      // --- 1. VISUAL EVOLUTION BACKGROUND ---
      let bgTop = '#3E2723', bgBot = '#1A0B08'; // Default: Cozy Mocha

      // Check highest tier upgrades first!
      if (this.upgrades[5].count > 0) {
          // Tier 6 (Global Monopoly): Villainous deep space & gold
          bgTop = '#1c0f45'; bgBot = '#000000'; 
      } else if (this.upgrades[4].count > 0) {
          // Tier 5 (Franchise): Sleek corporate skyscraper
          bgTop = '#1e293b'; bgBot = '#0f172a'; 
      } else if (this.upgrades[3].count > 0) {
          // Tier 4 (Drive-Thru): Sunset evening rush
          bgTop = '#451a03'; bgBot = '#1c1917'; 
      } else if (this.upgrades[2].count > 0) {
          // Tier 3 (Espresso Machine): Modern industrial cafe
          bgTop = '#064e3b'; bgBot = '#022c22'; 
      }

      var bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, bgTop); 
      bg.addColorStop(1, bgBot);
      ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
      // --------------------------------------

      // Ambient Steam
      this.steamBg.forEach(b => {
          ctx.fillStyle = `rgba(255, 255, 255, ${b.o})`;

      ctx.font = 'bold 20px "Google Sans"';

          ctx.fillStyle = this.fc % 10 < 5 ? '#00E5FF' : '#FFF';

      ctx.translate(260, 360);
      ctx.scale(this.coreScale, this.coreScale);
      
      ctx.shadowBlur = 40;
      ctx.shadowColor = '#FFD700';
      
      // Saucer
      ctx.fillStyle = '#D7CCC8';
      ctx.beginPath();
      ctx.ellipse(0, 100, 140, 40, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8D6E63';
      ctx.beginPath(); ctx.ellipse(0, 100, 100, 25, 0, 0, Math.PI*2); ctx.fill();
      
      // Cup Handle
      ctx.strokeStyle = '#EFEBE9'; ctx.lineWidth = 25; ctx.lineCap = 'round';
      ctx.beginPath();

      // Cup Body

      ctx.lineTo(100, -50);
      ctx.quadraticCurveTo(100, 90, 0, 90); ctx.quadraticCurveTo(-100, 90, -100, -50); ctx.fill();
      
      // Coffee Liquid Inside
      ctx.fillStyle = '#3E2723';
      ctx.beginPath(); ctx.ellipse(0, -50, 95, 25, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Latte Art / Foam
      ctx.fillStyle = '#D7CCC8';
      ctx.beginPath();
      ctx.ellipse(0, -50, 40, 10, 0, 0, Math.PI*2); ctx.fill();
      
      ctx.fillStyle = '#3E2723'; ctx.font = 'bold 36px "Google Sans"'; ctx.textAlign = 'center';
      ctx.textBaseline='middle';
      ctx.shadowBlur = 0;
      ctx.fillText('BREW', 0, 20);
      ctx.restore();

      // DPS Readout
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 22px "Google Sans"';
      ctx.fillText(`+ $${this.dps.toLocaleString()} / sec`, 260, 540);
      ctx.fillStyle = '#A0AAB2';
      ctx.font = '16px "Google Sans"';
      ctx.fillText(`+ $${this.clickPower.toLocaleString()} / click`, 260, 570);
      ctx.textAlign = 'left';
      
      // 4. Upgrade Shop
      let startY = 60;
      this.upgrades.forEach((u, i) => {
          let bx = 520, by = startY + i * 92, bw = 400, bh = 80;
          let canBuy = this.cash >= u.cost;
          let progress = Math.min(1, this.cash / u.cost); 
          
          ctx.globalAlpha = canBuy ? 1.0 : 0.6;
          
          // Base Background
          ctx.fillStyle = 'rgba(62, 39, 35, 0.8)';
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 12); ctx.fill(); 
          
          // QoL: Dynamic Progress Fill
          ctx.save();
          ctx.beginPath(); ctx.roundRect(bx, by, bw * progress, bh, 12); ctx.clip();
          ctx.fillStyle = canBuy ? 'rgba(129, 201, 149, 0.25)' : 'rgba(255, 255, 255, 0.05)';
          ctx.fill();
          ctx.restore();
          
          ctx.strokeStyle = u.c; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 12); ctx.stroke();
          
          ctx.fillStyle = u.c;
          ctx.beginPath(); ctx.roundRect(bx, by, 12, bh, {tl:12, bl:12}); ctx.fill();
          
          ctx.fillStyle = '#FFF'; ctx.font = 'bold 22px "Google Sans"';
          ctx.fillText(u.name, bx + 24, by + 30);
          
          ctx.fillStyle = '#D7CCC8'; ctx.font = '13px "Google Sans"';
          ctx.fillText(u.desc, bx + 24, by + 50);
          
          ctx.fillStyle = canBuy ? '#81C995' : '#FF3B30'; ctx.font = 'bold 16px "Google Sans"';
          ctx.fillText('Cost: $' + u.cost.toLocaleString(), bx + 24, by + 70);
          
          ctx.fillStyle = '#FFF'; ctx.font = 'bold 36px "Google Sans"'; ctx.textAlign='right';
          ctx.fillText(u.count, bx + bw - 20, by + 50); ctx.textAlign='left';
      });
      ctx.globalAlpha = 1.0;

      // 5. Particles & Popups
      this.particles.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.c;
          ctx.shadowBlur = 10; ctx.shadowColor = p.c;
          ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
      });
      ctx.shadowBlur = 0;
      
      this.popups.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.a); ctx.fillStyle = p.c; 
          ctx.font='bold 24px "Google Sans"'; ctx.textAlign='center';
          ctx.fillText(p.txt, p.x, p.y); ctx.textAlign='left';
      });
      ctx.globalAlpha=1.0;
      
      ctx.restore(); // <--- ADD THIS AT THE VERY END OF DRAW!
    }
  },

  'Candy Run': {
    cat: 'Arcade', engine: 'canvas', icon: '🍭', dev: 'Sweet Studios', rating: 4.9, installs: '500K',
    init: function() {
      canvas.width = 960; canvas.height = 640;
      canvas.style.aspectRatio = '960/640';
      canvas.style.maxHeight = '80vh';

      var self = this;
      if(!this.monitor) {
         this.monitor = setInterval(() => {
            if (activeGameTitle !== 'Candy Run') {
               canvas.style.aspectRatio = '700/480';
               canvas.style.maxHeight = '65vh';
               clearInterval(self.monitor); self.monitor = null;
            }
         }, 500);
      }

      // 1. ASSET PRE-LOADER
      this.assets = {
         'env': 'https://i.imgur.com/BPu6nWc.png?v=2', // <-- ?v=2 busts the cache!
         'char_0': 'https://i.imgur.com/COLjH79.png',
         'char_1': 'https://i.imgur.com/j8G11GF.png',
         'char_2': 'https://i.imgur.com/Eh6Eu4W.png',
         'char_3': 'https://i.imgur.com/JXmBXSU.png',
         'char_4': 'https://i.imgur.com/1tX7HNl.png'
      };
      
      this.charNames = ['Adventurer', 'Zombie', 'Soldier', 'Female', 'Default'];
      this.images = {};
      for (let key in this.assets) {
         this.images[key] = new Image();
         this.images[key].src = this.assets[key];
      }

      // 2. GAME STATE
      this.state = 'menu';
      this.selectedChar = 0;
      this.fc = 0; rawScore = 0; this.over = false;
      this.bgOffset = 0; this.dayCycle = 180; // Starts at sky blue

      // 3. PHYSICS & ADVANCED QOL
      this.baseSpeed = activeDiff === 'Easy' ? 6 : (activeDiff === 'Medium' ? 8 : 11);
      this.speed = this.baseSpeed;
      this.gravity = 0.65; // Slightly heavier for snappier jumps
      this.p = { x: 150, y: 100, w: 60, h: 80, vy: 0, grounded: false, jumps: 0 };
      
      this.coyoteTimer = 0;   // Grace period after running off an edge
      this.jumpBuffer = 0;    // Grace period for hitting jump too early
      this.magnetTimer = 0;   // Sugar Rush Powerup

      this.platforms = [];
      this.coins = [];
      this.hazards = [];
      this.particles = [];
      this.popups = [];

      this.platforms.push({ x: 0, y: 450, w: 1200, h: 200 });
      
      var hint = document.getElementById('gameCanvasHint');
      if(hint) { hint.innerHTML = '<b>SPACE / CLICK</b> to Jump | <b>ARROWS</b> to select Hero | Grab Blue Candies for Magnet!'; hint.style.display = 'block'; }
    },

    spawnPlatform: function() {
       let last = this.platforms[this.platforms.length - 1];
       let gap = Math.random() * 150 + 100 + (this.speed * 12);
       let w = Math.random() * 350 + 250;
       
       let y = last.y + (Math.random() * 180 - 90);
       if (y > 520) y = 520;
       if (y < 250) y = 250;

       let platX = last.x + last.w + gap;
       this.platforms.push({ x: platX, y: y, w: w, h: 640 - y + 100 });
       
       // SPAWN GENERATOR
       let spawnX = platX + 50;
       while (spawnX < platX + w - 50) {
           let r = Math.random();
           // 10% chance for a Peppermint Spike
           if (r > 0.90 && spawnX > platX + 100) {
               this.hazards.push({ x: spawnX, y: y - 40, w: 30, h: 40 });
               spawnX += 150; // Give space after hazard
           } 
           // 5% chance for a Sugar Rush Magnet (Blue Candy)
           else if (r > 0.85) {
               this.coins.push({ x: spawnX, y: y - 80, collected: false, type: 2 });
               spawnX += 80;
           }
           // 40% chance for regular Candies
           else if (r > 0.45) {
               this.coins.push({ x: spawnX, y: y - 60 - Math.random()*40, collected: false, type: Math.floor(Math.random() * 2) });
               spawnX += 60;
           } else {
               spawnX += 60; // Empty space
           }
       }
    },

    jump: function() {
       if (this.state === 'menu') {
           this.state = 'playing'; playSound('coin'); return;
       }
       if (this.state === 'playing') {
           this.jumpBuffer = 12; // Remember jump for 12 frames!
       }
    },

    click: function(mx, my) {
       if (this.over || isPaused) return;
       if (this.state === 'menu') {
           if (my > 250 && my < 350) {
               if (mx > 200 && mx < 300) { this.selectedChar = (this.selectedChar - 1 + 5) % 5; playSound('jump'); return; }
               if (mx > 660 && mx < 760) { this.selectedChar = (this.selectedChar + 1) % 5; playSound('jump'); return; }
           }
       }
       this.jump();
    },

    handleKey: function(k) {
       if (this.over || isPaused) return;
       if (this.state === 'menu') {
           if (k === 'ArrowLeft' || k === 'a' || k === 'A') { this.selectedChar = (this.selectedChar - 1 + 5) % 5; playSound('jump'); return; }
           if (k === 'ArrowRight' || k === 'd' || k === 'D') { this.selectedChar = (this.selectedChar + 1) % 5; playSound('jump'); return; }
       }
       if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W') {
           this.jump();
       }
    },

    update: function() {
       if (this.state !== 'playing') return;
       
       this.fc++;
       this.bgOffset += this.speed * 0.3;
       this.dayCycle += 0.05; // Slowly shift sky colors
       
       if (this.fc % 300 === 0) {
           this.speed += 0.5;
           this.popups.push({ x: this.p.x + 30, y: this.p.y - 20, txt: 'SPEED UP!', a: 1, vy: -1, c: '#FF3B30' });
       }
       if (this.fc % 10 === 0) rawScore += 5;

       // 1. QoL TIMERS (Coyote Time, Jump Buffer, Magnet)
       if (this.p.grounded) this.coyoteTimer = 8; else this.coyoteTimer--;
       if (this.jumpBuffer > 0) this.jumpBuffer--;
       if (this.magnetTimer > 0) this.magnetTimer--;

       // 2. QoL JUMP LOGIC
       if (this.jumpBuffer > 0) {
           if (this.coyoteTimer > 0 && this.p.jumps === 0) {
               // Normal/Coyote Jump
               this.p.vy = -12.5; this.p.grounded = false; this.coyoteTimer = 0; this.jumpBuffer = 0; this.p.jumps = 1;
               playSound('jump');
               if (particlesEnabled) for(let i=0; i<6; i++) this.particles.push({x: this.p.x + this.p.w/2, y: this.p.y + this.p.h, vx: (Math.random()-0.5)*4, vy: Math.random()*2, life: 1, c: '#FFF'});
           } else if (!this.p.grounded && this.p.jumps < 2) {
               // Double Jump
               this.p.vy = -11; this.p.jumps = 2; this.jumpBuffer = 0;
               playSound('jump');
               if (particlesEnabled) for(let i=0; i<6; i++) this.particles.push({x: this.p.x + this.p.w/2, y: this.p.y + this.p.h, vx: (Math.random()-0.5)*6, vy: Math.random()*4, life: 1, c: '#00E5FF'});
           }
       }

       // 3. APPLY GRAVITY
       this.p.vy += this.gravity;
       if (this.p.vy > 16) this.p.vy = 16;
       this.p.y += this.p.vy;

       // 4. PLATFORM COLLISION
       this.p.grounded = false;
       for (let i = 0; i < this.platforms.length; i++) {
           let plat = this.platforms[i];
           // Fair Hitbox: Allow slight clipping on the sides
           if (this.p.vy > 0 && this.p.x + this.p.w > plat.x + 15 && this.p.x < plat.x + plat.w - 15 && 
               this.p.y + this.p.h >= plat.y && this.p.y + this.p.h <= plat.y + 24) {
               this.p.y = plat.y - this.p.h;
               this.p.vy = 0;
               this.p.grounded = true;
               this.p.jumps = 0; 
           }
       }

       // 5. MOVE WORLD LEFT
       this.platforms.forEach(plat => plat.x -= this.speed);
       this.coins.forEach(c => c.x -= this.speed);
       this.hazards.forEach(h => h.x -= this.speed);

       // 6. CLEANUP & SPAWNING
       if (this.platforms[0].x + this.platforms[0].w < -100) this.platforms.shift();
       if (this.platforms[this.platforms.length - 1].x < 960) this.spawnPlatform();

       // 7. COIN COLLECTION & MAGNET
       for(let i=this.coins.length-1; i>=0; i--) {
           let c = this.coins[i];
           let pcx = this.p.x + this.p.w/2; let pcy = this.p.y + this.p.h/2;
           
           // Magnet Pull
           if (this.magnetTimer > 0) {
               let dx = pcx - c.x; let dy = pcy - c.y;
               let dist = Math.hypot(dx, dy);
               if (dist < 400) { c.x += (dx/dist)*12; c.y += (dy/dist)*12; }
           }

           let dist = Math.hypot(pcx - c.x, pcy - c.y);
           if (!c.collected && dist < 50) {
               c.collected = true;
               if (c.type === 2) {
                   // Blue Candy = Sugar Rush Magnet!
                   this.magnetTimer = 600; // 10 seconds
                   rawScore += 500;
                   playSound('win');
                   this.popups.push({ x: c.x, y: c.y, txt: 'SUGAR RUSH!', a: 1, vy: -1.5, c: '#00E5FF' });
               } else {
                   rawScore += 100;
                   playSound('pb');
                   this.popups.push({ x: c.x, y: c.y, txt: '+100', a: 1, vy: -1, c: '#FFD700' });
               }
               
               if (particlesEnabled) {
                   for(let p=0; p<8; p++) this.particles.push({x: c.x, y: c.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: c.type===2 ? '#00E5FF' : '#FFD700'});
               }
           }
           if (c.x < -50 || c.collected) this.coins.splice(i, 1);
       }

       // 8. HAZARD COLLISION (Peppermint Spikes)
       for(let i=0; i<this.hazards.length; i++) {
           let h = this.hazards[i];
           // Forgiving Hitbox: Player must be deeply inside the spike
           if (this.p.x + this.p.w - 15 > h.x && this.p.x + 15 < h.x + h.w &&
               this.p.y + this.p.h > h.y + 10 && this.p.y + 10 < h.y + h.h) {
               this.state = 'dead';
               playSound('crash');
               if(particlesEnabled) for(let p=0; p<30; p++) this.particles.push({x: this.p.x + 30, y: this.p.y + 40, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.5, c: '#FF3B30'});
               if (navigator.vibrate) navigator.vibrate([100,50,100]);
               setTimeout(() => triggerGameOver('Impaled on Peppermint!'), 1000);
           }
           if (h.x < -50) this.hazards.splice(i, 1);
       }

       // 9. FALL DEATH
       if (this.p.y > 640) {
           this.state = 'dead';
           playSound('crash');
           if (navigator.vibrate) navigator.vibrate([100,50,100]);
           setTimeout(() => triggerGameOver('Fell into the frosting!'), 1000);
       }

       // 10. CLEANUP EFFECTS
       this.particles.forEach((pt, i) => { pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.05; if(pt.life <= 0) this.particles.splice(i, 1); });
       this.popups.forEach(p => { p.y += p.vy; p.a -= 0.02; });
       this.popups = this.popups.filter(p => p.a > 0);
    },

    drawSprite: function(img, x, y, w, h) {
        if (!img || !img.complete || img.naturalWidth === 0 || img.src.includes('PASTE_')) {
            ctx.fillStyle = this.magnetTimer > 0 ? '#00E5FF' : '#FF9AA2'; 
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
            return;
        }

        let cols = 9; let rows = 3;
        let spriteW = img.naturalWidth / cols; let spriteH = img.naturalHeight / rows;
        let sx = 0, sy = 0;

        if (this.state === 'menu') {
            sy = 0; sx = 0; y += Math.sin(Date.now() * 0.005) * 5;
        } else if (!this.p.grounded) {
            sy = spriteH; sx = spriteW * 1;
        } else {
            sy = 0;
            // Run animation speeds up based on game speed!
            let runFrame = Math.floor(this.fc / (20 / this.speed)) % 3;
            sx = spriteW * (runFrame + 2);
        }

        // Magnet Aura Glow around player
        if (this.magnetTimer > 0 && this.state !== 'menu') {
            ctx.shadowBlur = 20; ctx.shadowColor = '#00E5FF';
            ctx.fillStyle = `rgba(0, 229, 255, ${Math.abs(Math.sin(this.fc * 0.2)) * 0.4})`;
            ctx.beginPath(); ctx.arc(x + w/2, y + h/2, 50, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.drawImage(img, sx, sy, spriteW, spriteH, x - 10, y - 10, w + 20, h + 10);
    },

    draw: function() {
       var W = 960, H = 640;
       
       // 1. Dynamic Sky (Day to Night Cycle)
       var skyHue = this.dayCycle % 360;
       var bg = ctx.createLinearGradient(0,0,0,H);
       bg.addColorStop(0, `hsl(${skyHue}, 60%, 75%)`); 
       bg.addColorStop(1, `hsl(${skyHue + 20}, 70%, 85%)`);
       ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

       // 2. Parallax Clouds
       ctx.fillStyle = 'rgba(255,255,255,0.4)';
       for(let i=0; i<4; i++) {
           let cx = ((i * 300) - this.bgOffset) % 1200;
           if (cx < -100) cx += 1200;
           ctx.beginPath(); ctx.arc(cx, 150 + (i%2*50), 40, 0, Math.PI*2); 
           ctx.arc(cx+40, 140 + (i%2*50), 50, 0, Math.PI*2);
           ctx.arc(cx+80, 150 + (i%2*50), 40, 0, Math.PI*2); ctx.fill();
       }

       // 3. Platforms
       let envImg = this.images['env'];
       let hasEnv = (envImg && envImg.complete && envImg.naturalWidth > 0 && !envImg.src.includes('PASTE_'));

       this.platforms.forEach(plat => {
           if (hasEnv) {
               const TILE = 70; 
               for (let tx = plat.x; tx < plat.x + plat.w; tx += TILE) {
                   let drawW = Math.min(TILE, plat.x + plat.w - tx);
                   let srcW = (drawW / TILE) * TILE; 
                   ctx.drawImage(envImg, 70, 0, srcW, TILE, tx, plat.y, drawW, TILE);
                   for(let ty = plat.y + TILE; ty < plat.y + plat.h; ty += TILE) {
                       let drawH = Math.min(TILE, plat.y + plat.h - ty);
                       let srcH = (drawH / TILE) * TILE;
                       ctx.drawImage(envImg, 70, 70, srcW, srcH, tx, ty, drawW, drawH);
                   }
               }
           } else {
               ctx.fillStyle = '#CBA87C'; ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
               ctx.fillStyle = '#FFD1DC'; ctx.fillRect(plat.x, plat.y, plat.w, 15);
           }
       });

       // 4. Hazards (Peppermint Spikes)
       this.hazards.forEach(h => {
           ctx.shadowBlur = 15; ctx.shadowColor = '#FF3B30';
           ctx.fillStyle = '#FFF';
           ctx.beginPath(); ctx.moveTo(h.x + h.w/2, h.y); ctx.lineTo(h.x + h.w, h.y + h.h); ctx.lineTo(h.x, h.y + h.h); ctx.fill();
           ctx.fillStyle = '#FF3B30'; // Red stripes
           ctx.beginPath(); ctx.moveTo(h.x + h.w/2, h.y + 10); ctx.lineTo(h.x + h.w - 5, h.y + h.h); ctx.lineTo(h.x + 5, h.y + h.h); ctx.fill();

                  this.clearT = 8; 
              } else {
                  let specials = [];
                  for(let r=0; r<G; r++) for(let c=0; c<G; c++) {
                      if(this.grid[r][c] && this.grid[r][c].special) specials.push({r,c});
                  }
                  if(specials.length > 0) {
                      this.state = 'clearing';
                      this.specialQueue = { cells: specials, specials: [] };
                      this.cachedMatches = specials;
                      this.clearT = 18;
                  } else {
                      this.isOver = true;
                      setTimeout(() => triggerGameOver('Level Complete! 🎉'), 2000);
                  }
              }
          }
          return;
      }

      if (this.state === 'idle') {
          this.idleTimer++;
          if (this.idleTimer > 240 && !this.hintMove) this.hintMove = this.findHintMove();
      } else { this.idleTimer = 0; this.hintMove = null; }

      if (this.state === 'swapping') {
        this.swapT--;
        if (this.swapT <= 0) {
          this.doSwap(this.swapA, this.swapB);
          
          var tA = this.grid[this.swapA.r][this.swapA.c];
          var tB = this.grid[this.swapB.r][this.swapB.c];
          var analysis = this.analyzeBoard();
          var isSpecialCombo = false;
          
          if (tA.special === 'bomb' && tB.special === 'bomb') {
              isSpecialCombo = true;
              for(let r=0; r<G; r++) for(let c=0; c<G; c++) analysis.cells.push({r,c});
          } else if ((tA.special === 'bomb' && tB.special) || (tB.special === 'bomb' && tA.special)) {
              isSpecialCombo = true;
              let otherColor = tA.special === 'bomb' ? tB.t : tA.t;
              for(let r=0; r<G; r++) for(let c=0; c<G; c++) {
                  if(this.grid[r][c].t === otherColor) {
                      this.grid[r][c].special = Math.random() > 0.5 ? 'striped_h' : 'striped_v';
                      analysis.cells.push({r,c});
                  }
              }
              analysis.cells.push(this.swapA, this.swapB);
          } else if ((tA.special && tB.special) && ((tA.special.includes('striped') && tB.special === 'wrapped') || (tB.special.includes('striped') && tA.special === 'wrapped'))) {
              isSpecialCombo = true;
              let center = this.swapB;
              for(let dr=-1; dr<=1; dr++) {
                  for(let i=0; i<G; i++) {
                      if(center.r+dr >= 0 && center.r+dr < G) analysis.cells.push({r: center.r+dr, c: i});
                      if(center.c+dr >= 0 && center.c+dr < G) analysis.cells.push({r: i, c: center.c+dr});
                  }
              }
          } else if (tA.special === 'bomb' || tB.special === 'bomb') {
              isSpecialCombo = true;
              var targetType = (tA.special === 'bomb') ? tB.t : tA.t;
              for(let r=0; r<G; r++) for(let c=0; c<G; c++) if(this.grid[r][c].t === targetType || this.grid[r][c].special === 'bomb') analysis.cells.push({r,c});
          }
          else if (tA.special && tB.special && tA.special.startsWith('striped') && tB.special.startsWith('striped')) {
             isSpecialCombo = true;
             for(let i=0; i<G; i++) { analysis.cells.push({r: this.swapB.r, c: i}); analysis.cells.push({r: i, c: this.swapB.c}); }
          }
          
          if (analysis.cells.length > 0 || isSpecialCombo) {
            playSound('coin');
            if(this.moves > 0) this.moves--; 
            this.state = 'clearing';
            this.specialQueue = analysis;
            this.cachedMatches = analysis.cells; 
            this.clearT = 18;
          } else {
            playSound('crash');
            this.state = 'swapback'; this.swapT = 12;
            var tmpA = this.swapA; this.swapA = this.swapB; this.swapB = tmpA;
          }
        }
        return;
      }
   
      if (this.state === 'swapback') {
        this.swapT--;
        if (this.swapT <= 0) { this.doSwap(this.swapA, this.swapB); this.swapA = this.swapB = null; this.sel = null; this.state = 'idle'; }
        return;
      }
   
      if (this.state === 'clearing') {
        this.clearT--;
        if (this.clearT === 14) {
          var data = this.specialQueue;
          var pts = 0; this.combo++;
          
          var extraCells = [];
          data.cells.forEach(function(m){
            var cell = self.grid[m.r][m.c];
            if (!cell || cell.t === null) return;
            if(cell.special === 'striped_h') { for(var c=0; c<G; c++) extraCells.push({r:m.r, c:c}); }
            if(cell.special === 'striped_v') { for(var r=0; r<G; r++) extraCells.push({r:r, c:m.c}); }
            if(cell.special === 'wrapped')   { for(var dr=-1; dr<=1; dr++) for(var dc=-1; dc<=1; dc++) if(m.r+dr>=0 && m.r+dr<G && m.c+dc>=0 && m.c+dc<G) extraCells.push({r:m.r+dr, c:m.c+dc}); }
          });
          data.cells = data.cells.concat(extraCells);

          var uniqueCells = []; var seen = new Set();
          data.cells.forEach(m => { if(!seen.has(m.r+','+m.c)) { seen.add(m.r+','+m.c); uniqueCells.push(m); } });
          
          uniqueCells.forEach(function(m){
            var cell = self.grid[m.r][m.c];
            if (!cell || cell.t === null) return;
            
            if (cell.jelly) {
                cell.jelly = false;
                pts += 100;
                self.spawnParticles(self.OX + m.c*(CS+GAP) + CS/2, self.OY + m.r*(CS+GAP) + CS/2, ['#FFF']);
            }
            
            pts += 25; 
            var cx = self.OX + m.c*(CS+GAP) + CS/2;
            var cy = self.OY + m.r*(CS+GAP) + CS/2;
            self.spawnParticles(cx, cy, self.PALETTES[cell.t] || null);
            cell.t = null; cell.special = null;
          });
          
          data.specials.forEach(function(s) {
            if(self.grid[s.r] && self.grid[s.r][s.c]) {
              self.grid[s.r][s.c] = { t: s.type, sh: s.type%6, yOff: 0, alpha: 1, jelly: self.grid[s.r][s.c].jelly, special: s.special };
              playSound('jump');
            }
          });
          
          var mult = Math.min(1 + (this.combo - 1) * 0.5, 4);
          var earned = Math.floor(pts * mult);
          rawScore += earned;
          if(earned > 0) {
            let words = ['NICE!', 'SWEET!', 'TASTY!', 'DIVINE!', 'SUGAR CRUSH!'];
            let juiceWord = this.combo > 1 ? words[Math.min(this.combo - 1, words.length - 1)] + ' ' : '';
            this.popups.push({ x: 480, y: 150, txt: juiceWord + '+' + earned, a: 1, vy: -1.5, c: '#FF1744' });
          }
        }
        if (this.clearT <= 0) { this.state = 'falling'; this.cachedMatches = null; }
        return;
      }
   
      if (this.state === 'falling') {
        var moving = false;
        
        for (var c = 0; c < G; c++) {
            var cell = this.grid[G-1][c];
            if (cell && cell.t === 6 && cell.yOff === 0) {
                cell.t = null;
                this.collectedCherry++;
                rawScore += 1000;
                playSound('pb');
                this.popups.push({ x: this.OX + c*(CS+GAP), y: this.OY + (G-1)*(CS+GAP), txt: '🍒 COLLECTED!', a: 1, vy: -2, c: '#FF1744' });
            }
        }

        for (var c = 0; c < G; c++) {
          for (var r = G - 1; r >= 0; r--) {
            if (this.grid[r][c] && this.grid[r][c].t === null) {
              for (var k = r - 1; k >= 0; k--) {
                if (this.grid[k][c] && this.grid[k][c].t !== null) {
                  this.grid[r][c] = this.grid[k][c];
                  this.grid[r][c].yOff = -(r - k) * (CS + GAP);
                  this.grid[k][c] = { t: null, sh: 0, yOff: 0, alpha: 1, jelly: this.grid[k][c].jelly, special: null };
                  break;
                }
              }
            }
          }
          
          for (var r = 0; r < G; r++) {
            if (this.grid[r][c] && this.grid[r][c].t === null) {
              var t = Math.floor(Math.random() * 6);
              if (this.objective === 'cherry' && Math.random() > 0.95 && this.collectedCherry < this.targetCherry) t = 6;
              this.grid[r][c] = { t: t, sh: t % 6, yOff: -(G - r) * (CS + GAP) * 1.5, alpha: 1, jelly: this.grid[r][c].jelly, special: null };
            }
          }
          
          for (var r = 0; r < G; r++) {
            var cell = this.grid[r][c];
            if (cell && cell.yOff < 0) {
              cell.yOff = Math.min(0, cell.yOff + Math.max(9, Math.abs(cell.yOff) * 0.35));
              if (cell.yOff < 0) moving = true;
            }
          }
        }
   
        if (!moving) {
          var analysis = this.analyzeBoard();
          if (analysis.cells.length > 0) {
            playSound('pb');
            this.state = 'clearing';
            this.specialQueue = analysis;
            this.cachedMatches = analysis.cells; 
            this.clearT = 18;
          } else {
            this.combo = 0; this.sel = null; this.state = 'idle';
            this.checkWinCondition();
            
            if(!this.hasPossibleMove() && !this.isOver) {
                showToast('No more moves! Reshuffling...', 2000);
                this.shuffleBoard();
            }
          }
        }
      }
    },

    // Premium Vector Star Drawing Function
    drawCustomStar: function(cx, cy, spikes, outerR, innerR, color, glow) {
        var rot = Math.PI / 2 * 3;
        var x = cx; var y = cy;
        var step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerR);
        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerR; y = cy + Math.sin(rot) * outerR; ctx.lineTo(x, y); rot += step;
            x = cx + Math.cos(rot) * innerR; y = cy + Math.sin(rot) * innerR; ctx.lineTo(x, y); rot += step;
        }
        ctx.lineTo(cx, cy - outerR);
        ctx.closePath();
        
        ctx.fillStyle = color;
        if(glow) { ctx.shadowBlur = 15; ctx.shadowColor = color; }
        ctx.fill(); ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#FFFFFF'; ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(cx, cy, innerR*0.6, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
    },
   
    drawCandy: function (cx, cy, type, shape, alpha, glowPulse, special) {
      if (type === null || type === undefined) return;
      var r = (this.CS / 2) - 4; 
      ctx.save(); ctx.globalAlpha = alpha !== undefined ? alpha : 1; ctx.translate(cx, cy);

      if (type === 6) {
          ctx.font = '36px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.4)';
          ctx.fillText('🍒', 0, 4);
          ctx.restore(); return;
      }

      var pal = this.PALETTES[type];
      ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 5;
      
      if (special === 'wrapped') { let wPulse = Math.sin(this.fc * 0.2) * 1.1; ctx.scale(1 + wPulse*0.05, 1 + wPulse*0.05); }
      if (glowPulse > 0 || special) { ctx.shadowColor  = special === 'bomb' ? '#FFFFFF' : pal[3]; ctx.shadowBlur   = special ? 20 : (10 + glowPulse * 15); ctx.shadowOffsetY = 0; }
   
      if(special === 'bomb') {
         ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
         var g = ctx.createRadialGradient(-r*0.28, -r*0.28, r*0.05, 0, 0, r*1.1);
         g.addColorStop(0.0, '#3E2723'); g.addColorStop(1.0, '#1a110f');
         ctx.fillStyle = g; ctx.fill();
         var sprinkles = ['#FF1744', '#00E676', '#2979FF', '#FFEA00', '#D500F9'];
         for(var s=0; s<6; s++) { ctx.fillStyle = sprinkles[s%5]; ctx.beginPath(); ctx.arc((Math.random()-0.5)*r*1.2, (Math.random()-0.5)*r*1.2, 3.5, 0, Math.PI*2); ctx.fill(); }
         ctx.restore(); return;
      }
  
      ctx.beginPath();
      switch (shape) {
        case 0: ctx.ellipse(0, 0, r, r*0.8, -Math.PI/6, 0, Math.PI*2); break;
        case 1: ctx.roundRect(-r*0.9, -r*0.9, r*1.8, r*1.8, r*0.4); break;
        case 2: ctx.arc(0, 0, r, 0, Math.PI * 2); break;
        case 3: ctx.moveTo(0, -r*1.1); ctx.lineTo(r, 0); ctx.lineTo(0, r*1.1); ctx.lineTo(-r, 0); ctx.closePath(); break;
        case 4: for (var i = 0; i < 10; i++) { var a = (Math.PI / 5) * i - (Math.PI / 2); var rad = i % 2 === 0 ? r * 1.1 : r * 0.6; if (i === 0) ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad); else ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad); } ctx.closePath(); break;
        case 5: ctx.ellipse(0, 0, r, r*0.75, 0, 0, Math.PI*2); break;
      }
   
      var g = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r*1.2);
      g.addColorStop(0.0, pal[1]); g.addColorStop(0.5, pal[0]); g.addColorStop(1.0, pal[2]); 
      ctx.fillStyle = g; ctx.fill();
  
      if (special === 'striped_h') { ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 4; for(let ly=-r*0.6; ly<=r*0.6; ly+=r*0.6) { ctx.beginPath(); ctx.moveTo(-r, ly); ctx.lineTo(r, ly); ctx.stroke(); } }
      if (special === 'striped_v') { ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 4; for(let lx=-r*0.6; lx<=r*0.6; lx+=r*0.6) { ctx.beginPath(); ctx.moveTo(lx, -r); ctx.lineTo(lx, r); ctx.stroke(); } }
      if (special === 'wrapped')   { ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, -r*0.8); ctx.lineTo(r*0.8, 0); ctx.lineTo(0, r*0.8); ctx.lineTo(-r*0.8, 0); ctx.closePath(); ctx.stroke(); }
  
      ctx.globalAlpha *= 0.8; ctx.beginPath();
      let shineX = -r*0.2 + Math.sin(this.fc * 0.05) * (r*0.1);
      ctx.ellipse(shineX, -r*0.4, r*0.35, r*0.15, -Math.PI/8, 0, Math.PI*2);
      ctx.fillStyle = '#FFFFFF'; ctx.fill();
      
      ctx.globalAlpha *= 0.4; ctx.beginPath();
      ctx.ellipse(r*0.2, r*0.4, r*0.3, r*0.1, Math.PI/8, 0, Math.PI*2);
      ctx.fillStyle = pal[1]; ctx.fill();
      
      ctx.restore();
    },
   
    draw: function () {
      var W = 960, H = 640;
      var G = this.GRID, CS = this.CS, GAP = this.GAP;
  
      // 1. Midnight Galaxy Background
      var bgGrd = ctx.createLinearGradient(0, 0, W, H);
      bgGrd.addColorStop(0, '#150824'); // Deep Space Navy
      bgGrd.addColorStop(1, '#3B0A45'); // Rich Violet
      ctx.fillStyle = bgGrd; ctx.fillRect(0, 0, W, H);

      // Glowing Ambient Orbs
      ctx.globalAlpha = 0.4;
      for(let i=0; i<4; i++) {
         let orbY = (i * 150 - (this.fc * 0.3)) % (H + 200);
         if (orbY < -100) orbY += H + 200;
         let orbX = (i * 200 + Math.sin(this.fc * 0.01 + i) * 50) % W;
         
         let orbGrad = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, 100);
         orbGrad.addColorStop(0, ['#FF1744','#00E676','#2979FF','#D500F9'][i%4]);
         orbGrad.addColorStop(1, 'rgba(0,0,0,0)');
         ctx.fillStyle = orbGrad;
         ctx.beginPath(); ctx.arc(orbX, orbY, 100, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1.0;
      
      var bw = G*CS + (G-1)*GAP; var bh = bw; var bx = this.OX; var by = this.OY;
  
      // 2. Dark Glass Board Container
      ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 15;
      ctx.fillStyle = 'rgba(20, 10, 40, 0.5)'; 
      ctx.beginPath(); ctx.roundRect(bx - 20, by - 20, bw + 40, bh + 40, 24); ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
      
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
      ctx.strokeRect(bx - 20, by - 20, bw + 40, bh + 40);
  
      for (var r = 0; r < G; r++) {
        for (var c = 0; c < G; c++) {
          var cx = this.OX + c * (CS + GAP);
          var cy = this.OY + r * (CS + GAP);
          
          if (this.grid[r][c].jelly) {
             ctx.fillStyle = 'rgba(255,255,255,0.2)';
             ctx.beginPath(); ctx.roundRect(cx - 2, cy - 2, CS + 4, CS + 4, 14); ctx.fill();
             ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
          }

          // Dark Drop Slots
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.beginPath(); ctx.roundRect(cx, cy, CS, CS, 14); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1; ctx.stroke();
        }
      }
      
      if (this.hintMove && this.state === 'idle') {
          let h1x = this.OX + this.hintMove.c1 * (CS + GAP); let h1y = this.OY + this.hintMove.r1 * (CS + GAP);
          let h2x = this.OX + this.hintMove.c2 * (CS + GAP); let h2y = this.OY + this.hintMove.r2 * (CS + GAP);
          let pulseAlpha = (Math.sin(this.fc * 0.15) + 1) * 0.2; 
          ctx.fillStyle = `rgba(255, 255, 255, ${pulseAlpha})`;
          ctx.beginPath(); ctx.roundRect(h1x, h1y, CS, CS, 14); ctx.fill();
          ctx.beginPath(); ctx.roundRect(h2x, h2y, CS, CS, 14); ctx.fill();
      }
   
      if (this.sel && this.state === 'idle') {
        var sx = this.OX + this.sel.c * (CS + GAP); var sy = this.OY + this.sel.r * (CS + GAP);
        var pulse = 0.6 + 0.4 * Math.sin(this.fc * 0.2);
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.6 + pulse * 0.4) + ')';
        ctx.lineWidth = 4; ctx.shadowColor = '#FFF'; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.roundRect(sx - 2, sy - 2, CS + 4, CS + 4, 16); ctx.stroke();
        ctx.shadowBlur = 0;
      }
   
      for (var r = 0; r < G; r++) {
        for (var c = 0; c < G; c++) {
          var cell = this.grid[r][c];
          if (!cell || cell.t === null) continue;
          
          var baseCX = this.OX + c * (CS + GAP) + CS / 2;
          var baseCY = this.OY + r * (CS + GAP) + CS / 2;
          var offX = 0, offY = 0;
          if ((this.state === 'swapping' || this.state === 'swapback') && this.swapA && this.swapB) {
            var prog = 1 - this.swapT / 12; var ease = 0.5 - Math.cos(prog * Math.PI) / 2;
            if (r === this.swapA.r && c === this.swapA.c) { offX = (this.swapB.c - this.swapA.c) * (CS + GAP) * ease; offY = (this.swapB.r - this.swapA.r) * (CS + GAP) * ease; } 
            else if (r === this.swapB.r && c === this.swapB.c) { offX = (this.swapA.c - this.swapB.c) * (CS + GAP) * ease; offY = (this.swapA.r - this.swapB.r) * (CS + GAP) * ease; }
          }
   
          var dropOff = cell.yOff || 0;
          var glow = (this.sel && this.sel.r === r && this.sel.c === c && this.state === 'idle') ? (0.5 + 0.5 * Math.sin(this.fc * 0.15)) : 0;
          var alpha = cell.alpha;
          if(this.state === 'clearing' && this.cachedMatches && this.cachedMatches.find(m => m.r===r && m.c===c)) { alpha = this.clearT > 9 ? (this.fc % 4 < 2 ? 0.3 : 1) : (this.clearT / 9); }
          this.drawCandy(baseCX + offX, baseCY + offY + dropOff, cell.t, cell.sh || cell.t % 6, alpha, glow, cell.special);
        }
      }
   
      this.particles.forEach(function(p){ 
          ctx.save(); ctx.globalAlpha = Math.max(0, p.a); 
          if(p.type === 'shockwave') { ctx.strokeStyle = p.col; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke(); } 
          else { ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = 10; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }
          ctx.restore(); 
      });
      this.popups.forEach(function(p){ ctx.save(); ctx.globalAlpha = Math.max(0, p.a); ctx.font = '900 36px "Google Sans", sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = p.c || '#FFFFFF'; ctx.shadowColor = p.c || 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 15; ctx.fillText(p.txt, p.x, p.y); ctx.strokeStyle='#FFF'; ctx.lineWidth=1; ctx.strokeText(p.txt, p.x, p.y); ctx.restore(); });
      
      // --- PREMIUM NEON UI SIDEBAR ---
      ctx.save();
      var uiX = this.OX + bw + 40;
      var uiY = this.OY;
      
      // Objective Panel
      ctx.fillStyle = 'rgba(20, 10, 40, 0.6)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(uiX, uiY, 210, 100, 16); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#FF9100'; ctx.textAlign = 'center'; ctx.font = '900 16px "Google Sans"';
      
      if (this.objective === 'score') {
          ctx.fillText('TARGET SCORE', uiX + 105, uiY + 30);
          ctx.fillStyle = '#FFFFFF'; ctx.font = '900 36px "Google Sans"';
          ctx.fillText(this.targetScore.toLocaleString(), uiX + 105, uiY + 75);
      } else if (this.objective === 'jelly') {
          ctx.fillText('CLEAR JELLY', uiX + 105, uiY + 30);
          let jCount = 0; for(let r=0; r<G; r++) for(let c=0; c<G; c++) if(this.grid[r][c].jelly) jCount++;
          ctx.fillStyle = '#FFFFFF'; ctx.font = '900 36px "Google Sans"';
          ctx.fillText(jCount + ' Left', uiX + 105, uiY + 75);
      } else if (this.objective === 'cherry') {
          ctx.fillText('COLLECT CHERRIES', uiX + 105, uiY + 30);
          ctx.fillStyle = '#FFFFFF'; ctx.font = '900 36px "Google Sans"';
          ctx.fillText(`${this.collectedCherry} / ${this.targetCherry} 🍒`, uiX + 105, uiY + 75);
      }

      // Moves Panel
      ctx.fillStyle = 'rgba(20, 10, 40, 0.6)';

            if (t0 < minDist) {
                minDist = t0;
                hit = b;
            }
        }

        // 1. Aiming line to impact point
        let impactX = this.cue.x + rayX * (hit ? minDist : 300);
        let impactY = this.cue.y + rayY * (hit ? minDist : 300);

        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.cue.x, this.cue.y);
        ctx.lineTo(impactX, impactY);
        ctx.stroke();

        if (hit) {
            // 2. Ghost Ball
            ctx.setLineDash([]);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.arc(impactX, impactY, this.ballRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 3. Target Ball Projection
            let targetAngle = Math.atan2(hit.y - impactY, hit.x - impactX);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.moveTo(hit.x, hit.y);
            ctx.lineTo(hit.x + Math.cos(targetAngle) * 100, hit.y + Math.sin(targetAngle) * 100);

            let cueDeflectAngle = targetAngle + Math.PI / 2;

    aiMove: function() {
        if (!this.isAiTurn) return;

        let targets = this.balls.filter(b => b.type !== 'cue');
        if (targets.length === 0) return;

        let bestShot = null;
        let maxScore = -1000;

        for (let t of targets) {
            for (let p of this.pockets) {
                // Angle needed to hit target towards pocket
                let targetToPocket = Math.atan2(p.y - t.y, p.x - t.x);
                // Position of ghost ball to achieve this
                let gx = t.x - Math.cos(targetToPocket) * this.ballRadius * 2;
                let gy = t.y - Math.sin(targetToPocket) * this.ballRadius * 2;

                let cueToGhost = Math.atan2(gy - this.cue.y, gx - this.cue.x);
                let dist = Math.hypot(gx - this.cue.x, gy - this.cue.y);
