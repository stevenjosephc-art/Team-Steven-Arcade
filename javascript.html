function buyItem(itemName, cost) {
  if (isPurchasing) return;
  
  // Summon the custom Confirmation Modal
  showVvipModal(
    'Confirm Purchase',
    `Are you ready to spend <b>${cost} 🎟️</b> to secure the <b>${itemName}</b>?<br><br><span style="font-size:12px;color:#8E7C5B;">A digital receipt will be sent directly to your email.</span>`,
    function() {
      // This block only runs IF they click "Confirm Purchase"
      isPurchasing = true; 
      showToast('Processing transaction...');
      
      google.script.run.withSuccessHandler(function(res){
        isPurchasing = false;
        if(res && res.success){ 
          var gTkts = document.getElementById('globalTicketCount');
          if (gTkts) gTkts.textContent = res.newBalance; 
          var uiTkts = document.getElementById('uiTickets'); 
          if (uiTkts) uiTkts.textContent = res.newBalance; 
          
          if(typeof launchConfetti === 'function') launchConfetti();
          
          // Summon the custom Success Modal!
          showVvipModal('Purchase Successful! 🎉', `You have successfully acquired the <b>${itemName}</b>.<br><br>Your remaining balance is ${res.newBalance} 🎟️. Please check your email for fulfillment details.`, null, true);
          
        } else { 
          // Summon the custom Error Modal
          showVvipModal('Transaction Failed', '❌ ' + (res.message || 'Server error.'), null, true);
        }
      }).withFailureHandler(function(){ 
        isPurchasing = false; 
        showVvipModal('Network Error', '❌ Transaction failed. Please check your connection and try again.', null, true);
      }).purchaseItem(itemName, cost);
    }
  );
}

    }, 1500);
  }
}

// --- 5-STAR UNIVERSAL BOUNTY ENGINE ---
function getTodayBounties() {
  const masterBounties = [
    // TIER 1 (10k Pts) - Quick Tasks
    { tier: 1, key: 'gamesPlayed', desc: 'Play 3 different games today.', label: '+10k Pts', pts: 10000, max: 3, unit: 'Games' },
    { tier: 1, key: 'blackjackWin', desc: 'Win 3 hands of Imperial 21.', label: '+10k Pts', pts: 10000, max: 3, unit: 'Wins' },
    { tier: 1, key: 'slotSpins', desc: 'Spin Sovereign Gold Slots 25 times.', label: '+10k Pts', pts: 10000, max: 25, unit: 'Spins' },

    // TIER 2 (25k Pts) - Moderate Challenge
    { tier: 2, key: 'baccaratWin', desc: 'Defeat the Monaco Banker 15 times.', label: '+25k Pts', pts: 25000, max: 15, unit: 'Wins' },
    { tier: 2, key: 'arcadeScore', desc: 'Score 100,000 points in Arcade Action.', label: '+25k Pts', pts: 25000, max: 100000, unit: 'Pts' },
    { tier: 2, key: 'casinoWager', desc: 'Wager 100,000 points in the Casino.', label: '+25k Pts', pts: 25000, max: 100000, unit: 'Pts' },

    // TIER 3 (1 Ticket 🎟️) - VIRTUALLY IMPOSSIBLE (Zero Points involved)
    { tier: 3, key: 'puzzle', desc: 'Reach the 2048 tile 10 separate times.', label: '+1 Ticket 🎟️', pts: 500000, max: 10, unit: 'Times' },
    { tier: 3, key: 'tetris', desc: 'Clear a Tetris (4 lines at once) 100 times.', label: '+1 Ticket 🎟️', pts: 500000, max: 100, unit: 'Clears' },
    { tier: 3, key: 'derbyWin', desc: 'Guess the winning Derby horse 250 times.', label: '+1 Ticket 🎟️', pts: 500000, max: 250, unit: 'Wins' }
  ];
  
  var today = new Date().toDateString(); let seed = 0;
  for (let i = 0; i < today.length; i++) seed += today.charCodeAt(i);
  
  return [
    masterBounties.filter(b => b.tier === 1)[seed % 3], 
    masterBounties.filter(b => b.tier === 2)[(seed + 1) % 3], 
    masterBounties.filter(b => b.tier === 3)[(seed + 2) % 3]
  ];
}

      </div>
      <div style="margin-top: auto;">
        <div style="background: var(--surface-2); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px;">
          <div id="fillBounty${btnNum}" style="background: linear-gradient(90deg, var(--play-green), #34A853); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);"></div>

function renderBounties(state) {
  var todayBounties = getTodayBounties();
  var hasUnclaimed = false; 
  
  todayBounties.forEach(function(b, i) {
    var btnNum = i + 1;
    var current = (b.key === 'gamesPlayed') ? (state.gamesPlayed || []).length : (state[b.key] || 0);
    var pct = Math.min(100, (current / b.max) * 100);
    
    var fill = document.getElementById('fillBounty' + btnNum);
    var txt  = document.getElementById('textBounty' + btnNum);
    var btn  = document.getElementById('btnBounty' + btnNum);
    
    if (fill) fill.style.width = pct + '%';
    if (txt)  txt.textContent = current.toLocaleString() + ' / ' + b.max.toLocaleString();
    if (btn) {
      var isClaimed = state.claimed && state.claimed[i];
      btn.disabled  = isClaimed || current < b.max;
      btn.textContent = isClaimed ? 'Claimed ✓' : (current >= b.max ? 'Claim!' : 'Claim');
      btn.className = 'bounty-claim-btn' + (isClaimed ? ' claimed' : '');
      if (!isClaimed && current >= b.max) hasUnclaimed = true;
    }
  });

  const header = document.querySelector('#bountyCard .category-title');
  if (header) {
    if (hasUnclaimed) {
      header.innerHTML = `<span>🎯 Daily Bounties</span> <span style="display:inline-block; width:8px; height:8px; background:#FF3B30; border-radius:50%; box-shadow:0 0 8px #FF3B30; animation:pulseAura 1.5s infinite;"></span>`;
    } else {
      header.innerHTML = `<span>🎯 Daily Bounties</span> <span style="font-size: 12px; color: var(--text-muted); font-weight: 500;">(Resets at Midnight)</span>`;
    }
  }
}

function initBounties() {
  var today = new Date().toDateString(); 
  var state = {};
  
  // 1. Safely parse local storage
  try {
    state = JSON.parse(localStorage.getItem('arcade_bounties')) || {};
  } catch(e) {
    state = {}; 
  }
  
  if(state.date !== today || !state.claimed || !state.gamesPlayed) {
    state = { date: today, gamesPlayed: [], tetris: 0, puzzle: 0, arcadeScore: 0, blackjackWin: 0, derbyWin: 0, casinoWager: 0, slotSpins: 0, baccaratWin: 0, claimed: [false, false, false] };
    localStorage.setItem('arcade_bounties', JSON.stringify(state));
  }
  
  // 3. FAILSAFE: Wrap the UI render in a try/catch so a visual bug never stops the app from booting
  try {
     renderDailyBounties();
     renderBounties(state);
  } catch(e) {
     console.warn("Bounty render failed, bypassing to save app boot.", e);
  }
}

function logBountyProgress(key, amount) {
  var state = null;
  try {
     state = JSON.parse(localStorage.getItem('arcade_bounties')); 
  } catch(e) {}
  
  if(!state) return;
  
  if(key === 'gamesPlayed') { if(state.gamesPlayed.indexOf(amount) === -1) state.gamesPlayed.push(amount); } 
  else { state[key] = (state[key] || 0) + amount; }
  
  localStorage.setItem('arcade_bounties', JSON.stringify(state));
  renderDailyBounties();
  renderBounties(state);
}

function claimBounty(id, reward) {
  var state = null;
  try {
     state = JSON.parse(localStorage.getItem('arcade_bounties')); 
  } catch(e) {}
  
  if(!state) return;

  // Anti-Spam: Stop them if they already claimed it locally
  if (state.claimed[id - 1]) {
      showToast('❌ Already claimed today!');
      return;
  }

  // Immediately disable the button so they can't double-click while it loads
  var btn = document.getElementById('btnBounty' + id);
  if(btn) { btn.disabled = true; btn.textContent = 'Claiming...'; }

  // Ping the server to verify and pay out
  google.script.run.withSuccessHandler(function(res) {
    if (res && res.success) {
      
      // 1. Update live balances if the server returns them
      if (res.tickets !== undefined) {
         document.getElementById('globalTicketCount').textContent = res.tickets;
         var uiTkts = document.getElementById('uiTickets'); if(uiTkts) uiTkts.textContent = res.tickets;
      }
      if (res.unspent !== undefined) {
         var uiPts = document.getElementById('uiPoints'); if(uiPts) uiPts.textContent = res.unspent.toLocaleString();
      }

      // 2. THE LOCKDOWN: Permanently mark it as claimed in local storage
      state.claimed[id - 1] = true;
      localStorage.setItem('arcade_bounties', JSON.stringify(state));

      // 3. Update the UI to show the grayed-out "Claimed ✓" state
      renderDailyBounties();
      renderBounties(state);
      showToast('🎁 Bounty Claimed! Reward added.');
      if(typeof launchConfetti === 'function') launchConfetti();

    } else {
      // If the Pit Boss (server) rejected it because they already claimed it on another device
      showToast('❌ ' + (res.message || 'Transaction failed.'));
      
      if (res.message && res.message.includes('already claimed')) {
          // Force the local lockdown anyway to fix their screen
          state.claimed[id - 1] = true;
          localStorage.setItem('arcade_bounties', JSON.stringify(state));
      }
      
      // Reset the button visual state
      renderDailyBounties();
      renderBounties(state);
    }
  }).claimBountyReward(id, reward);
}

function updateExpUI(totalXP, perfMult) {
  let safeXP = totalXP || 0;
  
  // Use pure XP for the level curve
  let playerLvl = Math.floor(Math.sqrt(safeXP / 1500)) + 1;
  currentPlayerLevel = playerLvl;
  enforceLevelGates();
  let prevLvlPts = Math.pow(playerLvl - 1, 2) * 1500;
  let nextLvlPts = Math.pow(playerLvl, 2) * 1500;
  let expProgress = ((safeXP - prevLvlPts) / (nextLvlPts - prevLvlPts)) * 100;
  
  let lvlEl = document.getElementById('uiLevel');
  let fillEl = document.getElementById('uiExpFill');
  let badgeEl = document.getElementById('uiPerfBadge');
  
  if (lvlEl) lvlEl.textContent = playerLvl;
  if (fillEl) fillEl.style.width = Math.min(100, Math.max(0, expProgress)) + '%';
  
  if (badgeEl && perfMult) {
    if (perfMult > 1.0) {
       badgeEl.style.display = 'inline-block';
       badgeEl.textContent = '🔥 ' + perfMult + 'x';
    } else {
       badgeEl.style.display = 'none';
    }
  }
}

var pixieCanvas = document.createElement('canvas');
pixieCanvas.id = 'pixieCanvas';
pixieCanvas.style.cssText = 'position:fixed; top:0; left:0; pointer-events:none; z-index:9999; display:block !important; background:transparent !important; max-height:none !important; aspect-ratio:auto !important;';
document.body.appendChild(pixieCanvas);
var pixieCtx = pixieCanvas.getContext('2d');
var pixies = [];

function resizePixie() {
  pixieCanvas.width = window.innerWidth;
  pixieCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizePixie);

window.addEventListener('mousemove', function(e) {
  // THE FIX: If disabled in settings, do absolutely nothing.
  if (!particlesEnabled) return; 
  
  var theme = document.documentElement.getAttribute('data-theme') || 'light';
  
  for(var i = 0; i < 2; i++) {
    var p = {
      x: e.clientX, y: e.clientY,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() * 1.5) + 0.5,
      life: 1.0, size: Math.random() * 3 + 1.5,
      theme: theme
    };

    // Modify physics & visuals based on the active theme!
    if (theme === 'hacker') {
       p.char = Math.random() > 0.5 ? '0' : '1';
       p.color = '#00FF00'; p.vy = Math.random() * 2 + 1; p.vx = 0;
    } else if (theme === 'kawaii') {
       p.char = ['✨','🌸','💖'][Math.floor(Math.random()*3)];
       p.color = '#FFB7B2'; p.size = 12 + Math.random()*8;
       p.vy = (Math.random() * -1) - 0.5; // Float up gently
    } else if (theme === 'neon') {
       p.color = Math.random() > 0.5 ? '#00E5FF' : '#FF007F';
       p.size = 3 + Math.random() * 3;
    } else if (theme === 'retro_crt') {
       p.color = '#FFB000'; p.size = 4 + Math.random()*4;
    } else if (theme === 'vvip') {
       p.color = '#D4AF37'; p.vy = (Math.random() * -2) - 0.5; // Float up fast
    } else if (theme === 'dark') {
       p.color = Math.random() > 0.5 ? '#42A5F5' : '#8AB4F8';
    } else if (theme === 'candy') {
       p.color = Math.random() > 0.5 ? '#FF4785' : '#FA8BFF'; // Pink particles for Candy
    } else { // Light / Play Store Default
       p.color = ['#01875f', '#1A73E8', '#FBBC04', '#EA4335'][Math.floor(Math.random() * 4)]; // Google colors
    }
    
    pixies.push(p);
  }
});

function animatePixies() {
  pixieCtx.clearRect(0, 0, pixieCanvas.width, pixieCanvas.height);
  
  // THE FIX: If toggled off mid-animation, immediately wipe array and bypass drawing
  if (!particlesEnabled) {
     pixies = [];
     requestAnimationFrame(animatePixies);
     return;
  }
  
  for(var i = 0; i < pixies.length; i++) {
    var p = pixies[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= (p.theme === 'kawaii' ? 0.015 : 0.025); 
    
    if(p.life > 0) {
      pixieCtx.globalAlpha = p.life;
      
      if (p.theme === 'hacker') {
         pixieCtx.fillStyle = p.color; pixieCtx.font = '14px monospace'; 
         pixieCtx.fillText(p.char, p.x, p.y);
      } else if (p.theme === 'kawaii') {
         pixieCtx.font = p.size + 'px Arial'; 
         pixieCtx.fillText(p.char, p.x, p.y);
      } else if (p.theme === 'retro_crt' || p.theme === 'neon') {
         pixieCtx.fillStyle = p.color; pixieCtx.shadowBlur = 10; pixieCtx.shadowColor = p.color;
         pixieCtx.fillRect(p.x, p.y, p.size, p.size); pixieCtx.shadowBlur = 0;
      } else { // Orbs for Light/Dark/VVIP
         pixieCtx.fillStyle = p.color; pixieCtx.shadowBlur = 10; pixieCtx.shadowColor = p.color;
         pixieCtx.beginPath(); pixieCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); pixieCtx.fill();
         pixieCtx.fillStyle = '#FFFFFF'; pixieCtx.shadowBlur = 0;
         pixieCtx.beginPath(); pixieCtx.arc(p.x, p.y, p.size / 2.5, 0, Math.PI * 2); pixieCtx.fill();
      }
    }
  }
  
  pixies = pixies.filter(function(p) { return p.life > 0; });
  requestAnimationFrame(animatePixies);
}
animatePixies();

function submitAdminAction() {
   var target = document.getElementById('adminTarget').value.trim();
   var action = document.getElementById('adminAction').value;
   var amount = parseInt(document.getElementById('adminAmount').value) || 0;

   if(!target) { showToast('❌ Enter a target LDAP'); return; }
   if(action !== 'unban' && amount <= 0) { showToast('❌ Enter a valid amount'); return; }

   var btn = document.getElementById('adminSubmitBtn');
   btn.disabled = true; btn.innerText = 'Executing...';

   google.script.run.withSuccessHandler(res => {
      btn.disabled = false; btn.innerText = 'Execute Command';
      if (res.success) {
         showToast('✅ ' + res.message);
         if (target === globalUserLdap) refreshWalletUI(); // Refresh UI if you injected points to yourself
         document.getElementById('adminTarget').value = '';
         document.getElementById('adminAmount').value = '';
         closeModal('adminModal');
      } else {
         showToast('❌ ' + res.message);
      }
   }).executeAdminAction(target, action, amount);
}

function openSettings() {
   openModal('settingsModal');
   document.getElementById('setTeam').value = 'Loading...';
   document.getElementById('setTag').value = '...';
   
   // Fetch their current tag/team from server so the boxes aren't blank
   google.script.run.withSuccessHandler(function(stats){
       if(stats) {
           document.getElementById('setTeam').value = stats.team || '';
           document.getElementById('setTag').value = stats.tag || '';
       }
   }).getProfileStats();
}

function saveSettings() {
  closeModal('settingsModal');
  var team = document.getElementById('setTeam').value.trim();
  var tag = document.getElementById('setTag').value.trim();
  
  showToast('Saving profile to server...');
  google.script.run.withSuccessHandler(function(res) {
     if(res.success) { 
         showToast('✅ ' + res.message); 
         // Force the leaderboard to refresh so they can see their new tag!
         if(document.getElementById('hallOfFame').classList.contains('active')) loadHallOfFame('xp'); 
     }
     else { showToast('❌ ' + res.message); }
  }).updatePlayerProfile(team, tag);
}
