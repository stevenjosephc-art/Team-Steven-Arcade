// --- Carousel Navigation Helpers ---

function updateCarouselView() {
  const wrapper = document.getElementById('carousel-wrapper');
  if (wrapper && carouselSlides.length > 0) {
    wrapper.style.transform = `translateX(-${currentCarouselIndex * 100}%)`;
  }
}

function resetCarouselInterval() {
  if (carouselInterval) clearInterval(carouselInterval);
  carouselInterval = setInterval(() => {
    nextCarouselSlide();
  }, 3000);
}

function nextCarouselSlide() {
  if (!carouselSlides || carouselSlides.length === 0) return;
  currentCarouselIndex = (currentCarouselIndex + 1) % carouselSlides.length;
  updateCarouselView();
  resetCarouselInterval(); // Reset the 3s timer so it doesn't double-skip
}

function prevCarouselSlide() {
  if (!carouselSlides || carouselSlides.length === 0) return;
  // Add carouselSlides.length before using modulo to prevent negative indexes
  currentCarouselIndex = (currentCarouselIndex - 1 + carouselSlides.length) % carouselSlides.length;
  updateCarouselView();
  resetCarouselInterval(); // Reset the 3s timer
}

// --- BGM AUDIO CONTROLLER ---
function playBGM(trackId) {
  if (!soundEnabled || !hasInteracted) return;
  let tracks = ['bgmLobby', 'bgmCasino', 'bgmGame'];
  tracks.forEach(id => {
    let audio = document.getElementById(id);
    if (audio && id !== trackId) { audio.pause(); }
  });
  
  if (trackId) {
    let newTrack = document.getElementById(trackId);
    if (newTrack) {
      // If entering the lobby and no song is loaded, load the current playlist track
      if (trackId === 'bgmLobby' && !newTrack.src) {
         newTrack.src = lobbyPlaylist[currentLobbyTrack];
      }
      newTrack.volume = masterVolume * 0.25; // Keep BGM subtle!
      newTrack.play().catch(e => console.log('Audio autoplay prevented.'));
    }
  }
}

  }

function updateVolume(val) { 
  masterVolume = val / 100; 
  soundEnabled = (masterVolume > 0);
  var sBtns = document.querySelectorAll('#soundBtn');
  sBtns.forEach(sBtn => {
    sBtn.textContent = soundEnabled ? '🔊' : '🔇';
    sBtn.setAttribute('aria-label', soundEnabled ? 'Mute sound' : 'Unmute sound');
  });
  
  ['bgmLobby', 'bgmCasino', 'bgmGame'].forEach(id => {
    let audio = document.getElementById(id);
    if (audio) audio.volume = soundEnabled ? (masterVolume * 0.25) : 0;
  });
  
  localStorage.setItem('arcade_vol', val); // <--- SAVE TO STORAGE
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  var sBtns = document.querySelectorAll('#soundBtn');
  sBtns.forEach(sBtn => {
    sBtn.textContent = soundEnabled ? '🔊' : '🔇';
    sBtn.setAttribute('aria-label', soundEnabled ? 'Mute sound' : 'Unmute sound');
  });
  if(soundEnabled && masterVolume === 0){
    masterVolume = 1; 
    document.getElementById('volSlider').value = 100;
  }
  
  // Instantly mute/unmute live BGM
  ['bgmLobby', 'bgmCasino', 'bgmGame'].forEach(id => {
    let audio = document.getElementById(id);
    if (audio) audio.volume = soundEnabled ? (masterVolume * 0.25) : 0;
  });
}

var audioCtx;
function getAudioCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
function playSound(t){
  if(!soundEnabled)return;
  try{
    var a=getAudioCtx(), c=a.currentTime;
    var s={
      jump:()=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.setValueAtTime(320,c);o.frequency.exponentialRampToValueAtTime(580,c+0.08);g.gain.setValueAtTime(0.12*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.15);o.start(c);o.stop(c+0.15);},
      coin:()=>{[520,780].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.09*masterVolume,c+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.07+0.1);o.start(c+i*0.07);o.stop(c+i*0.07+0.1);});},
      crash:()=>{var b=a.createBuffer(1,a.sampleRate*0.3,a.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var o=a.createBufferSource(),g=a.createGain();o.buffer=b;o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.22*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.3);o.start(c);},
      win:()=>{[400,500,640,800].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.1*masterVolume,c+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.1+0.15);o.start(c+i*0.1);o.stop(c+i*0.1+0.18);});},
      pb:()=>{[300,400,500,700,900].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.09*masterVolume,c+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.08+0.12);o.start(c+i*0.08);o.stop(c+i*0.08+0.15);});},
      // ── NEW POKEMON BATTLE SOUNDS ──
      poke_fire:()=>{
        // Crackle + rising pitch
        var b=a.createBuffer(1,a.sampleRate*0.4,a.sampleRate),d=b.getChannelData(0);
        for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5)*0.6;
        var src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
        src.buffer=b;f.type='bandpass';f.frequency.setValueAtTime(800,c);f.frequency.exponentialRampToValueAtTime(2200,c+0.3);
        src.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.25*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.4);src.start(c);
      },
      poke_water:()=>{
        // Low whoosh + splash
        var o=a.createOscillator(),g=a.createGain(),o2=a.createOscillator(),g2=a.createGain();
        o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.setValueAtTime(180,c);o.frequency.exponentialRampToValueAtTime(80,c+0.35);
        g.gain.setValueAtTime(0.2*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.4);o.start(c);o.stop(c+0.4);
        o2.connect(g2);g2.connect(a.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(300,c+0.15);o2.frequency.exponentialRampToValueAtTime(100,c+0.4);
        g2.gain.setValueAtTime(0.12*masterVolume,c+0.15);g2.gain.exponentialRampToValueAtTime(0.001,c+0.4);o2.start(c+0.15);o2.stop(c+0.4);
      },
      poke_electric:()=>{
        // Rapid buzz
        var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
        o.type='sawtooth';o.frequency.setValueAtTime(440,c);
        o.frequency.setValueAtTime(880,c+0.04);o.frequency.setValueAtTime(440,c+0.08);
        o.frequency.setValueAtTime(1200,c+0.12);o.frequency.setValueAtTime(440,c+0.16);
        o.frequency.setValueAtTime(660,c+0.20);
        g.gain.setValueAtTime(0.18*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.28);o.start(c);o.stop(c+0.28);
      },
      poke_grass:()=>{
        // Swishing leaves — soft noise burst
        var b=a.createBuffer(1,a.sampleRate*0.35,a.sampleRate),d=b.getChannelData(0);
        for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(Math.sin(Math.PI*i/d.length),0.5)*0.5;
        var src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
        src.buffer=b;f.type='highpass';f.frequency.value=1200;
        src.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.18*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.35);src.start(c);
      },
      poke_psychic:()=>{
        // Eerie descending shimmer
        [600,500,400,300,200].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.08*masterVolume,c+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.06+0.1);o.start(c+i*0.06);o.stop(c+i*0.06+0.12);});
      },
      poke_normal:()=>{
        // Dull thud
        var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';
        o.frequency.setValueAtTime(220,c);o.frequency.exponentialRampToValueAtTime(80,c+0.18);
        g.gain.setValueAtTime(0.2*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.2);o.start(c);o.stop(c+0.2);
      },
      poke_faint:()=>{
        // Descending sad tone — exactly like GBA
        [400,350,300,250,200,150].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.1*masterVolume,c+i*0.09);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.09+0.1);o.start(c+i*0.09);o.stop(c+i*0.09+0.12);});
      },
      poke_levelup:()=>{
        // Classic 8-note ascending jingle
        [262,294,330,349,392,440,494,523].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.1*masterVolume,c+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.07+0.09);o.start(c+i*0.07);o.stop(c+i*0.07+0.1);});
      },
      poke_super:()=>{
        // Sharp double-hit
        [600,900].forEach((f,i)=>{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.18*masterVolume,c+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,c+i*0.08+0.1);o.start(c+i*0.08);o.stop(c+i*0.08+0.12);});
      },
      poke_crit:()=>{
        // High sharp crack
        var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';
        o.frequency.setValueAtTime(1200,c);o.frequency.exponentialRampToValueAtTime(400,c+0.15);
        g.gain.setValueAtTime(0.22*masterVolume,c);g.gain.exponentialRampToValueAtTime(0.001,c+0.18);o.start(c);o.stop(c+0.18);
      },
    };
    (s[t]||s.jump)();

var konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
var konamiPos = 0;

window.addEventListener('keydown', e => {
  // --- QoL: KEYBOARD ACCESSIBILITY FOR ROLE="BUTTON" ---
  if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute('role') === 'button') {
      e.preventDefault();
      e.target.click();
  }

  // --- QoL: UNIVERSAL HOTKEYS ---
  if (e.key === 'Escape') {
      closeModal('settingsModal'); closeModal('feedbackModal'); closeModal('adminModal'); 
      closeModal('workReminderModal'); closeModal('appSheetOverlay'); closeVvipModal();
      closeProfile();
      if (!isGameOver && !isPaused && document.getElementById('gameScreen').style.display === 'flex') {
          togglePause();
      }
  }
  if ((e.key === 'r' || e.key === 'R') && document.getElementById('gameOverScreen').classList.contains('open')) {
      launchGame(activeDiff, diffMult);
      return;
  }
  if (e.key === '/' && document.getElementById('storeFront').classList.contains('active')) {
      e.preventDefault(); 
      document.getElementById('searchInput').focus();
      return;
  }
  // ------------------------------

  if (document.getElementById('gameScreen').style.display !== 'flex') {
    // 1. Konami check
    if (e.key.toLowerCase() === konamiCode[konamiPos].toLowerCase()) {
      konamiPos++;
      if (konamiPos === konamiCode.length) {
        konamiPos = 0; showToast('🔓 OVERRIDE ACCEPTED: Mainframe breached.');
        setTimeout(() => { setTheme('hacker'); playSound('win'); launchConfetti(); }, 800);
      }
    } else { konamiPos = 0; }

    // 2. Babicakes check
    if (typeof babiCode !== 'undefined' && typeof babiPos !== 'undefined') {
        if (e.key.toLowerCase() === babiCode[babiPos].toLowerCase()) {
          babiPos++;
          if (babiPos === babiCode.length) {
            babiPos = 0;
            triggerBabicakes(); 
          }
        } else { babiPos = 0; }
    }
    
    return; 
  }
  
  if (e.repeat) {
    if (activeGameTitle === 'Tetris' && e.key === ' ') return;
    if (activeGameTitle === '2048') return;
    if (activeGameTitle === 'Playdle' && e.key === 'Enter') return;
  }
  
  var a = document.activeElement; 
  if(a && (a.tagName === 'TEXTAREA' || (a.tagName === 'INPUT' && a.type !== 'button'))){ if(['ArrowUp','ArrowDown'].includes(e.key))e.preventDefault(); return; } 
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); 
  keys[e.key] = true; 
  
  if(e.key.toLowerCase() === 'p' && !isGameOver && Games[activeGameTitle]?.engine === 'canvas') { togglePause(); return; } 
  if(!isPaused && !isGameOver && Games[activeGameTitle]?.handleKey) Games[activeGameTitle].handleKey(e.key);
});

window.addEventListener('keyup', e => keys[e.key] = false);

    autoDeploy: function(side) {
      var grid = side === 'player' ? this.playerGrid : this.aiGrid;
      var ships = [];
      grid.fill(0);

      this.shipTypes.forEach(type => {
        var placed = false;
        while (!placed) {
          var isVert = Math.random() > 0.5;
          var r = Math.floor(Math.random() * 12);
          var c = Math.floor(Math.random() * 12);

          if (this.canPlace(grid, r, c, type.size, isVert)) {
            var shipIndices = [];
            for (var i = 0; i < type.size; i++) {
              var idx = isVert ? (r + i) * 12 + c : r * 12 + (c + i);
              grid[idx] = 1;
              shipIndices.push(idx);
            }
            ships.push({ name: type.name, indices: shipIndices, hits: 0, sunk: false });
            placed = true;
          }
        }
      });

      if (side === 'player') this.playerShips = ships;
      else this.aiShips = ships;
    },
    canPlace: function(grid, r, c, size, isVert) {
      for (var i = 0; i < size; i++) {
        var currR = isVert ? r + i : r;
        var currC = isVert ? c : c + i;
        if (currR >= 12 || currC >= 12 || grid[currR * 12 + currC] !== 0) return false;
      }
      return true;
    },
    playerAction: function(idx) {
      if (this.state !== 'playing' || this.turn !== 'player') return;
      if (this.aiGrid[idx] === 2 || this.aiGrid[idx] === 3) return;

      if (this.selectedAbility) {
        this.useAbility(this.selectedAbility, idx);
        this.selectedAbility = null;
        document.querySelectorAll('#bs-abilities .app-card').forEach(btn => btn.style.borderColor = 'var(--glass-border)');
        return;
      }

      this.fire(idx, 'player');
    },
    fire: function(idx, side) {
      var targetGrid = side === 'player' ? this.aiGrid : this.playerGrid;
      var targetShips = side === 'player' ? this.aiShips : this.playerShips;
      var name = side === 'player' ? 'You' : 'Enemy';

      if (targetGrid[idx] === 1) {
        targetGrid[idx] = 3; // Hit
        var ship = targetShips.find(s => s.indices.includes(idx));
        ship.hits++;
        this.log(`${name} hit ${side === 'player' ? "enemy's" : "your"} ${ship.name}!`, side === 'player' ? '#FFD700' : '#FF3B30');
        playSound('crash');
        if (side === 'player') { this.energy += 15; rawScore += 100; }

        if (ship.hits === ship.indices.length) {
          ship.sunk = true;
          this.log(`Critical strike! ${name} sunk ${side === 'player' ? "enemy's" : "your"} ${ship.name}!`, '#00E5FF');
          playSound('win');
          if (side === 'player') { this.energy += 25; rawScore += 500; }
          if (targetShips.every(s => s.sunk)) {
            this.endGame(side === 'player');
            return;
          }
        }

        if (side === 'ai') {
          this.aiMemory.mode = 'target';
          this.aiMemory.hunt.push(...this.getNeighbors(idx));
        }
      } else {
        targetGrid[idx] = 2; // Miss
        this.log(`${name} fired: Miss.`, '#A0AAB2');
        playSound('jump');
      }

      this.renderGrids();
      if (side === 'player') {
        this.turn = 'ai';
        setTimeout(() => this.aiAction(), 800);
      } else {
        this.turn = 'player';
      }
    },
    useAbility: function(id, idx) {
      var ability = this.abilities.find(a => a.id === id);
      this.energy -= ability.cost;

      if (id === 'radar') {
        this.log(`Tactical Scan initiated at sector ${idx}.`);
        var r = Math.floor(idx / 12), c = idx % 12;
        for (var i = -1; i <= 1; i++) {
          for (var j = -1; j <= 1; j++) {
            var nr = r + i, nc = c + j;
            if (nr >= 0 && nr < 12 && nc >= 0 && nc < 12) {
              var nidx = nr * 12 + nc;
              if (this.aiGrid[nidx] === 1) { this.aiGrid[nidx] = 4; this.log('Enemy signature detected!', '#FFD700'); }
              else if (this.aiGrid[nidx] === 0) this.aiGrid[nidx] = 4;
            }

        }

        // Fills gaps if missing moves
        var fallbacks = ['Quick Attack', 'Bite', 'Earthquake', 'Ice Beam'];
        while (moves.length < 4) {
            var f = fallbacks.shift();
            if (!moves.includes(f)) moves.push(f);
        }

        // Remove duplicates and construct objects
        var finalMoves = [];
        var seen = new Set();
        for (var i = 0; i < moves.length; i++) {
            if (!seen.has(moves[i])) {
                seen.add(moves[i]);
                finalMoves.push({ name: moves[i], pp: POKEMON_MOVES[moves[i]].pp, maxPp: POKEMON_MOVES[moves[i]].pp });
            }
        }
        return finalMoves.slice(0, 4);
    },

    searchSafari: function(biome) {
        var pools = {
            'forest': ['Bug', 'Grass', 'Flying', 'Normal'],
            'mountain': ['Rock', 'Ground', 'Fighting', 'Poison'],
            'island': ['Water', 'Ice', 'Fairy', 'Psychic'],
            'volcano': ['Fire', 'Electric', 'Dragon', 'Ghost', 'Steel']
        };
        var allowedTypes = pools[biome] || pools['forest'];

        var pool = [];
        for(var i=0; i<POKEDEX.length; i++) {
            if(allowedTypes.indexOf(POKEDEX[i].type) !== -1) pool.push(POKEDEX[i]);
        }
        if(pool.length === 0) pool = POKEDEX;

        var d = this._rollWildEncounter(pool);

        var bst = d.hp + d.atk;
        var cRate = 0.40;
        if (bst >= 190 || d.name === "Mewtwo" || d.name === "Mew") cRate = 0.05;
        else if (bst >= 140) cRate = 0.15;
        else if (bst >= 100) cRate = 0.25;

        var isShiny = Math.random() > 0.98;
        this.safariEncounter = { 
            id: d.id, name: d.name, img: d.img, shiny: isShiny, 
            catchRate: cRate, log: ["A wild " + d.name + " appeared!"] 
        };
        this.safariState = 'encounter'; 
        if(typeof playSound === 'function') playSound('jump'); 
        this.renderHub();
    },

    throwBerry: function() {
        if(this.playerData.inventory.berries <= 0) { if(typeof showToast === 'function') showToast('❌ No Berries left!'); return; }
        this.playerData.inventory.berries--;
        this.safariEncounter.catchRate += 0.20;
        this.safariEncounter.log.unshift("🍇 You threw a Berry! It lowered its guard.");
        if(typeof playSound === 'function') playSound('coin'); 
        this.saveData(0); this.renderHub();
    },

    throwPokeball: function(ballType) {
        var invKey = ballType + 's';
        if((this.playerData.inventory[invKey] || 0) <= 0) { if(typeof showToast === 'function') showToast('❌ No ' + ballType + 's left!'); return; }
        this.playerData.inventory[invKey]--; 
        if(typeof playSound === 'function') playSound('pb');
        
        var ballMult = 1.0;
        if (ballType === 'greatball') ballMult = 1.5;
        if (ballType === 'ultraball') ballMult = 2.0;

        var finalCatchRate = this.safariEncounter.catchRate * ballMult;
        var roll = Math.random();
        
        if(roll < finalCatchRate) {
             this.safariEncounter.log.unshift("✨ Gotcha! " + this.safariEncounter.name + " was caught!");
             var e = this.safariEncounter;
             if (!this.playerData.cards[e.id]) { 
                 var natureList = ['Hardy', 'Adamant', 'Bold', 'Brave', 'Relaxed'];
                 var rNature = natureList[Math.floor(Math.random() * 5)];
                 this.playerData.cards[e.id] = { lvl: 1, exp: 0, shiny: e.shiny, ot: this.playerData.trainerName, nature: rNature };
             } else { 
                 this.gainExp(e.id, 25);
                 if(e.shiny) this.playerData.cards[e.id].shiny = true; 
                 this.safariEncounter.log.unshift("Duplicate caught! Converted into 25 EXP.");
             }
             this.safariState = 'caught'; 
             if(typeof playSound === 'function') playSound('win');
        } else {
             this.safariEncounter.log.unshift("💥 Oh no! The Pokemon broke free!");
             if(Math.random() < 0.30) {
                 this.safariEncounter.log.unshift("💨 The wild " + this.safariEncounter.name + " fled!");
                 this.safariState = 'fled'; 
                 if(typeof playSound === 'function') playSound('crash');
             } else { 
                 if(typeof playSound === 'function') playSound('jump'); 
             }
        }
        this.saveData(0);
        this.renderHub();
    },

    _doStartBattle: function(mode) {
        var sq = this.playerData.squad.filter(function(id){ return id !== null; });
        var totalLvl = 0; var self = this; var pTypes = [];
        sq.forEach(function(id) { 
            totalLvl += self.playerData.cards[id].lvl; 
            var d = POKEDEX_MAP[id] || null;
            if(d) pTypes.push(d.type);
        });
        var avgLvl = Math.max(1, Math.floor(totalLvl / sq.length));
        var synergy = (pTypes.length === 3 && pTypes[0] === pTypes[1] && pTypes[1] === pTypes[2]);
        var eSquad = []; var isGym = false; var matchTitle = "WILD ENCOUNTER";
        
        if (mode === 'gym') {
            var g = this.gymLeaders[this.playerData.gym];
            if (!g) return; 
            eSquad = [ { id: g.team[0], lvl: g.lvl }, { id: g.team[1], lvl: g.lvl }, { id: g.team[2], lvl: g.lvl } ];
            isGym = true; matchTitle = "LEADER " + g.name.toUpperCase();
        } else {
            for(var i=0; i<3; i++) {
                var d = this._rollWildEncounter(POKEDEX);
                var eId = d.id;
                var eLvl = Math.max(1, avgLvl + Math.floor(Math.random() * 3) - 1);
                eSquad.push({ id: eId, lvl: eLvl });
            }
        }
        this.arenaMatch = { pSquad: sq, eSquad: eSquad, pIdx: 0, eIdx: 0, pCurHp: 0, eCurHp: 0, pMaxHp: 0, eMaxHp: 0, log: ["A wild Pokemon appeared!"], winner: null, avgLvl: avgLvl, pSynergy: synergy, isGym: isGym, isRanked: false, title: matchTitle, menu: 'main', pMoves: [], eMoves: [] };
        this.arenaState = 'battling'; this._initFighters(); this.renderHub();
    },

    _initFighters: function(isSwitching) {
        var m = this.arenaMatch;
        if (!m.pSquadHp) m.pSquadHp = {};
        var pId = m.pSquad[m.pIdx]; var eId = m.eSquad[m.eIdx].id;
        var pLvl = this.playerData.cards[pId] ? this.playerData.cards[pId].lvl : m.avgLvl;
        var eLvl = m.eSquad[m.eIdx].lvl;
        var pStats = this._getStats(pId, pLvl); var eStats = this._getStats(eId, eLvl);
        var pBonus = m.pSynergy ? 1.15 : 1.0;

        var pAbility = this.ABILITIES[pId];
        if (pAbility && pAbility.name === 'Intimidate' && !isSwitching) {
            m.eIntimidated = true;
            m.log.unshift(pStats.name + "'s Intimidate lowered the foe's Attack!");
        }

        m.pMaxHp = Math.floor(pStats.hp * 2 * pBonus);
        m.eMaxHp = Math.floor(eStats.hp * 2);
        m.pCurHp = m.pSquadHp[m.pIdx] !== undefined ? m.pSquadHp[m.pIdx] : m.pMaxHp;
        
        if (!isSwitching) {
            m.eCurHp = m.eMaxHp;
            m.eMoves = this._generateMoveset(eStats.type, eLvl);
        }
        m.pMoves = this._generateMoveset(pStats.type, pLvl);
        m.pState = { status:null, statusTimer:0 };
        m.pAtkBuff = 1.0; m.pDefBuff = 1.0; // NEW: Reset player buffs on entry
        if (!isSwitching) { 
            m.eState = { status:null, statusTimer:0 }; 
            m.eAtkBuff = 1.0; m.eDefBuff = 1.0; // NEW: Reset enemy buffs
            m.menu='main'; if(typeof playSound === 'function') playSound('coin'); 
        }
        m.choiceLocked = null;
    },

    switchPokemon: function(idx) {
        var m = this.arenaMatch;
        if(!m || this.arenaState !== 'battling') return;
        if(m.pIdx === idx) { if(typeof showToast === 'function') showToast('Already in battle!'); return; }
        if(!m.pSquadHp) m.pSquadHp = {};
        if(m.pSquadHp[idx] !== undefined && m.pSquadHp[idx] <= 0) { if(typeof showToast === 'function') showToast('That Pokemon has fainted!'); if(typeof playSound === 'function') playSound('crash'); return; }

        m.pSquadHp[m.pIdx] = m.pCurHp;
        m.pIdx = idx;
        this._initFighters(true);
        
        var pStats = this._getStats(m.pSquad[m.pIdx], this.playerData.cards[m.pSquad[m.pIdx]] ? this.playerData.cards[m.pSquad[m.pIdx]].lvl : m.avgLvl);
        m.log.unshift("Go! " + pStats.name + "!");
        if(typeof playSound === 'function') playSound('jump');
        
        m.menu = 'main';
        this.renderHub();
    },

    useArenaItem: function(item) {
        if (this.combatLocked) { 
            if(typeof playSound === 'function') playSound('crash');
            if(typeof showToast === 'function') showToast('Wait for the turn to end!'); 
            return;
        }
        
        var m = this.arenaMatch;
        if(!m || this.arenaState !== 'battling') return;
        var invKey = item + 's';
        
        m.tempLog = "";
        
        if(item === 'potion') {
            if((this.playerData.inventory.potions || 0) <= 0) { 
                if(typeof showToast === 'function') showToast('No Potions left!');
                if(typeof playSound === 'function') playSound('crash'); 
                return; 
            }
            this.playerData.inventory.potions--;
            var healAmt = Math.floor(m.pMaxHp * 0.5);
            m.pCurHp = Math.min(m.pMaxHp, m.pCurHp + healAmt);
            m.pSquadHp[m.pIdx] = m.pCurHp;
            m.tempLog = "🧪 You used a Potion! Healed " + healAmt + " HP.";
            if(typeof playSound === 'function') playSound('coin');
            
        } else if (item === 'fullheal') {
            if((this.playerData.inventory.fullheals || 0) <= 0) { 
                if(typeof showToast === 'function') showToast('No Full Heals left!');
                if(typeof playSound === 'function') playSound('crash'); 
                return; 
            }
            if(!m.pState.status) { 
                if(typeof showToast === 'function') showToast('Your Pokémon has no status condition!');
                if(typeof playSound === 'function') playSound('crash'); 
                return; 
            }
            
            this.playerData.inventory.fullheals--;
            var pStats = this._getStats(m.pSquad[m.pIdx], this.playerData.cards[m.pSquad[m.pIdx]] ? this.playerData.cards[m.pSquad[m.pIdx]].lvl : m.avgLvl);
            m.tempLog = "🧪 You used a Full Heal! " + pStats.name + " was cured of its " + m.pState.status + ".";
            m.pState.status = null;
            m.pState.statusTimer = 0;
            if(typeof playSound === 'function') playSound('coin');
            
        } else if (item.indexOf('ball') !== -1) {
            if(m.isGym || m.isRanked) { 
                if(typeof showToast === 'function') showToast('Cannot catch trainer Pokemon!');
                if(typeof playSound === 'function') playSound('crash'); 
                return; 
            }
            if((this.playerData.inventory[invKey] || 0) <= 0) { 
                if(typeof showToast === 'function') showToast('No ' + item + 's left!');
                if(typeof playSound === 'function') playSound('crash'); 
                return; 
            }
            this.playerData.inventory[invKey]--;
            
            var eStats = this._getStats(m.eSquad[m.eIdx].id, m.eSquad[m.eIdx].lvl);
            var bst = eStats.hp + eStats.atk;
            var baseRate = bst >= 190 ? 0.05 : (bst >= 140 ? 0.15 : (bst >= 100 ? 0.25 : 0.40));
            var hpFactor = (m.eMaxHp - m.eCurHp) / m.eMaxHp; 
            var ballMult = item === 'ultraball' ? 2.0 : (item === 'greatball' ? 1.5 : 1.0);
            var statusMult = (m.eState && m.eState.status) ? 1.5 : 1.0;
            var finalRate = Math.min(1.0, baseRate * ballMult * (1 + hpFactor) * statusMult);
            
            if(typeof playSound === 'function') playSound('pb');
            if(Math.random() < finalRate) {
                m.log.unshift("✨ Gotcha! " + eStats.name + " was caught!");
                var eId = m.eSquad[m.eIdx].id;
                if (!this.playerData.cards[eId]) {
                    var natureList = ['Hardy', 'Adamant', 'Bold', 'Brave', 'Relaxed'];
                    var rNature = natureList[Math.floor(Math.random() * 5)];
                    this.playerData.cards[eId] = { lvl: m.eSquad[m.eIdx].lvl, exp: 0, shiny: false, ot: this.playerData.trainerName, nature: rNature };
                } else {
                    var dupExp = Math.min(50, m.eSquad[m.eIdx].lvl * 3);
                    this.gainExp(eId, dupExp);
                    m.log.unshift("Duplicate caught! Converted into " + dupExp + " EXP.");
                }
                this.saveData(0);
                m.eCurHp = 0;
                this.combatLocked = true;
                this._checkFaint();
                this.combatLocked = false;
                this.renderHub();
                return;
            } else {
                m.tempLog = "💥 Oh no! The Pokemon broke free!";
            }
        }
        
        this.executeTurn(-1, true);
    },

    executeTurn: function(moveIndex, isItemTurn) {
        if (this.combatLocked) return;
        this.combatLocked = true;
        
        var m = this.arenaMatch;
        if (this.arenaState!=='battling') { this.combatLocked = false; return; }

        var currentTurnLogs = [];
        if (isItemTurn && m.tempLog) {
            currentTurnLogs.push(m.tempLog);
            m.tempLog = null;
        }
        
        var originalUnshift = m.log.unshift.bind(m.log);
        m.log.unshift = function(msg) { currentTurnLogs.push(msg); };

        var pId  = m.pSquad[m.pIdx];
        var eId  = m.eSquad[m.eIdx].id;
        var pLvl = this.playerData.cards[pId] ? this.playerData.cards[pId].lvl : m.avgLvl;
        var pStats = this._getStats(pId, pLvl);
        var eStats = this._getStats(eId, m.eSquad[m.eIdx].lvl);
        var pBonus = m.pSynergy ? 1.15 : 1.0;
        var pAbility = this.ABILITIES[pId];
        var heldItem = this.playerData.heldItems ? this.playerData.heldItems[pId] : null;

        var totalPP = 0;
        var pMove = null;
        var isStruggle = false;
        var abilityDmgMult = 1.0;
        var lifeOrbMult = (heldItem==='life_orb') ? 1.30 : 1.0;

        if (!isItemTurn) {
            for (var i=0;i<m.pMoves.length;i++) totalPP += m.pMoves[i].pp;
            pMove = m.pMoves[moveIndex];

            if (totalPP===0) {
                isStruggle = true;
                pMove = { name:'Struggle', type:'Normal', pwr:50, acc:100 };
            } else {
                if (pMove.pp<=0) { 
                    if (typeof showToast==='function') showToast('❌ No PP left!');
                    if(typeof playSound === 'function') playSound('crash'); 
                    this.combatLocked = false; 
                    return; 
                }
                if (!isStruggle && m.choiceLocked && m.choiceLocked !== pMove.name) {
                    if (typeof showToast==='function') showToast('⚔️ Choice Band locked you into ' + m.choiceLocked + '!');
                    moveIndex = m.pMoves.findIndex(function(mv){ return mv.name === m.choiceLocked; });
                    if (moveIndex < 0) moveIndex = 0;
                    pMove = m.pMoves[moveIndex];
                }
                pMove.pp--;
            }

            if (heldItem==='choice_band' && !m.choiceLocked) m.choiceLocked = pMove.name;
            if (pAbility) {
                var isLow = (m.pCurHp / m.pMaxHp) < 0.33;
                var mDataAbil = isStruggle ? pMove : POKEMON_MOVES[pMove.name];
                if (mDataAbil && isLow) {
                    if ((pAbility.name==='Blaze' && pStats.type==='Fire' && mDataAbil.type==='Fire') ||
                        (pAbility.name==='Torrent' && pStats.type==='Water' && mDataAbil.type==='Water') ||
                        (pAbility.name==='Overgrow' && pStats.type==='Grass' && mDataAbil.type==='Grass')) {
                        abilityDmgMult = 1.5;
                        m.log.unshift(pAbility.name + ' boosted ' + pStats.name + '\'s power!');
                    }
                }
            }
        }

        var secondaryEffects = {
            'Thunderbolt': { status:'paralyzed', chance:0.10 }, 'Body Slam': { status:'paralyzed', chance:0.30 },
            'Sludge Bomb': { status:'poisoned', chance:0.30 }, 'Flamethrower':{ status:'burned', chance:0.10 },
            'Fire Blast': { status:'burned', chance:0.30 }
        };
        var self = this;
        var processHit = function(atkName, defName, moveName, mData, atkType, defType, isPlayer) {
            if (Math.random()*100 > mData.acc) return { log:atkName+"'s attack missed!", dmg:0, hit:false, isUtility: false };
            
            // Handle Status/Buff/Weather Moves immediately without damage calcs
            if (mData.pwr === 0) return { log: atkName + " used " + moveName + "!", dmg: 0, hit: true, isUtility: true, mData: mData };

            var atkBuff = isPlayer ? (m.pAtkBuff || 1.0) : (m.eAtkBuff || 1.0);
            var defBuff = isPlayer ? (m.eDefBuff || 1.0) : (m.pDefBuff || 1.0);

            var attackerAtk = (isPlayer ? pStats.atk : eStats.atk) * atkBuff;
            var defenderDef = (isPlayer ? eStats.def : pStats.def) * defBuff;
            var attackerLvl = isPlayer ? pLvl : m.eSquad[m.eIdx].lvl;
            
            var baseDmg = Math.floor((((2 * attackerLvl / 5 + 2) * mData.pwr * (attackerAtk / Math.max(1, defenderDef))) / 50) + 2);
            var randomFactor = (Math.floor(Math.random() * 16) + 85) / 100;
            var dmg = Math.max(1, Math.floor(baseDmg * randomFactor));
            var attackerState = isPlayer ? m.pState : m.eState;
            
            // 🌧️ WEATHER MODIFIERS
            if (m.weather === 'rain') {
                if (atkType === 'Water') dmg = Math.floor(dmg * 1.5);
                if (atkType === 'Fire') dmg = Math.floor(dmg * 0.5);
            } else if (m.weather === 'sun') {
                if (atkType === 'Fire') dmg = Math.floor(dmg * 1.5);
                if (atkType === 'Water') dmg = Math.floor(dmg * 0.5);
            }

            if (attackerState && attackerState.status==='burned') dmg = Math.floor(dmg*0.5);
            if (isPlayer) {
                dmg = Math.floor(dmg * pBonus * lifeOrbMult * abilityDmgMult);
                if (m.eIntimidated) dmg = Math.floor(dmg * 0.75);
            }
            var defAbility = isPlayer ? self.ABILITIES[eId] : self.ABILITIES[pId];
            var defCurHp = isPlayer ? m.eCurHp : m.pCurHp;
            var defMaxHp = isPlayer ? m.eMaxHp : m.pMaxHp;
            
            if (defAbility && defAbility.name==='Multiscale' && defCurHp===defMaxHp) { dmg = Math.floor(dmg*0.5); m.log.unshift("Multiscale reduced the damage!"); }
            if (defAbility && defAbility.name==='Thick Fat' && (mData.type==='Fire'||mData.type==='Ice')) { dmg = Math.floor(dmg*0.5); }

            var TYPE_CHART = { "normal": {"rock":0.5,"ghost":0,"steel":0.5}, "fire": {"fire":0.5,"water":0.5,"grass":2.0,"ice":2.0,"bug":2.0,"rock":0.5,"dragon":0.5,"steel":2.0}, "water": {"fire":2.0,"water":0.5,"grass":0.5,"ground":2.0,"rock":2.0,"dragon":0.5}, "electric": {"water":2.0,"electric":0.5,"grass":0.5,"ground":0,"flying":2.0,"dragon":0.5}, "grass": {"fire":0.5,"water":2.0,"grass":0.5,"poison":0.5,"ground":2.0,"flying":0.5,"bug":0.5,"rock":2.0,"dragon":0.5,"steel":0.5}, "ice": {"fire":0.5,"water":0.5,"grass":2.0,"ice":0.5,"ground":2.0,"flying":2.0,"dragon":2.0,"steel":0.5}, "fighting": {"normal":2.0,"ice":2.0,"poison":0.5,"flying":0.5,"psychic":0.5,"bug":0.5,"rock":2.0,"ghost":0,"dark":2.0,"steel":2.0,"fairy":0.5}, "poison": {"grass":2.0,"poison":0.5,"ground":0.5,"rock":0.5,"ghost":0.5,"steel":0,"fairy":2.0}, "ground": {"fire":2.0,"electric":2.0,"grass":0.5,"poison":2.0,"flying":0,"bug":0.5,"rock":2.0,"steel":2.0}, "flying": {"electric":0.5,"grass":2.0,"fighting":2.0,"bug":2.0,"rock":0.5,"steel":0.5}, "psychic": {"fighting":2.0,"poison":2.0,"psychic":0.5,"dark":0,"steel":0.5}, "bug": {"fire":0.5,"grass":2.0,"fighting":0.5,"poison":0.5,"flying":0.5,"psychic":2.0,"ghost":0.5,"dark":2.0,"steel":0.5,"fairy":0.5}, "rock": {"fire":2.0,"ice":2.0,"fighting":0.5,"ground":0.5,"flying":2.0,"bug":2.0,"steel":0.5}, "ghost": {"normal":0,"psychic":2.0,"ghost":2.0,"dark":0.5}, "dragon": {"dragon":2.0,"steel":0.5,"fairy":0}, "dark": {"fighting":0.5,"psychic":2.0,"ghost":2.0,"dark":0.5,"fairy":0.5}, "steel": {"fire":0.5,"water":0.5,"electric":0.5,"ice":2.0,"rock":2.0,"steel":0.5,"fairy":2.0}, "fairy": {"fire":0.5,"fighting":2.0,"poison":0.5,"dragon":2.0,"dark":2.0,"steel":0.5} };
            
            var mult = 1.0;
            var safeAtkType = String(mData.type).toLowerCase().trim();
            var safeDefType = String(defType).toLowerCase().trim();
            if (TYPE_CHART[safeAtkType] && TYPE_CHART[safeAtkType][safeDefType] !== undefined) mult = TYPE_CHART[safeAtkType][safeDefType];
            if (atkType === mData.type) dmg = Math.floor(dmg * 1.5);
            
            var critRoll = Math.floor(Math.random() * 256);
            var crit = critRoll < 16; 
            if (crit) {
                var critDmg = Math.floor((((2 * attackerLvl / 5 + 2) * mData.pwr * (attackerAtk / Math.max(1, defenderDef))) / 50) + 2);
                dmg = Math.max(dmg, Math.floor(critDmg * 1.5 * randomFactor));
            }
            dmg = Math.max(1, Math.floor(dmg*mult));
            
            var log = atkName+" used "+moveName+"!";
            if (crit) log += " CRITICAL HIT!";
            if (mult>1) log += " Super effective!";
            else if (mult<1) log += " Not very effective...";
            return { log:log, dmg:dmg, hit:true, isUtility: false };
        };
        
        var tickStatus = function(state, name) {
            if (state.status && state.statusTimer > 0) {
                state.statusTimer--;
                if (state.statusTimer <= 0) {
                    m.log.unshift(name + " naturally recovered from its " + state.status + "!");
                    state.status = null;
                }
            }
        };
        tickStatus(m.pState, pStats.name);
        tickStatus(m.eState, "Enemy " + eStats.name);

        var applyStatus = function(targetState, targetName, moveName) {
            var effect = secondaryEffects[moveName];
            if (effect && !targetState.status && Math.random()<effect.chance) {
                targetState.status = effect.status;
                targetState.statusTimer = Math.floor(Math.random() * 3) + 2;
                m.log.unshift(targetName+" was "+effect.status+"!");
            }
            var defAbilityKey = targetState===m.eState ? eId : pId;
            var defAbil = self.ABILITIES[defAbilityKey];
            if (defAbil && defAbil.name==='Static' && !targetState.status && Math.random()<0.30) {
                targetState.status = 'paralyzed';
                targetState.statusTimer = Math.floor(Math.random() * 3) + 2;
                m.log.unshift("Static paralyzed " + targetName + "!");
            }
        };

        var mData = isStruggle ? pMove : (pMove ? POKEMON_MOVES[pMove.name] : null);
        var ePPCost = (pAbility && pAbility.name==='Pressure') ? 2 : 1;
        var eMove = m.eMoves[Math.floor(Math.random()*m.eMoves.length)];
        var eData = POKEMON_MOVES[eMove.name];

        var playerGoesFirst = true;
        if (!isItemTurn && mData && eData) {
            var pPri = mData.priority || 0;
            var ePri = eData.priority || 0;
            var finalPSpd = pStats.spd * (m.pState.status === 'paralyzed' ? 0.5 : 1);
            var finalESpd = eStats.spd * (m.eState.status === 'paralyzed' ? 0.5 : 1);
            
            if (ePri > pPri) playerGoesFirst = false;
            else if (ePri === pPri) {
                if (finalESpd > finalPSpd) playerGoesFirst = false;
                else if (finalESpd === finalPSpd && Math.random() < 0.5) playerGoesFirst = false;
            }
        }

        var executePlayerTurn = function() {
            if (isItemTurn || m.pCurHp <= 0) return;
            if (m.pState.status==='paralyzed' && Math.random()<0.25) {
                m.log.unshift(pStats.name + " is paralyzed! It can't move!");
            } else if (m.pState.status==='asleep') {
                m.log.unshift(pStats.name + " is fast asleep.");
            } else {
                var pResult = processHit(pStats.name, eStats.name, pMove.name, mData, pStats.type, eStats.type, true);
                
                if (pResult.isUtility) {
                    m.log.unshift(pResult.log);
                    if (mData.healMax) {
                        var healAmt = Math.floor(m.pMaxHp * mData.healMax);
                        m.pCurHp = Math.min(m.pMaxHp, m.pCurHp + healAmt);
                        m.log.unshift(pStats.name + " recovered " + healAmt + " HP!");
                        if (typeof playSound === 'function') playSound('jump');
                    }
                    if (mData.buff === 'atk') {
                        m.pAtkBuff = (m.pAtkBuff || 1.0) + mData.amount;
                        m.log.unshift(pStats.name + "'s Attack sharply rose!");
                    }
                    if (mData.buff === 'def') {
                        m.pDefBuff = (m.pDefBuff || 1.0) + mData.amount;
                        m.log.unshift(pStats.name + "'s Defense sharply rose!");
                    }
                    if (mData.status && !m.eState.status) {
                        m.eState.status = mData.status;
                        m.eState.statusTimer = Math.floor(Math.random() * 3) + 2;
                        m.log.unshift("Enemy " + eStats.name + " was " + mData.status + "!");
                    } else if (mData.status && m.eState.status) {
                        m.log.unshift("It failed!");
                    }
                } else {
                    m.eCurHp -= pResult.dmg;
                    m.log.unshift(pResult.log);
                    
                    var moveType = mData ? mData.type : pStats.type;
                    var typeSoundMap = { 'Fire':'poke_fire','Water':'poke_water','Electric':'poke_electric','Grass':'poke_grass','Psychic':'poke_psychic','Ghost':'poke_psychic','Dark':'poke_psychic','Dragon':'poke_electric','Ice':'poke_water','Rock':'poke_normal','Ground':'poke_normal','Fighting':'poke_normal','Bug':'poke_grass','Flying':'poke_grass','Steel':'poke_normal','Poison':'poke_psychic','Fairy':'poke_psychic','Normal':'poke_normal' };
                    if (typeof playSound === 'function') playSound(typeSoundMap[moveType] || 'poke_normal');
                    
                    if (pResult.dmg > 0) {
                      var isSuper = pResult.log.indexOf('Super effective') !== -1;
                      var isCrit  = pResult.log.indexOf('CRITICAL') !== -1;
                      if (isSuper && typeof playSound === 'function') playSound('poke_super');
                      if (isCrit && typeof playSound === 'function')  playSound('poke_crit');
                      self._spawnDmgText(pResult.dmg, 'enemy', isSuper, isCrit);
                      
                      // Drain Effect
                      if (mData.healDmg) {
                          var healAmt = Math.floor(pResult.dmg * mData.healDmg);
                          m.pCurHp = Math.min(m.pMaxHp, m.pCurHp + healAmt);
                          m.log.unshift(pStats.name + " drained energy!");
                      }
                    }
                    
                    if (isStruggle && pResult.dmg>0) {
                        var recoil = Math.max(1,Math.floor(pResult.dmg*0.25));
                        m.pCurHp -= recoil; m.log.unshift(pStats.name+" is hit with recoil! ("+recoil+" HP)");
                    }
                    if (pResult.hit && m.eCurHp>0) applyStatus(m.eState, "Enemy "+eStats.name, pMove.name);
                    
                    if (heldItem==='life_orb' && pResult.dmg>0) {
                        var orbRecoil = Math.max(1, Math.min(100, Math.floor(m.pMaxHp/10)));
                        m.pCurHp -= orbRecoil; m.log.unshift("Life Orb hurt " + pStats.name + " for " + orbRecoil + "!");
                    }
                    if (heldItem==='shell_bell' && pResult.dmg>0) {
                        var sbHeal = Math.max(1, Math.min(60, Math.floor(pResult.dmg/8)));
                        m.pCurHp = Math.min(m.pMaxHp, m.pCurHp+sbHeal); m.log.unshift("Shell Bell restored " + sbHeal + " HP!");
                    }
                }
            }
        };

        var executeEnemyTurn = function() {
            if (m.eCurHp <= 0 || m.pCurHp <= 0) return;
            if (m.eState.status==='paralyzed' && Math.random()<0.25) {
                m.log.unshift("Enemy "+eStats.name+" is paralyzed! It can't move!");
            } else if (m.eState.status==='asleep') {
                m.log.unshift("Enemy "+eStats.name+" is fast asleep.");
            } else {
                if (eMove.pp > 0) eMove.pp = Math.max(0, eMove.pp - ePPCost + 1);
                var eResult = processHit("Enemy "+eStats.name, pStats.name, eMove.name, eData, eStats.type, pStats.type, false);
                
                if (eResult.isUtility) {
                    m.log.unshift(eResult.log);
                    if (eData.healMax) {
                        var healAmt = Math.floor(m.eMaxHp * eData.healMax);
                        m.eCurHp = Math.min(m.eMaxHp, m.eCurHp + healAmt);
                        m.log.unshift("Enemy " + eStats.name + " recovered " + healAmt + " HP!");
                    }
                    if (eData.buff === 'atk') {
                        m.eAtkBuff = (m.eAtkBuff || 1.0) + eData.amount;
                        m.log.unshift("Enemy " + eStats.name + "'s Attack sharply rose!");
                    }
                    if (eData.buff === 'def') {
                        m.eDefBuff = (m.eDefBuff || 1.0) + eData.amount;
                        m.log.unshift("Enemy " + eStats.name + "'s Defense sharply rose!");
                    }
                    if (eData.status && !m.pState.status) {
                        m.pState.status = eData.status;
                        m.pState.statusTimer = Math.floor(Math.random() * 3) + 2;
                        m.log.unshift(pStats.name + " was " + eData.status + "!");
                    } else if (eData.status && m.pState.status) {
                        m.log.unshift("It failed!");
                    }
                } else {
                    m.pCurHp -= eResult.dmg;
                    m.log.unshift(eResult.log);
                    
                    if (eResult.dmg > 0) {
                        self._spawnDmgText(eResult.dmg, 'player');
                        if (eData.healDmg) {
                            var healAmt = Math.floor(eResult.dmg * eData.healDmg);
                            m.eCurHp = Math.min(m.eMaxHp, m.eCurHp + healAmt);
                            m.log.unshift("Enemy " + eStats.name + " drained energy!");
                        }
                    }
                    if (eResult.hit && m.pCurHp>0) applyStatus(m.pState, pStats.name, eMove.name);
                    
                    if (m.pCurHp<=0 && heldItem==='focus_sash') {
                        m.pCurHp = 1; delete self.playerData.heldItems[pId];
                        if ((self.playerData.inventory.heldItems['focus_sash'] || 0) > 0) self.playerData.inventory.heldItems['focus_sash']--;
                        m.log.unshift("Focus Sash held on! "+pStats.name+" survived with 1 HP!");
                        if(typeof playSound === 'function') playSound('pb');
                    }
                    if (heldItem==='lum_berry' && m.pState.status) {
                        m.log.unshift("Lum Berry cured " + pStats.name + "'s " + m.pState.status + "!");
                        m.pState.status = null; delete self.playerData.heldItems[pId];
                    }
                }
            }
        };

        if (!isItemTurn) {
            var finalPSpdMsg = pStats.spd * (m.pState.status === 'paralyzed' ? 0.5 : 1);
            var finalESpdMsg = eStats.spd * (m.eState.status === 'paralyzed' ? 0.5 : 1);
            if (!playerGoesFirst && finalESpdMsg > finalPSpdMsg) {
                currentTurnLogs.push('<span style="color:#FACC15; font-size:11px;">⚡ Enemy ' + eStats.name + ' moved first! (SPD ' + Math.floor(finalESpdMsg) + ' vs ' + Math.floor(finalPSpdMsg) + ')</span>');
            }
        }

        if (playerGoesFirst) {
            executePlayerTurn();
            executeEnemyTurn();
        } else {
            executeEnemyTurn();
            executePlayerTurn();
        }

        var eotDamage = function(state, maxHp, curHp, name, prefix) {
            if (curHp>0 && (state.status==='poisoned'||state.status==='burned')) {
                var dmg = Math.max(1, Math.min(80, Math.floor(maxHp/16)));
                m.log.unshift(prefix+name+" is hurt by its "+(state.status==='poisoned'?"poison":"burn")+"!");
                return curHp - dmg;
            }
            return curHp;
        };
        m.pCurHp = eotDamage(m.pState, m.pMaxHp, m.pCurHp, pStats.name, "");
        m.eCurHp = eotDamage(m.eState, m.eMaxHp, m.eCurHp, eStats.name, "Enemy ");
        
        // WEATHER EFFECTS EOT
        if (m.weather) {
            if (m.weather === 'sand' || m.weather === 'hail') {
                if (m.pCurHp > 0 && pStats.type !== 'Rock' && pStats.type !== 'Ground' && pStats.type !== 'Steel' && pStats.type !== 'Ice') {
                    m.pCurHp -= Math.max(1, Math.floor(m.pMaxHp / 16));
                }
                if (m.eCurHp > 0 && eStats.type !== 'Rock' && eStats.type !== 'Ground' && eStats.type !== 'Steel' && eStats.type !== 'Ice') {
                    m.eCurHp -= Math.max(1, Math.floor(m.eMaxHp / 16));
                }
                m.log.unshift("The " + (m.weather==='sand'?"sandstorm":"hail") + " rages!");
            }
            m.weatherTimer--;
            if (m.weatherTimer <= 0) {
                m.log.unshift("The weather returned to normal.");
                m.weather = null;
            }
        }
        
        if (heldItem==='leftovers' && m.pCurHp>0) {
            var lfHeal = Math.max(1, Math.min(80, Math.floor(m.pMaxHp/16)));
            m.pCurHp = Math.min(m.pMaxHp, m.pCurHp+lfHeal);
            m.log.unshift("Leftovers restored " + lfHeal + " HP!");
        }
        if (pAbility && pAbility.name==='Sand Stream' && pStats.type!=='Rock' && m.eCurHp>0) {
            var sandDmg = Math.max(1, Math.min(120, Math.floor(m.eMaxHp/8)));
            m.eCurHp -= sandDmg;
            m.log.unshift("The sandstorm rages on!");
        }

        m.menu = 'main'; 
        this._checkFaint();

        m.log.unshift = originalUnshift;
        if (currentTurnLogs.length > 0) {
            m.log.unshift(currentTurnLogs.join('<br><span style="color:#E3350D; font-size:14px; margin-right:4px;">▶</span> '));
        }

        this.renderHub();
        setTimeout(function() { self.combatLocked = false; }, 500);
    },

    fleeArena: function() {
        if(this.arenaMatch && this.arenaMatch.isRanked) { if(typeof showToast === 'function') showToast('❌ Cannot run from Ranked battles!'); return; }
        if(this.arenaMatch && this.arenaMatch.isGym) { if(typeof showToast === 'function') showToast('❌ Cannot run from Gym Leaders!'); return; }

        var m = this.arenaMatch;
        var pId = m.pSquad[m.pIdx];
        var eId = m.eSquad[m.eIdx] ? m.eSquad[m.eIdx].id : pId;
        var pLvl = this.playerData.cards[pId] ? this.playerData.cards[pId].lvl : m.avgLvl;
        var eLvl = m.eSquad[m.eIdx] ? m.eSquad[m.eIdx].lvl : pLvl;
        var pSpd = this._getStats(pId, pLvl).spd;
        var eSpd = this._getStats(eId, eLvl).spd;
        
        m.escapeAttempts = (m.escapeAttempts || 0) + 1;
        var escapeChance = ((pSpd * 128) / Math.max(1, eSpd) + 30 * m.escapeAttempts) % 256;
        var escapeRoll   = Math.floor(Math.random() * 256);

        if (pSpd >= eSpd || escapeRoll < escapeChance) {
            m.log.unshift("💨 Got away safely!");
            this.arenaState = 'over'; this.arenaMatch.winner = 'escape';
            this.isAutoBattling = false;
            if(typeof playSound === 'function') playSound('jump');
        } else {
            m.log.unshift("❌ Can't escape! (Attempt " + m.escapeAttempts + ")");
            if(typeof playSound === 'function') playSound('crash');
            
            var eStats = this._getStats(eId, eLvl);
            var eMove = m.eMoves[Math.floor(Math.random() * m.eMoves.length)];
            var eData = typeof POKEMON_MOVES !== 'undefined' ? POKEMON_MOVES[eMove.name] : null;
            if (eData) {
                var dmg = Math.max(1, Math.floor((((2 * eLvl / 5 + 2) * eData.pwr * (eStats.atk / Math.max(1, this._getStats(pId, pLvl).def))) / 50) + 2));
                m.pCurHp = Math.max(0, m.pCurHp - dmg);
                m.log.unshift("Enemy " + eStats.name + " used " + eMove.name + "! (-" + dmg + " HP)");
                if (m.pCurHp <= 0) { this._checkFaint(); }
            }
        }
        this.renderHub();
    },

    _checkFaint: function() {
        var m = this.arenaMatch;
        var pId = m.pSquad[m.pIdx]; var eId = m.eSquad[m.eIdx].id;
        var pStats = this._getStats(pId, this.playerData.cards[pId] ? this.playerData.cards[pId].lvl : m.avgLvl);
        var eStats = this._getStats(eId, m.eSquad[m.eIdx].lvl);
        
        if(!m.pSquadHp) m.pSquadHp = {};
        m.pSquadHp[m.pIdx] = m.pCurHp;
        
        if (m.eCurHp <= 0) {
            var eBase = null;
            for(var j=0; j<POKEDEX.length; j++){ if(POKEDEX[j].id === eId) { eBase = POKEDEX[j]; break; } }
            var baseBst = eBase ? (eBase.hp + eBase.atk) : 100;
            var eLvl = m.eSquad[m.eIdx].lvl;
            var pLvl = this.playerData.cards[pId] ? this.playerData.cards[pId].lvl : 1;
            
            var baseExpYield = Math.floor((baseBst / 4) + 20);
            var expGained = Math.floor((baseExpYield * eLvl) / 7);
            
            if (pLvl > eLvl + 10) {
                var penalty = Math.max(0.1, 1 - ((pLvl - eLvl) * 0.045));
                expGained = Math.floor(expGained * penalty);
            }

            var maxExpPerKill = Math.floor(Math.pow(pLvl, 3) * 1.2 * 0.20);
            expGained = Math.max(1, Math.min(expGained, maxExpPerKill));

            var lvlUp = this.gainExp(pId, expGained);
            m.log.unshift("Enemy " + eStats.name + " fainted! Gained " + expGained + " EXP!");
            if(typeof playSound === 'function') playSound('poke_faint');
            
            if (!m.isGym && !m.isRanked) {
                var killReward = 100 + (10 * m.eSquad[m.eIdx].lvl);
                this.saveData(-killReward); 
                this.rawScore += killReward;
                m.log.unshift("Earned " + killReward + " Pts!");
                
                m.eIdx++;
                if (m.eIdx >= m.eSquad.length) {
                    var d = this._rollWildEncounter(POKEDEX);
                    var newEId = d.id;
                    var newELvl = Math.max(1, m.avgLvl + Math.floor(Math.random() * 5) - 2);
                    m.eSquad.push({ id: newEId, lvl: newELvl });
                    
                    var healAmt = Math.floor(m.pMaxHp * 0.15);
                    m.pCurHp = Math.min(m.pMaxHp, m.pCurHp + healAmt);
                    m.pSquadHp[m.pIdx] = m.pCurHp;
                    m.log.unshift("💚 Survived wave! Healed " + healAmt + " HP.");
                }
                this._initFighters();
            } 
            else {
                m.eIdx++;
                if (m.eIdx < m.eSquad.length) { 
                    this._initFighters();
                } else {
                    m.winner = 'player';
                    this.arenaState = 'over'; this.isAutoBattling = false;
                    if(typeof playSound === 'function') playSound('win'); 
                    if(typeof launchConfetti === 'function') launchConfetti();
                    
                    if (m.isRanked) { 
                        google.script.run.resolveRankedMatch(m.opponentLdap, true);
                        m.log.unshift("🏆 RANKED VICTORY! (+250 MMR)"); 
                        this.playerData.mmr = (this.playerData.mmr || 1000) + 25;
                        this.playerData.wins = (this.playerData.wins || 0) + 1;
                        this.rawScore += 50000; 
                        this.saveData(-50000); 
                    } else { 
                        var reward = this.gymLeaders[this.playerData.gym].reward;
                        this.playerData.gym++; 
                        m.log.unshift("🏆 GYM LEADER DEFEATED! Earned " + reward.toLocaleString() + " Pts!");
                        this.saveData(-reward);
                        this.rawScore += reward;
                    }
                }
            }
        } 
        else if (m.pCurHp <= 0) {
            m.log.unshift(pStats.name + " fainted!");
            if(typeof playSound === 'function') playSound('poke_faint');
            var nextAlive = -1;
            for(var i=0; i<m.pSquad.length; i++) {
                if(m.pSquadHp[i] === undefined || m.pSquadHp[i] > 0) { nextAlive = i; break; }
            }

            if (nextAlive !== -1) {
                m.pIdx = nextAlive;
                this._initFighters(true); 
            } else {
                m.winner = 'enemy';
                this.arenaState = 'over'; this.isAutoBattling = false;
                if(typeof playSound === 'function') playSound('crash');
                if (m.isRanked) { 
                    google.script.run.resolveRankedMatch(m.opponentLdap, false);
                    m.log.unshift("💔 RANKED DEFEAT! (-150 MMR)"); 
                    this.playerData.mmr = Math.max(0, (this.playerData.mmr || 1000) - 15);
                    this.playerData.losses = (this.playerData.losses || 0) + 1;
                    this.saveData(0);
                } else { 
                    m.log.unshift("DEFEAT! Your squad was wiped out.");
                }
            }
        }
    },

    gainExp: function(id, amount) {
        var self = this;
        var card = this.playerData.cards[id];
        if(!card) return false;
        
        if(card.lvl >= 100) { card.lvl = 100; card.exp = 0; return false; }
        if(card.exp === undefined) card.exp = 0;

        var oldStats = self._getStats(id, card.lvl);
        card.exp += amount;
        
        var leveledUp = false;
        var calcExpNeeded = function(lvl) { return Math.floor(Math.pow(lvl, 3) * 1.2); };
        var expNeeded = calcExpNeeded(card.lvl);

        while(card.exp >= expNeeded && card.lvl < 100) {
            card.lvl++;
            card.exp -= expNeeded;
            expNeeded = calcExpNeeded(card.lvl);
            leveledUp = true;
            
            if (self && self.arenaMatch) {
                var newStats = self._getStats(id, card.lvl);
                var hpGain  = Math.floor(newStats.hp  - oldStats.hp);
                var atkGain = Math.floor(newStats.atk - oldStats.atk);
                var defGain = Math.floor(newStats.def - oldStats.def);
                var spdGain = Math.floor(newStats.spd - oldStats.spd);
                self.arenaMatch.log.unshift(
                  oldStats.name + ' grew to Lv.' + card.lvl + '! ' +
                  'HP <span style="color:#4ADE80">+' + hpGain + '</span> · ' +
                  'ATK <span style="color:#F87171">+' + atkGain + '</span> · ' +
                  'DEF <span style="color:#60A5FA">+' + defGain + '</span> · ' +
                  'SPD <span style="color:#FACC15">+' + spdGain + '</span>'
                );
                if(typeof playSound === 'function') playSound('poke_levelup');
                oldStats = newStats; 
            }
        }
        
        if(card.lvl >= 100) { card.lvl = 100; card.exp = 0; }
        return leveledUp;
    },

    evolvePokemon: function(id) {
        var evo = POKEMON_EVOLUTIONS[id];
        var card = this.playerData.cards[id];
        if (!evo || !card || card.lvl < evo.lvl) { if(typeof playSound === 'function') playSound('crash'); return; }
        
        this.playerData.cards[evo.target] = { lvl: card.lvl, exp: card.exp || 0, shiny: card.shiny, ot: card.ot || this.playerData.trainerName, nickname: card.nickname };
        delete this.playerData.cards[id];
        
        var sqIdx = this.playerData.squad.indexOf(id);
        if (sqIdx !== -1) this.playerData.squad[sqIdx] = evo.target;
        
        if(typeof playSound === 'function') playSound('win'); 
        if(typeof launchConfetti === 'function') launchConfetti();
        if(typeof showToast === 'function') showToast('✨ Congratulations! Your Pokemon evolved!');
        this.saveData(0); this.renderHub();
    },

    useStone: function(id, stoneType) {
        var targetId = this.stoneEvolutions[id][stoneType];
        if (!targetId || (this.playerData.inventory[stoneType] || 0) <= 0) {
            if(typeof playSound === 'function') playSound('crash');
            return;
        }
        
        this.playerData.inventory[stoneType]--;
        var card = this.playerData.cards[id];
        this.playerData.cards[targetId] = { 
            lvl: card.lvl, exp: card.exp || 0, shiny: card.shiny, 
            ot: card.ot || this.playerData.trainerName, nickname: card.nickname, nature: card.nature || 'Hardy' 
        };
        delete this.playerData.cards[id];
        
        var sqIdx = this.playerData.squad.indexOf(id);
        if (sqIdx !== -1) this.playerData.squad[sqIdx] = targetId;
        
        if(typeof playSound === 'function') playSound('win');
        if(typeof launchConfetti === 'function') launchConfetti();
        if(typeof showToast === 'function') showToast('✨ Your Pokemon evolved using a ' + stoneType + '!');
        
        this.saveData(0); this.renderHub();
    },

    autoEquip: function() {
       var self = this;
       var owned = Object.keys(this.playerData.cards).map(Number);
       var getPwr = function(id) {
           var d = null;
           for(var j=0;j<POKEDEX.length;j++){ if(POKEDEX[j].id===id){d=POKEDEX[j];break;} }
           return d ? (d.hp+d.atk)*Math.pow(1.1,self.playerData.cards[id].lvl-1) : 0;
       };
       var getType = function(id) {
           for(var j=0;j<POKEDEX.length;j++){ if(POKEDEX[j].id===id) return POKEDEX[j].type; } return '';
       };
       owned.sort(function(a,b){ return getPwr(b)-getPwr(a); });
       var bestSquad = [owned[0]||null, owned[1]||null, owned[2]||null];
       var bestScore = bestSquad.reduce(function(s,id){ return s+(id?getPwr(id):0); }, 0);
       var byType = {};
       owned.forEach(function(id){ var t=getType(id); if(!byType[t]) byType[t]=[]; byType[t].push(id); });
       Object.keys(byType).forEach(function(type) {
           if (byType[type].length >= 3) {
               var trio = byType[type].slice(0,3);
               var synergyScore = trio.reduce(function(s,id){ return s+getPwr(id)*1.15; }, 0);

    filterBinder: function(query) {

        var cards = grid.children;

                emptyMsg.style.display = 'block';
            }
        } else if (emptyMsg) {
            emptyMsg.style.display = 'none';
        }

    _rollGachaId: function(packType) {
        var commons = [], uncommons = [], rares = [], epics = [];
        var legends = [144, 145, 146, 150, 151, 243, 244, 245, 249, 250, 251, 377, 378, 379, 380, 381, 382, 383, 384, 385, 386];
        
        for(var i=0; i<POKEDEX.length; i++) {
            var p = POKEDEX[i];
            if (packType === 'fire' && p.type !== 'Fire') continue;
            if (packType === 'water' && p.type !== 'Water') continue;
            if (packType === 'grass' && p.type !== 'Grass') continue;
            if (packType === 'electric' && p.type !== 'Electric') continue;
            
            var bst = p.hp + p.atk;
            if (legends.indexOf(p.id) !== -1 || bst >= 190) epics.push(p.id); 
            else if (bst >= 140) rares.push(p.id);
            else if (bst >= 100) uncommons.push(p.id); 
            else commons.push(p.id);                     
        }
        
        if (epics.length === 0) epics = rares;
        if (rares.length === 0) rares = uncommons; 
        if (uncommons.length === 0) uncommons = commons;
        
        var roll = Math.random(); var pool;
        if (packType === 'legend') {
            if (roll < 0.025 && epics.length > 0) pool = epics;
            else if (roll < 0.225 && rares.length > 0) pool = rares; 
            else pool = uncommons;
        } else {
            if (roll < 0.002 && epics.length > 0) pool = epics;
            else if (roll < 0.042 && rares.length > 0) pool = rares;
            else if (roll < 0.242 && uncommons.length > 0) pool = uncommons; 
            else pool = commons;
        }
        
        if (!pool || pool.length === 0) return 25; // Pikachu Fallback
        return pool[Math.floor(Math.random() * pool.length)];
    },

    _rollWildEncounter: function(pool) {
        var commons = [], uncommons = [], rares = [], epics = [];
        var legends = [144, 145, 146, 150, 151, 243, 244, 245, 249, 250, 251, 377, 378, 379, 380, 381, 382, 383, 384, 385, 386];
        
        for(var i=0; i<pool.length; i++) {
            var p = pool[i];
            var bst = p.hp + p.atk;
            if (legends.indexOf(p.id) !== -1 || bst >= 190) epics.push(p);
            else if (bst >= 140) rares.push(p);
            else if (bst >= 100) uncommons.push(p);
            else commons.push(p);
        }
        
        if (epics.length === 0) epics = rares;
        if (rares.length === 0) rares = uncommons;
        if (uncommons.length === 0) uncommons = commons;
        
        var roll = Math.random();
        var selectedPool;
        if (roll < 0.001 && epics.length > 0) selectedPool = epics;
        else if (roll < 0.021 && rares.length > 0) selectedPool = rares;
        else if (roll < 0.171 && uncommons.length > 0) selectedPool = uncommons;
        else selectedPool = commons;
        
        return selectedPool[Math.floor(Math.random() * selectedPool.length)];
    },

    pullPacks: function(amount, packType) {
       if (this.isPulling) return;
       
       if (packType === 'care_package') {
           if (this.playerData.starterClaimed) {
               if(typeof playSound === 'function') playSound('crash');
               if(typeof showToast==='function') showToast('❌ Care Package already claimed!'); return;
           }
           this.playerData.starterClaimed = true;
           this.saveData(0);
           this.isPulling = true; 
           if(typeof playSound === 'function') playSound('pb');
           var pulls = [];
           
           for(var i = 0; i < 10; i++) {
               var cardId = (i === 9) ? this._rollGachaId('legend') : this._rollGachaId('base');
               var isShiny = Math.random() > 0.98;
               pulls.push({ id: cardId, shiny: isShiny });
               var rLvl = Math.floor(Math.random() * 20) + 1;
               var natureList = ['Hardy', 'Adamant', 'Bold', 'Brave', 'Relaxed'];
               var rNature = natureList[Math.floor(Math.random() * 5)];
               if (this.playerData.cards[cardId]) {
                   this.gainExp(cardId, rLvl * 50);
                   if (isShiny) this.playerData.cards[cardId].shiny = true;
               } else {
                   this.playerData.cards[cardId] = { lvl: rLvl, exp: 0, shiny: isShiny, ot: "Professor Labs", nature: rNature };
               }
           }
           
           this.playerData.starterClaimed = true;
           this.saveData(0); 
           this.showPullScreen(pulls);
           return;
       }

       var baseCost = 50000;
       if (['fire', 'water', 'grass', 'electric'].indexOf(packType) !== -1) baseCost = 100000;
       if (packType === 'legend') baseCost = 250000;
       var cost = baseCost * amount;
       
       var ptsText = document.getElementById('uiPoints') ? document.getElementById('uiPoints').textContent : '0';
       var currentPts = parseInt(ptsText.replace(/,/g, '')) || 0;
       
       if (currentPts < cost) { 
           if(typeof playSound === 'function') playSound('crash');
           if(typeof showToast === 'function') showToast('❌ Not enough Points!'); 
           return;
       }
       
       var uiPts = document.getElementById('uiPoints');
       if (uiPts) uiPts.textContent = (currentPts - cost).toLocaleString();

       this.isPulling = true; 
       if(typeof playSound === 'function') playSound('pb');
       
       var pulls = [];
       for(var i = 0; i < amount; i++) {
           var cardId = this._rollGachaId(packType);
           if (!cardId) cardId = 25; 
           var isShiny = false; 
           this.playerData.pity++;
           if (Math.random() > 0.98 || this.playerData.pity >= 50) { 
               isShiny = true; 
               this.playerData.pity = 0;
           }
           pulls.push({ id: cardId, shiny: isShiny });
           
           if (this.playerData.cards[cardId]) { 
               var expBoost = Math.min(500, this.playerData.cards[cardId].lvl * 50);
               this.gainExp(cardId, expBoost);
               if (isShiny) this.playerData.cards[cardId].shiny = true; 
           } 
           else { 
               var natureList = ['Hardy', 'Adamant', 'Bold', 'Brave', 'Relaxed'];
               var rNature = natureList[Math.floor(Math.random() * 5)];
               this.playerData.cards[cardId] = { lvl: 1, exp: 0, shiny: isShiny, ot: this.playerData.trainerName, nature: rNature };
           }
       }
       
       this.saveData(cost); 
       this.showPullScreen(pulls);
    },

    update: function() {

                this.autoFc = 0;

                    var validMoves = [];
