    var W = 1120, H = 680;
    
    // 1. Boundary check (protect the top HUD and bottom dock)
    if (px < 20 || px > W - 20 || py < 60 || py > H - 100) return false;
    
    // 2. Real-time path overlap check (calculates distance from your mouse to the actual path line)
    for (var pi = 0; pi < this.paths.length; pi++) {
      var path = this.paths[pi];
      for (var i = 0; i < path.length - 1; i++) {
        if (this.distToSegment(px, py, path[i].x, path[i].y, path[i+1].x, path[i+1].y) < 36) {
          return false; // Too close to the enemy path!
        }
      }
    }
    
    // 3. Tower overlap check
    for (var ti = 0; ti < this.towers.length; ti++) {
      var t = this.towers[ti];
      if (Math.hypot(t.x - px, t.y - py) < 36) return false;
    }
    
    return true;
  },
  _snapToGrid: function(px, py) {
    var GRID = 40, HALF = GRID / 2, W = 1120, H = 680;
    var gx = Math.max(HALF, Math.min(W - HALF, px));
    var gy = Math.max(60, Math.min(H - HALF - 100, py));
    return { x: gx, y: gy };
  },

  // ═══════════════════════════════════════════════════════════════════════
  // WAVES & SPAWNS
  // ═══════════════════════════════════════════════════════════════════════
  generateWave: function() {
    this.spawnQueue = [];
    this.moab = null; this._moabWarning = 0;
    var w = this.wave, diff = activeDiff;
    
    if (w % 10 === 0) {
      this._moabWarning = 160;
      var escortCount = 8 + Math.floor(w / 10) * 4;
      for (var i = 0; i < escortCount; i++) {
        var pIdx = Math.floor(Math.random() * this.paths.length);
        this.spawnQueue.push({ type: 0, path: pIdx, hpMult: 1 + w * 0.2, spdMult: 1 + w * 0.006, timer: i * 22 });
      }
      this.spawnQueue.push({ type: 'moab', path: 0, timer: 175 + escortCount * 22 });
      return;
    }

    var diffMult = diff === 'Easy' ? 1.0 : (diff === 'Medium' ? 1.5 : 2.8);
    var hpMult   = diffMult * (1 + w * 0.30 + Math.pow(Math.max(0, w - 20), 1.35) * 0.04);
    if (w > 99) hpMult *= Math.pow(1.2, w - 99);

    var spdMult  = 1 + w * 0.008 + (w > 40 ? (w - 40) * 0.004 : 0);
    spdMult      = Math.min(spdMult, diff === 'Easy' ? 2.2 : (diff === 'Medium' ? 2.8 : 4.2));
    var count    = Math.min(Math.floor(12 + w * 3.5 + (w > 50 ? (w - 50) * 1.5 : 0)), 200);
    if (diff === 'Hard') count = Math.min(Math.floor(count * 1.4), 200);
    
    var interval = Math.max(8, 55 - w * 0.5);

    for (var i = 0; i < count; i++) {
      var type = 0, r = Math.random();
      if (w >= 3  && r < 0.30) type = 2;
      if (w >= 6  && r < 0.25) type = 1;
      if (w >= 15 && r < 0.18) type = 4;
      if (w % 5  === 0 && i === count - 1) type = 3;
      if (w % 5  === 0 && i === count - 2 && w >= 10) type = 3;
      if (w >= 30 && w % 15 === 0 && i === count - 1) type = 5;
      if (w >= 60 && Math.random() < 0.06) type = 5;
      
      var pathIdx = Math.floor(Math.random() * this.paths.length);
      this.spawnQueue.push({ type: type, path: pathIdx, hpMult: hpMult, spdMult: spdMult, timer: i * interval });
    }
  },

  _callWaveEarly: function() {
    var bonus = Math.floor(this._breakTimer / 2);
    this.credits += bonus; rawScore += bonus * 10;
    this.floatingTexts.push({x: 1120 - 110, y: 680 - 80, text: 'EARLY BONUS +$' + bonus, col: '#FFD700', life: 1.5});
    if(typeof playSound === 'function') playSound('coin');
    
    this._breakTimer = 0;
    this._betweenWaves = false;
    this.generateWave();
},

  _burstMoab: function(mx, my, pathIdx, wp) {
    var pool = this.moabLdaps.length > 0 ? this.moabLdaps : ['stevenjosephc'];
    var MOAB_SPEECH = ['yawa!', 'tabang!', 'ouch!', 'dili!', 'ayaw!', 'sakit!', 'help!', 'noooo!', 'ugh!', 'whyyy!', 'sus!'];
    var diffMult = activeDiff === 'Easy' ? 0.6 : (activeDiff === 'Medium' ? 1.0 : 1.8);
    
    for (var i = 0; i < 11; i++) {
      var ldap = pool[i % pool.length];
      var hp = Math.floor((150 + this.wave * 15) * diffMult); 
      var safeWp = Math.max(1, Math.min(wp, this.paths[pathIdx].length - 1));

      this.enemies.push({
        id: Math.random().toString(36).substr(2, 9),
        x: mx + (Math.random() - 0.5) * 50, y: my + (Math.random() - 0.5) * 50,
        pathIdx: pathIdx, wp: safeWp, type: 1, hp: hp, maxHp: hp,
        spd: 1.3 + Math.random() * 0.5, slow: 0, stun: 0, poison: 0, ccResist: 1.0, pushResist: 0,
        isSpawn: true, spawnLdap: ldap, speech: MOAB_SPEECH[i % MOAB_SPEECH.length], speechTimer: 90 + Math.floor(Math.random() * 60), speechVisible: true, _speechCycle: 0,
      });
    }
    
    for (var k = 0; k < 70; k++) {
      var c = k % 3 === 0 ? '#FF003C' : k % 3 === 1 ? '#FF8C00' : '#FFD700';
      this.particles.push({ x: mx, y: my, vx: (Math.random() - 0.5) * 16, vy: (Math.random() - 0.5) * 16, life: 1.3, c: c, r: 3 + Math.random() * 6 });
    }
    
    this.screenShake = 28;
    this.credits += 900 + this.wave * 22; rawScore += 5000 + this.wave * 120;
    
    if(typeof playSound === 'function') { playSound('crash'); playSound('pb'); }
    if (typeof showToast === 'function') showToast('MOAB DESTROYED! +$'+(900+this.wave*22)+' · Survivors dispersed!');
    if (typeof launchConfetti === 'function' && typeof particlesEnabled !== 'undefined' && particlesEnabled) launchConfetti();
  },

  // ═══════════════════════════════════════════════════════════════════════
  // UPDATE ENGINE
  // ═══════════════════════════════════════════════════════════════════════
  update: function(){
    if(this.state!=='playing'||this.paused) return;
    for(var s=0;s<(this.gameSpeed||1);s++) this._step();
  },

  _step: function(){
    this.fc++;
    if(this.screenShake>0) this.screenShake--;
    if(this._flashMsg&&this._flashMsg.timer>0) this._flashMsg.timer--;
    if(this._moabWarning>0) this._moabWarning--;
    
    // Wave Break Timer Logic
    if (this._betweenWaves && this._breakTimer > 0) {
        this._breakTimer--;
        if (this._breakTimer <= 0) {
            this._betweenWaves = false;
            this.generateWave();
        }
    }

    this.towers.forEach(function(t){ t.recoil = Math.max(0, (t.recoil || 0) - 1); });

    for(var i=this.spawnQueue.length-1;i>=0;i--){
      var sq=this.spawnQueue[i]; sq.timer--;
      if(sq.timer<=0){
        if(sq.type === 'moab'){
          var path  = this.paths[sq.path];
          var mHp   = (3500 + this.wave * 450) * (activeDiff === 'Easy' ? 0.6 : activeDiff === 'Medium' ? 1.0 : 1.8);
          this.moab = {
            id: 'moab_' + this.wave, x: path[0].x, y: path[0].y, pathIdx: sq.path, wp: 1,
            hp: mHp, maxHp: mHp, spd: Math.min(0.35 + this.wave * 0.004, 0.9),
            r: 52, angle: 0, slow: 0, stun: 0, poison: 0, ccResist: 1.0, isMoab: true
          };
          if (typeof showToast === 'function') showToast('⚠️ MOAB CLASS DREADNOUGHT INCOMING!');
          if(typeof playSound === 'function') playSound('pb');
        } else {
          var def  = this.eDef[sq.type], path = this.paths[sq.path];
          this.enemies.push({
            id: Math.random().toString(36).substr(2, 9),
            x:path[0].x,y:path[0].y,pathIdx:sq.path,wp:1,
            type:sq.type, hp:def.hp*sq.hpMult,maxHp:def.hp*sq.hpMult,
            spd:def.spd*sq.spdMult, slow:0,stun:0,poison:0,ccResist:1.0,pushResist:0,angle:0,
          });
        }
        this.spawnQueue.splice(i,1);
      }
    }

    var self = this;
    var processPoison = function(e) {
        if(e.poison > 0 && self.fc % 15 === 0) { 
            var dotDmg = e.maxHp * 0.02 + 5; 
            e.hp -= dotDmg; e.poison--;
            self.floatingTexts.push({x: e.x+(Math.random()-0.5)*20, y: e.y+(Math.random()-0.5)*20, text: '-'+Math.floor(dotDmg), col: '#A040A0', life: 0.8});
            if(e.hp <= 0 && e.isMoab) { self._burstMoab(e.x, e.y, e.pathIdx, e.wp); self.moab = null; }
        }
    };
    if (this.moab) processPoison(this.moab);
    this.enemies.forEach(processPoison);

    if(this.moab){
      var m = this.moab;
      if(m.stun > 0){ m.stun--; }
      else {
        if(m.slow > 0) m.slow--;
        var tgt = this.paths[m.pathIdx][m.wp];
        var mSpd = m.spd * (m.slow > 0 ? 0.5 : 1.0);
        var dx   = tgt.x-m.x, dy = tgt.y-m.y, d = Math.hypot(dx,dy);
        m.angle  = Math.atan2(dy, dx);
        if(d < mSpd){
          m.x=tgt.x; m.y=tgt.y; m.wp++;
          if(m.wp >= this.paths[m.pathIdx].length){
            this.lives -= 25; this.screenShake = 35;
            if(typeof playSound === 'function') playSound('crash');
            this._burstMoab(m.x, m.y, m.pathIdx, m.wp - 1);
            this.moab = null;
            if(this.lives <= 0){
              this.state = 'gameover'; var self=this;
              setTimeout(function(){if(typeof triggerGameOver === 'function') triggerGameOver('MOAB Breached the Sector — Wave '+self.wave);},800);
              return;
            }
          }
        } else { m.x+=dx/d*mSpd; m.y+=dy/d*mSpd; }
      }
      if(this.moab && this.moab.hp <= 0){
        this._burstMoab(this.moab.x, this.moab.y, this.moab.pathIdx, this.moab.wp);
        this.moab = null;
      }
    }

    for(var i=this.enemies.length-1;i>=0;i--){
      var e=this.enemies[i], def=this.eDef[e.type];
      if(e.stun>0){e.stun--;continue;}
      if(e.slow>0) e.slow--;

      if(e.isSpawn && e.speechTimer > 0){
        e.speechTimer--;
        if(e.speechTimer <= 0){
          var MOAB_SPEECH = ['yawa!','tabang!','ouch!','dili!','ayaw!','sakit!','help!','noooo!','ugh!','whyyy!','sus!'];
          e._speechCycle = ((e._speechCycle||0) + 1) % MOAB_SPEECH.length;
          e.speech = MOAB_SPEECH[e._speechCycle];
          e.speechTimer = 100 + Math.floor(Math.random() * 80);
          e.speechVisible = true;
        }
      }

      var tgt=this.paths[e.pathIdx][e.wp];
      var spd=e.spd*(e.slow>0?0.4:1.0);
      var dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.hypot(dx,dy);
      e.angle=Math.atan2(dy,dx);
      if(d<spd){
        e.x=tgt.x;e.y=tgt.y;e.wp++;
        if(e.wp>=this.paths[e.pathIdx].length){
          this.lives -= (e.isSpawn ? 25 : 1);
          if(typeof playSound === 'function') playSound('crash'); 
          this.enemies.splice(i,1); this.screenShake=14;
          if(this.lives<=0){
            this.state='gameover'; var self=this;
            setTimeout(function(){if(typeof triggerGameOver === 'function') triggerGameOver('Sector Breached — Wave '+self.wave);},800);
            return;
          }
          continue;
        }
      } else {e.x+=dx/d*spd;e.y+=dy/d*spd;}
    }

    this.towers.forEach(function(t){
      var base=self.tDef[t.type], lv=self._lvlStat(t.type,t.lvl);
      
      var targetsInRange = [];
      if (self.moab && Math.hypot(self.moab.x-t.x, self.moab.y-t.y) <= lv.r) targetsInRange.push(self.moab);
      self.enemies.forEach(function(e) {
          if (Math.hypot(e.x-t.x, e.y-t.y) <= lv.r) {
              e.distToEnds = e.wp*1000 - Math.hypot(self.paths[e.pathIdx][e.wp].x-e.x, self.paths[e.pathIdx][e.wp].y-e.y);
              e.distToTower = Math.hypot(e.x-t.x, e.y-t.y);
              targetsInRange.push(e);
          }
      });

      if (targetsInRange.length === 0) { t.lockTime = 0; return; }

      var aimTarget = null;
      var mode = t.targetMode || 'first';
      
      targetsInRange.sort(function(a,b) {
          if (mode === 'last') return a.distToEnds - b.distToEnds;
          if (mode === 'strongest') return b.hp - a.hp;
          if (mode === 'closest') return a.distToTower - b.distToTower;
          return b.distToEnds - a.distToEnds; 
      });
      aimTarget = targetsInRange[0];
      t.rot = Math.atan2(aimTarget.y-t.y, aimTarget.x-t.x);

      if (t.type === 7) {
          if (t.targetId !== aimTarget.id) { t.targetId = aimTarget.id; t.lockTime = 0; }
          t.lockTime++;
          
          var ramp = 1 + Math.min(t.lockTime / 18, 9);
          var dmg = (lv.d / 60) * ramp; 
          aimTarget.hp -= dmg;
          t.totalDmg += dmg;
          if(aimTarget.hp <= 0 && !aimTarget.isMoab) t.kills++;
          
          self.particles.push({type:'beam', x1:t.x, y1:t.y, x2:aimTarget.x, y2:aimTarget.y, col:base.col, width:Math.min(ramp+1, 10), life:2});
          if (self.fc % 15 === 0) self.floatingTexts.push({x: aimTarget.x, y: aimTarget.y, text: '-'+Math.floor(dmg*15), col: '#F43F5E', life: 0.5});
          return; 
      }

      if(t.cd>0){t.cd--;return;}
      t.cd  = Math.max(4, lv.f);
      t.recoil = 6; 

      var applyDmg = function(e, dmg) { 
          e.hp -= dmg; t.totalDmg += dmg; 
          if(e.hp <= 0 && !e.isMoab) t.kills++;
      };

      if(t.type===0){ 
        self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d,col:base.col,tower:t});
        if(t.lvl>=2) self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d*0.6,col:base.col,delay:5,tower:t});
        if(t.lvl>=3) self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d*0.4,col:base.col,delay:10,tower:t});
        if(typeof playSound === 'function') playSound('jump');
      } 
      else if(t.type===1){ 
        var aoeR=lv.r*(t.lvl>=3?1.0:t.lvl>=2?0.8:0.65);
        self.particles.push({type:'nova',x:t.x,y:t.y,r:aoeR,life:12,col:base.col});
        var sd=70+t.lvl*18;
        targetsInRange.forEach(function(e){
            if(Math.hypot(e.x-t.x,e.y-t.y)<=aoeR){
                var effect = Math.floor(sd * e.ccResist);
                e.slow = Math.max(e.slow||0, effect); 
                e.ccResist = Math.max(0, e.ccResist - 0.25); 
                applyDmg(e, lv.d);
            }
        });
        if(typeof playSound === 'function') playSound('jump');
      } 
      else if(t.type===2){ 
        self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:2,dmg:lv.d,col:base.col,lvl:t.lvl,tower:t});
        if(typeof playSound === 'function') playSound('jump');
      } 
      else if(t.type===3){ 
        self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:3,dmg:lv.d,col:base.col,tower:t});
        if(typeof playSound === 'function') playSound('jump');
      }
      else if(t.type===4){ 
        var hits=[aimTarget], cur=aimTarget;
        for(var c=1; c<t.lvl+1; c++){
          var next=null, nd=Infinity;
          targetsInRange.forEach(function(e){
            if(hits.indexOf(e)<0){var d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<120&&d<nd){nd=d;next=e;}}
          });
          if(!next) break;
          hits.push(next); cur=next;
        }
        var df=1.0;
        for(var h=0;h<hits.length;h++){
          applyDmg(hits[h], lv.d*df);
          
          var stunDur = hits[h].isMoab ? 6 : (10+t.lvl*5);
          var finalStun = Math.floor(stunDur * hits[h].ccResist);
          hits[h].stun = Math.max(hits[h].stun||0, finalStun);
          hits[h].ccResist = Math.max(0, hits[h].ccResist - 0.35); 
          
          df*=0.65;
          if(h>0) self.particles.push({type:'arc',x1:hits[h-1].x,y1:hits[h-1].y,x2:hits[h].x,y2:hits[h].y,life:8,col:base.col});
        }
        self.particles.push({type:'arc',x1:t.x,y1:t.y,x2:aimTarget.x,y2:aimTarget.y,life:8,col:base.col});
        if(t.lvl>=3) self.particles.push({type:'nova',x:t.x,y:t.y,r:40,life:8,col:base.col});
        if(typeof playSound === 'function') playSound('pb');
      } 
      else if(t.type===5){ 
        applyDmg(aimTarget, lv.d);
        self.floatingTexts.push({x: aimTarget.x, y: aimTarget.y - 20, text: '-'+lv.d, col: '#FF3B30', life: 1.2});
        self.particles.push({type:'ray',x1:t.x,y1:t.y,x2:aimTarget.x,y2:aimTarget.y,life:7,col:base.col});
        if(typeof playSound === 'function') playSound('pb');
      }
      else if(t.type===6){ 
        var vR = lv.r * (t.lvl>=3?1.0:t.lvl>=2?0.85:0.7);
        self.particles.push({type:'vortex',x:t.x,y:t.y,r:vR,life:20,rot:t.rot,col:base.col});
        var massPulled = 0; var massLimit = 5 + (t.lvl * 5); 
        
        targetsInRange.forEach(function(e){
          if (!e.isMoab && massPulled < massLimit && Math.hypot(e.x-t.x,e.y-t.y) <= vR) {
    massPulled += (e.mass || 1);
    var px = t.x - e.x, py = t.y - e.y, pd = Math.hypot(px, py);
    if (pd > 10) {
        e.x += (px/pd) * 15; e.y += (py/pd) * 15;
        // Walk wp backward to match pulled position so enemy doesn't teleport
        while (e.wp > 1) {
            var prevPt = self.paths[e.pathIdx][e.wp - 1];
            var currPt = self.paths[e.pathIdx][e.wp];
            var toPrev = Math.hypot(e.x - prevPt.x, e.y - prevPt.y);
            var toCurr = Math.hypot(e.x - currPt.x, e.y - currPt.y);
            if (toPrev < toCurr) { e.wp--; } else { break; }
        }
    }
    e.stun = Math.max(e.stun||0, 10);
    applyDmg(e, lv.d);
}
        });
        if(typeof playSound === 'function') playSound('jump');
      }
    });

    for(var i=this.projectiles.length-1;i>=0;i--){
      var p=this.projectiles[i];
      if(p.delay>0){p.delay--;continue;}
      
      this.particles.push({x:p.x, y:p.y, life:0.6, c:p.col, r:2, type:'trail'});
      
      var pspd = 12;
      if(p.target && p.target.hp>0) { p.tx=p.target.x; p.ty=p.target.y; }
      var dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
      
      if(d<pspd){
        if(p.type===2){ 
          var sr = 65+(((p.lvl||1)-1)*18);
          this.particles.push({type:'explosion',x:p.tx,y:p.ty,r:sr,life:14});
          
          var checkHit = function(e) {
              var ed = Math.hypot(e.x-p.tx, e.y-p.ty);
              if(ed <= sr) {
                  var falloff = 1 - (ed / sr) * 0.75; 
                  var splashDmg = Math.floor(p.dmg * falloff);
                  e.hp -= splashDmg; p.tower.totalDmg += splashDmg;
                  if(e.hp <= 0 && !e.isMoab) p.tower.kills++;
              }
          };
          this.enemies.forEach(checkHit);
          if (this.moab) checkHit(this.moab);
          
          if(typeof playSound === 'function') playSound('crash');
        } else if (p.type === 3) { 
          if(p.target) {
             p.target.hp -= p.dmg; p.tower.totalDmg += p.dmg;
             p.target.poison = Math.max(p.target.poison||0, 20); 
             if(p.target.hp <= 0 && !p.target.isMoab) p.tower.kills++;
          }
          for(var k=0;k<6;k++) this.particles.push({x:p.tx,y:p.ty,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,c:p.col,r:2});
        } else {
          if(p.target) { p.target.hp -= p.dmg; p.tower.totalDmg += p.dmg; if(p.target.hp <= 0 && !p.target.isMoab) p.tower.kills++; }
          for(var k=0;k<6;k++) this.particles.push({x:p.tx,y:p.ty,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,c:p.col||'#00E5FF',r:2});
        }
        this.projectiles.splice(i,1);
      } else {
        p.x+=dx/d*pspd; p.y+=dy/d*pspd;
        if(p.type===2) this.particles.push({x:p.x,y:p.y,vx:0,vy:0,life:0.4,c:'rgba(100,220,100,0.5)',r:5});
      }
    }

    for(var i=this.enemies.length-1;i>=0;i--){
      var e=this.enemies[i];
      if(e.hp<=0){
        var def=this.eDef[e.type];
        var scoreMult = activeDiff === 'Hard' ? 1.5 : activeDiff === 'Medium' ? 1.2 : 1.0;
        this.credits += def.rew;
        rawScore += Math.floor(def.rew * 10 * scoreMult);
        
        for(var k=0;k<18;k++) this.particles.push({x:e.x,y:e.y, vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7, life:1,c:e.isSpawn?'#FF003C':def.col,r:3});
        
        if(e.type===3&&typeof particlesEnabled!=='undefined'&&particlesEnabled&&typeof launchConfetti==='function') launchConfetti();
        if(e.type===5) for(var k=0;k<35;k++) this.particles.push({x:e.x,y:e.y, vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:1.2,c:'#00FF88',r:4});
        
        this.floatingTexts.push({x:e.x, y:e.y, text:'+$'+def.rew, col:'#FFD700', life:1.5});
        
        this.enemies.splice(i,1); 
        if(typeof playSound === 'function') playSound('coin');
      }
    }

    if(this.enemies.length===0&&this.spawnQueue.length===0&&!this.moab&&!this._betweenWaves&&!this._victoryPending){
      if(!this.endless&&this.wave>=this.maxWaves){
        this._victoryPending=true;
        this.state='victory';
        rawScore+=15000+this.lives*500;
        if(typeof playSound === 'function') playSound('win');
      } else {
        this._betweenWaves=true; this.wave++;
        if(this.endless) this.endlessBonus++;
        var bonus=Math.floor(70+this.wave*7+(this.endless?this.endlessBonus*20:0));
        this.credits+=bonus;
        if(typeof showToast==='function'){
          var isMW = (this.wave % 10 === 0);
          var label = this.endless ? 'ENDLESS Wave '+this.wave : 'Wave '+this.wave;
          showToast(label + (isMW ? ' — ⚠️ MOAB INBOUND!' : ' incoming') + '  +$'+bonus);
        }
        if(typeof playSound === 'function') playSound('jump');
        
        // NEW FRAME COUNTER FIX
        this._breakTimer = Math.max(60, Math.round(240 / (this.gameSpeed||1))); 
      }
    }

    for(var i=this.particles.length-1;i>=0;i--){
      var pt=this.particles[i];
      if(pt.type === 'beam') { pt.life -= 1; } 
      else if(pt.type === 'trail') { pt.life -= 0.08; }
      else if(pt.vx!==undefined){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.92;pt.vy*=0.92;pt.life-=0.05;}
      else pt.life--;
      if(pt.life<=0) this.particles.splice(i,1);
    }
    
    for(var i=this.floatingTexts.length-1;i>=0;i--){
      var ft = this.floatingTexts[i];
      ft.y -= 1; ft.life -= 0.02;
      if(ft.life<=0) this.floatingTexts.splice(i,1);
    }
  },

  // ═══════════════════════════════════════════════════════════════════════
  // DRAW ENGINE (Visuals Overhaul & Holographic HUD)
  // ═══════════════════════════════════════════════════════════════════════
  draw: function(){
    var W=1120,H=680;
    ctx.save();
    if(this.screenShake>0){ ctx.translate((Math.random()-.5)*this.screenShake*1.2,(Math.random()-.5)*this.screenShake*1.2); }

    // Deep Orbit / Nebula Background
    ctx.fillStyle='#050914'; ctx.fillRect(0,0,W,H);
    
    // Drifting Stars
    var self = this;
    this.stars.forEach(function(s) {
        s.x -= s.v;
        if (s.x < 0) s.x = W;
        ctx.fillStyle = s.c;
        ctx.globalAlpha = 0.5 + Math.sin(self.fc * 0.05 + s.x) * 0.5;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // Nebula Clouds
    var n1 = ctx.createRadialGradient(W*0.3 + Math.sin(this.fc*0.005)*100, H*0.3, 0, W*0.3, H*0.3, 500);
    n1.addColorStop(0, 'rgba(123, 47, 190, 0.15)'); n1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = n1; ctx.fillRect(0,0,W,H);

    var n2 = ctx.createRadialGradient(W*0.8 + Math.cos(this.fc*0.004)*100, H*0.7, 0, W*0.8, H*0.7, 400);
    n2.addColorStop(0, 'rgba(0, 229, 255, 0.1)'); n2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = n2; ctx.fillRect(0,0,W,H);

    // Glowing Paths + Flow Indicators
    this.paths.forEach(function(p){
      ctx.shadowBlur=22; ctx.shadowColor='#7B2FBE';
      ctx.strokeStyle='rgba(123,47,190,0.35)'; ctx.lineWidth=30; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++) ctx.lineTo(p[i].x,p[i].y); ctx.stroke();
      
      ctx.shadowBlur=8; ctx.shadowColor='#B026FF';
      ctx.strokeStyle='#8A2BE2'; ctx.lineWidth=6;
      ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++) ctx.lineTo(p[i].x,p[i].y); ctx.stroke();
      
      // Flow Chevrons (>>>)
      ctx.shadowBlur=0; ctx.strokeStyle='rgba(0,229,255,0.4)'; ctx.lineWidth=2; 
      ctx.setLineDash([8, 30]); ctx.lineDashOffset = -self.fc * 2;
      ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++) ctx.lineTo(p[i].x,p[i].y); ctx.stroke(); ctx.setLineDash([]);
    });

    this.towers.forEach(function(t){self._drawTower(t);});
    this.enemies.forEach(function(e){self._drawEnemy(e);});
    if(this.moab) this._drawMoab(this.moab);

    // Particles & Projectiles
    this.projectiles.forEach(function(p){
      if(p.delay>0) return;
      ctx.shadowBlur=10; ctx.shadowColor = p.col;
      if(p.type===0){ ctx.fillStyle='#FFF'; ctx.fillRect(p.x-3,p.y-3,6,6); }
      else { ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); }
      ctx.shadowBlur=0;
    });
    
    this.particles.forEach(function(pt){
      if(pt.type === 'beam') {
          ctx.strokeStyle = pt.col; ctx.lineWidth = pt.width; ctx.shadowBlur = 15; ctx.shadowColor = pt.col;
          ctx.beginPath(); ctx.moveTo(pt.x1, pt.y1); ctx.lineTo(pt.x2, pt.y2); ctx.stroke(); ctx.shadowBlur = 0;
      } else if(pt.type==='trail') {
        ctx.globalAlpha = Math.max(0, pt.life);
        ctx.fillStyle = pt.c; ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
      } else if(pt.type==='ray'||pt.type==='arc'){
        var isArc=pt.type==='arc';
        ctx.strokeStyle=(isArc?'rgba(255,213,0,':'rgba(255,59,48,')+(pt.life/8)+')';
        ctx.lineWidth=isArc?2:4; ctx.shadowBlur=15; ctx.shadowColor=pt.col||'#FF3B30';
        if(isArc){
          ctx.beginPath(); var steps=5,px=pt.x1,py=pt.y1,ex=pt.x2,ey=pt.y2;
          ctx.moveTo(px,py);
          for(var k=1;k<steps;k++){var t=k/steps;ctx.lineTo(px+(ex-px)*t+(Math.random()-.5)*18,py+(ey-py)*t+(Math.random()-.5)*18);}
          ctx.lineTo(ex,ey); ctx.stroke();
        } else { ctx.beginPath();ctx.moveTo(pt.x1,pt.y1);ctx.lineTo(pt.x2,pt.y2);ctx.stroke(); }
        ctx.shadowBlur=0;
      } else if(pt.type==='nova'){
        var a=pt.life/12; ctx.strokeStyle='rgba(181,234,215,'+a+')'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/12),0,Math.PI*2); ctx.stroke();
      } else if(pt.type==='vortex'){
        var a=pt.life/20, vr=pt.r*(1-pt.life/20)*0.5+pt.r*0.5;
        ctx.strokeStyle='rgba(139,92,246,'+a+')'; ctx.lineWidth=3; ctx.shadowBlur=10; ctx.shadowColor='#8B5CF6';
        ctx.beginPath();
        for(var k=0;k<4;k++){ var ang=pt.rot*0.05+k*(Math.PI/2); ctx.moveTo(pt.x+Math.cos(ang)*vr*0.2,pt.y+Math.sin(ang)*vr*0.2); ctx.arc(pt.x,pt.y,vr*(0.2+k*0.2),ang,ang+Math.PI*1.5); }
        ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.beginPath(); ctx.arc(pt.x, pt.y, 8, 0, Math.PI*2); ctx.fill();
      } else if(pt.type==='explosion'){
        var a=pt.life/14;
        ctx.fillStyle='rgba(52,168,83,'+a*0.4+')'; ctx.shadowBlur=20; ctx.shadowColor='#34A853';
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/14),0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(160,255,100,'+a*0.8+')'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/14),0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
      } else {
        ctx.globalAlpha=Math.max(0,pt.life); ctx.fillStyle=pt.c; ctx.shadowBlur=8; ctx.shadowColor=pt.c;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; ctx.shadowBlur=0;
      }
    });

    this.floatingTexts.forEach(function(ft) {
        ctx.globalAlpha = Math.max(0, ft.life);
        ctx.fillStyle = ft.col; ctx.font = 'bold 16px "Google Sans",Arial';
        ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
    });

    // Draw dragging tower preview
    if(this.dragType !== null) {
        var snap = this._snapToGrid(this.mouseX, this.mouseY);
        var def = this.tDef[this.dragType];
        var lv = this._lvlStat(this.dragType, 1);
        var valid = this.isValidTile(snap.x, snap.y);
        var afford = this.credits >= def.c;
        
        ctx.save(); ctx.globalAlpha = 0.5;
        this._drawTower({x: snap.x, y: snap.y, type: this.dragType, lvl: 1, rot: 0, cd: 0});
        ctx.globalAlpha = 1.0;
        
        ctx.beginPath(); ctx.arc(snap.x, snap.y, lv.r, 0, Math.PI*2);
        ctx.fillStyle = valid && afford ? 'rgba(52,199,89,0.2)' : 'rgba(255,59,48,0.2)'; ctx.fill();
        ctx.strokeStyle = valid && afford ? '#34C759' : '#FF3B30'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
    }

    this._drawHUD(W,H);

    if(this._moabWarning > 50){
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0, H/2-34, W, 68);
      if(this.fc%18<9){
        ctx.fillStyle='#FF003C'; ctx.shadowBlur=20; ctx.shadowColor='#FF003C';
        ctx.font='bold 26px "Google Sans",Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('⚠️  MOAB CLASS DREADNOUGHT APPROACHING  ⚠️', W/2, H/2);
        ctx.shadowBlur=0;
      }
      ctx.textBaseline='alphabetic';
    }

    if(this.state==='victory'){
      ctx.fillStyle='rgba(5,10,25,0.85)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='bold 42px "Google Sans",Arial';
      ctx.fillStyle='#34C759'; ctx.shadowBlur=20; ctx.shadowColor='#34C759';
      ctx.fillText('SECTOR SECURED — WAVE 99', W/2, H/2-80); ctx.shadowBlur=0;
      ctx.font='bold 26px "Google Sans",Arial'; ctx.fillStyle='#FFD700';
      ctx.fillText('SCORE: '+rawScore, W/2, H/2-30);
      ctx.font='16px "Google Sans",Arial'; ctx.fillStyle='#a0b8d0';
      ctx.fillText('All 99 waves defeated. The sector stands.', W/2, H/2+10);
      this._drawVictoryBtn(W/2-110, H/2+70, 200, 42, 'ENDLESS MODE', '#00E5FF');
      this._drawVictoryBtn(W/2+110, H/2+70, 160, 42, 'RETIRE', '#FF3B30');
      ctx.textBaseline='alphabetic';
      return;
    }

    if(this.paused){
      ctx.fillStyle='rgba(5,10,25,0.6)'; ctx.fillRect(0, 46, W, H-46);
      ctx.fillStyle='#FFD700'; ctx.font='bold 36px "Google Sans",Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowBlur=16; ctx.shadowColor='#FFD700';
      ctx.fillText('⏸  PAUSED', W/2, H/2);
      ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
    }

    if(this._flashMsg&&this._flashMsg.timer>0){
      ctx.globalAlpha=Math.min(1,this._flashMsg.timer/30);
      ctx.fillStyle=this._flashMsg.col; ctx.font='bold 18px "Google Sans",Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(this._flashMsg.txt, W/2, H/2-60);
      ctx.globalAlpha=1; ctx.textBaseline='alphabetic';
    }
    ctx.restore();
  },

  _drawTower: function(t){
    var def=this.tDef[t.type],col=def.col,isSel=(t===this.selectedTower),fc=this.fc;
    ctx.save();
    var rx = 0, ry = 0;
    if (t.recoil > 0) { rx = -Math.cos(t.rot) * t.recoil; ry = -Math.sin(t.rot) * t.recoil; }
    ctx.translate(t.x + rx, t.y + ry);
    
    ctx.shadowBlur=isSel?24:12;ctx.shadowColor=col;
    ctx.fillStyle=isSel?'rgba(255,255,255,0.12)':'rgba(18,26,48,0.92)';
    ctx.strokeStyle=col;ctx.lineWidth=isSel?3:2;
    ctx.beginPath();
    
    if(t.type===0){ctx.arc(0,0,13+t.lvl*2,0,Math.PI*2);} // Pulse
    else if(t.type===1){var pts=4+t.lvl*2,cr=15+t.lvl*2,ci=cr*0.45;for(var k=0;k<pts*2;k++){var a=(Math.PI/pts)*k-Math.PI/2,rr=k%2===0?cr:ci;k===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();} // Cryo
    else if(t.type===2){var ar=13+t.lvl*2;if(t.lvl===3){var ch=ar*.35;ctx.moveTo(-ar+ch,-ar);ctx.lineTo(ar-ch,-ar);ctx.lineTo(ar,-ar+ch);ctx.lineTo(ar,ar-ch);ctx.lineTo(ar-ch,ar);ctx.lineTo(-ar+ch,ar);ctx.lineTo(-ar,ar-ch);ctx.lineTo(-ar,-ar+ch);ctx.closePath();}else ctx.rect(-ar,-ar,ar*2,ar*2);} // Arty
    else if(t.type===3){ ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); } // Toxic
    else if(t.type===4){var tr=14+t.lvl*3;ctx.moveTo(0,-tr);ctx.lineTo(tr*.7,0);ctx.lineTo(0,tr);ctx.lineTo(-tr*.7,0);ctx.closePath();} // Tesla
    else if(t.type===5){var hr=14+t.lvl*2;for(var k=0;k<6;k++){var a=(Math.PI/3)*k-Math.PI/6;k===0?ctx.moveTo(Math.cos(a)*hr,Math.sin(a)*hr):ctx.lineTo(Math.cos(a)*hr,Math.sin(a)*hr);}ctx.closePath();} // Sniper
    else if(t.type===6){ctx.arc(0,0,14+t.lvl*2,0,Math.PI*2); ctx.moveTo(-10,-10); ctx.lineTo(10,10); ctx.moveTo(10,-10); ctx.lineTo(-10,10);} // Vortex
    else if(t.type===7){ctx.arc(0,0,16+t.lvl*2,0,Math.PI*2); ctx.rect(-8,-8,16,16);} // Plasma
    
    ctx.fill();ctx.stroke();
    if(t.lvl>=2){ctx.strokeStyle=col;ctx.globalAlpha=0.35;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,(14+t.lvl*2)*0.55,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    if(t.lvl>=3){ctx.strokeStyle=col;ctx.globalAlpha=0.55;ctx.lineWidth=1.5;ctx.setLineDash([3,6]);ctx.save();ctx.rotate(fc*0.025);ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.setLineDash([]);ctx.globalAlpha=1;}
    ctx.shadowBlur=0;
    
    ctx.save();ctx.rotate(t.rot);ctx.fillStyle=col;ctx.shadowBlur=6;ctx.shadowColor=col;
    if(t.type===0){ctx.fillRect(0,-5,18+t.lvl*3,3);ctx.fillRect(0,2,18+t.lvl*3,3);if(t.lvl>=2){ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();}if(t.lvl>=3){ctx.fillRect(0,-10,14,2);ctx.fillRect(0,8,14,2);ctx.fillStyle='#fff';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
    else if(t.type===1){var s=(8+t.lvl*3)+Math.sin(fc*.12)*2.5;ctx.beginPath();if(t.lvl===1){ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);ctx.closePath();}else if(t.lvl===2){ctx.moveTo(0,-s*1.3);ctx.lineTo(s,0);ctx.lineTo(0,s*.8);ctx.lineTo(-s,0);ctx.closePath();}else{ctx.moveTo(0,-s*1.4);ctx.lineTo(s*.8,-s*.3);ctx.lineTo(s*.5,s*.8);ctx.lineTo(-s*.5,s*.8);ctx.lineTo(-s*.8,-s*.3);ctx.closePath();}ctx.fill();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(t.type===2){ctx.fillRect(-6,-6,12,12);ctx.fillStyle='#111';ctx.fillRect(3,-5,5,4);ctx.fillRect(3,1,5,4);if(t.lvl>=2){ctx.fillStyle=col;ctx.fillRect(5,-7,4,14);ctx.fillStyle='#111';ctx.fillRect(3,-8,5,3);}if(t.lvl>=3){ctx.fillStyle=col;ctx.fillRect(-11,-4,5,8);ctx.fillStyle='#111';ctx.fillRect(-11,-3,4,6);}}
    else if(t.type===3){ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill(); ctx.fillRect(0,-4, 20+t.lvl*3, 8); }
    else if(t.type===4){ctx.fillRect(-3,-14,6,14+t.lvl*3);ctx.beginPath();ctx.arc(0,-(14+t.lvl*3),4+t.lvl,0,Math.PI*2);ctx.fill();if(t.lvl>=2){ctx.fillRect(-9,-(12+t.lvl*2),4,3);ctx.fillRect(5,-(12+t.lvl*2),4,3);}if(t.lvl>=3){ctx.strokeStyle=col;ctx.globalAlpha=0.5+Math.sin(fc*.15)*0.3;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-(14+t.lvl*3),(6+Math.sin(fc*.2)*2),0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}}
    else if(t.type===5){var bLen=30+t.lvl*12;ctx.fillRect(-4,-3,bLen,6);if(t.lvl>=2){ctx.fillStyle='#111';ctx.fillRect(bLen-12,-5,10,10);ctx.fillStyle=col;ctx.fillRect(bLen-11,-4,8,8);ctx.fillStyle='#111';ctx.fillRect(bLen-9,-2,4,4);}if(t.lvl>=3){ctx.fillStyle=col;ctx.globalAlpha=0.7;ctx.fillRect(-2,3,2,9);ctx.fillRect(4,3,2,9);ctx.globalAlpha=1;}ctx.fillStyle='#FFF';ctx.fillRect(bLen-2,-1.5,5,3);}
    else if(t.type===6){ctx.globalAlpha=0.7+Math.sin(fc*.1)*0.3; ctx.beginPath(); ctx.arc(0,0,10+t.lvl*2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); }
    else if(t.type===7){ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill(); ctx.fillRect(0,-2,20,4); }
    ctx.restore(); ctx.shadowBlur=0;
    
    for(var l=0;l<t.lvl;l++){ctx.fillStyle=col;ctx.shadowBlur=5;ctx.shadowColor=col;ctx.beginPath();ctx.arc(-6+l*6,26,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.restore();
    
    if (isSel) {
        var range = this._lvlStat(t.type, t.lvl).r;
        ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.strokeStyle = def.col; ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]); ctx.beginPath(); ctx.arc(t.x, t.y, range, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.setLineDash([]);
    }
  },

  _drawEnemy: function(e){
    var def=this.eDef[e.type], frozen=e.slow>0, stunned=e.stun>0, poisoned=e.poison>0;
    var col=stunned?'#FFD700':(frozen?'#00E5FF':(poisoned?'#A040A0':def.col));

    if(e.isSpawn){
      var SPAWN_R = 26;
      ctx.save(); ctx.translate(e.x,e.y);
      ctx.shadowBlur=18; ctx.shadowColor='#FF003C';
      ctx.fillStyle='#FF003C'; ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,SPAWN_R,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
      if(stunned){ ctx.globalAlpha=0.5; ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(0,0,SPAWN_R,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
      else if(poisoned){ ctx.globalAlpha=0.5; ctx.fillStyle='#A040A0'; ctx.beginPath(); ctx.arc(0,0,SPAWN_R,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
      
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,SPAWN_R-2,0,Math.PI*2); ctx.clip();
      var img = this.moabImgs && this.moabImgs[e.spawnLdap];
      try {
        if(img && img.complete && img.naturalWidth > 0){ ctx.drawImage(img, -SPAWN_R+2,-SPAWN_R+2, (SPAWN_R-2)*2,(SPAWN_R-2)*2); } 
        else { ctx.fillStyle='#222'; ctx.fill(); ctx.fillStyle='#FFF'; ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('👾',0,1); }
      } catch(err){}
      ctx.restore(); ctx.restore();
      
      if(e.hp < e.maxHp) this._drawHPBar(e, {r:SPAWN_R});
      if(e.speechVisible && e.speech){ this._drawSpeechBubble(e.x, e.y - SPAWN_R - 6, e.speech); }
      if (frozen) { ctx.font='10px Arial'; ctx.fillText('❄️', e.x+SPAWN_R, e.y-SPAWN_R); }
      if (stunned) { ctx.font='10px Arial'; ctx.fillText('⚡', e.x-SPAWN_R, e.y-SPAWN_R); }
      if (poisoned) { ctx.font='10px Arial'; ctx.fillText('☠️', e.x+SPAWN_R, e.y+SPAWN_R); }
      return;
    }

    ctx.save(); ctx.translate(e.x,e.y);
    ctx.shadowBlur=stunned?22:(frozen?18:12); ctx.shadowColor=col;
    ctx.fillStyle='#0d1526'; ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath();
    if(e.type===0){ctx.save();ctx.rotate(e.angle);ctx.moveTo(def.r,0);ctx.lineTo(-def.r,def.r*.8);ctx.lineTo(-def.r*.4,0);ctx.lineTo(-def.r,-def.r*.8);ctx.closePath();ctx.restore();}
    else if(e.type===1){ctx.rect(-def.r,-def.r,def.r*2,def.r*2);}
    else if(e.type===2){ctx.save();ctx.rotate(e.angle);ctx.moveTo(def.r,0);ctx.lineTo(-def.r,def.r);ctx.lineTo(-def.r,-def.r);ctx.closePath();ctx.restore();}
    else if(e.type===3){for(var i=0;i<8;i++){var a=(Math.PI/4)*i+(this.fc*.025);i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,def.r*.5,0,Math.PI*2);ctx.fillStyle=def.col;ctx.fill();var pulse=.6+Math.sin(this.fc*.08)*.25;ctx.beginPath();ctx.arc(0,0,def.r*.2*pulse,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;ctx.restore();if(e.hp<e.maxHp)this._drawHPBar(e,def);return;}
    else if(e.type===4){ctx.save();ctx.rotate(e.angle+this.fc*.05);for(var i=0;i<6;i++){var a=(Math.PI/3)*i;i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.restore();}
    else{for(var i=0;i<12;i++){var a=(Math.PI/6)*i+(this.fc*.012);i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();for(var i=0;i<8;i++){var a=(Math.PI/4)*i-(this.fc*.018);i===0?ctx.moveTo(Math.cos(a)*def.r*.6,Math.sin(a)*def.r*.6):ctx.lineTo(Math.cos(a)*def.r*.6,Math.sin(a)*def.r*.6);}ctx.closePath();ctx.fillStyle=def.col;ctx.fill();ctx.stroke();var cPulse=.55+Math.sin(this.fc*.06)*.3;ctx.beginPath();ctx.arc(0,0,def.r*.25*cPulse,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;ctx.restore();if(e.hp<e.maxHp)this._drawHPBar(e,def);return;}
    ctx.fill(); ctx.stroke();
    if(frozen||stunned||poisoned){ctx.globalAlpha=0.3;ctx.fillStyle=stunned?'#FFD700':(poisoned?'#A040A0':'#B5EAD7');ctx.beginPath();ctx.arc(0,0,def.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    ctx.shadowBlur=0; ctx.restore();
    if(e.hp<e.maxHp) this._drawHPBar(e,def);

    if (frozen) { ctx.font='10px Arial'; ctx.fillText('❄️', e.x+def.r, e.y-def.r); }
    if (stunned) { ctx.font='10px Arial'; ctx.fillText('⚡', e.x-def.r, e.y-def.r); }
    if (poisoned) { ctx.font='10px Arial'; ctx.fillText('☠️', e.x+def.r, e.y+def.r); }
  },

  _drawSpeechBubble: function(ex, ey, text) {
    ctx.save(); ctx.font = 'bold 11px "Google Sans",Arial';
    var tw = ctx.measureText(text).width;
    var bw = tw + 14, bh = 18, bx = ex - bw/2, by = ey - bh - 4;
    ctx.fillStyle = 'rgba(255,255,220,0.92)'; ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1.5;
    ctx.shadowBlur = 6; ctx.shadowColor = '#FF003C';
    this.rRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex - 5, by + bh); ctx.lineTo(ex, by + bh + 6); ctx.lineTo(ex + 5, by + bh); ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,220,0.92)'; ctx.fill();
    ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ex - 5, by + bh); ctx.lineTo(ex, by + bh + 6); ctx.lineTo(ex + 5, by + bh); ctx.stroke();
    ctx.shadowBlur = 0; ctx.fillStyle = '#CC0000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  },

  _drawHPBar: function(e,def){
    var pct=e.hp/e.maxHp, bw=Math.max(28,def.r*2.6), bx=e.x-bw/2, by=e.y-def.r-11;

  _drawHUD: function(W,H){

    ctx.font='bold 14px "Google Sans",Arial'; ctx.textBaseline='middle';
    var isMoabWave = (this.wave % 10 === 0);
    var waveLabel  = this.endless ? '∞ '+this.wave : 'WAVE '+this.wave+'/99';
    
    ctx.fillStyle  = this.endless ? '#D070FF' : (isMoabWave ? '#FF003C' : '#E0E0E0');
    ctx.textAlign  = 'left'; ctx.shadowBlur = (this.endless || isMoabWave) ? 8 : 0; ctx.shadowColor= this.endless ? '#D070FF' : '#FF003C';
    ctx.fillText(waveLabel + (isMoabWave ? ' ⚠️' : ''), 20, 22); ctx.shadowBlur=0;
    
    ctx.fillStyle='#FFD700'; ctx.textAlign='center'; ctx.shadowBlur=6; ctx.shadowColor='#FFD700';

      ctx.fillText('▶'.repeat(this.gameSpeed)+' '+this.gameSpeed+'×', W/2 + 70, 22);

    var pct = this.lives / 100;

    ctx.fillText('❤ '+this.lives+'  INTEGRITY', W-20, 22); ctx.shadowBlur=0;

    ctx.fillStyle='rgba(160,160,180,0.5)'; ctx.font='11px "Google Sans",Arial'; ctx.textAlign='left'; ctx.fillText(activeDiff.toUpperCase(), 20, 38);
    ctx.textAlign='center'; ctx.fillText('SCORE '+rawScore, W/2, 38);

        for(var i=0; i<8; i++) {

            ctx.fillStyle = afford ? '#FFF' : '#64748B';
            ctx.font = 'bold 11px "Google Sans"'; ctx.fillText(def.n, bx + 35, dockY + 44);
            
            ctx.fillStyle = afford ? '#FFD700' : '#475569';
            ctx.font = 'bold 10px "Google Sans"'; ctx.fillText('$' + def.c, bx + 35, dockY + 56);
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath(); ctx.arc(bx + 12, dockY + 12, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.font = '9px "Google Sans"'; ctx.fillText(i+1, bx + 12, dockY + 15);
        }
    }

    // ── NEW UI: FLOATING CONTEXTUAL INSPECTOR ──
    if (this.selectedTower) {
        var st = this.selectedTower, def = this.tDef[st.type], lv = this._lvlStat(st.type, st.lvl);
        var upCost = def.c * st.lvl, refund = Math.floor(def.c * st.lvl * 0.6);
        var canUp = st.lvl < 3 && this.credits >= upCost;
        
        var fW = 160, fH = 210;
        var fmX = st.x + 35; if (fmX + fW > W - 10) fmX = st.x - fW - 35;
        var fmY = st.y - 105; if (fmY < 50) fmY = 50; else if (fmY + fH > H - 100) fmY = H - fH - 100;
        
        // Connecting line
        ctx.strokeStyle = def.col; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(st.x, st.y); ctx.lineTo(fmX + fW/2, fmY + fH/2); ctx.stroke();
        
        ctx.fillStyle = 'rgba(10, 15, 30, 0.95)';

        this.rRect(fmX, fmY, fW, fH, 8); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

        ctx.fillStyle = '#F87171'; ctx.fillText('Dmg: ' + Math.floor(st.totalDmg||0), fmX + fW/2, fmY + 104);
        
        // Target Mode
        ctx.fillStyle = '#1E293B'; this.rRect(fmX + 10, fmY + 110, fW - 20, 25, 6); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px "Google Sans"';
        ctx.fillText('TARGET: ' + (st.targetMode || 'first').toUpperCase(), fmX + fW/2, fmY + 127);
        
        // Upgrade
        var upBg = st.lvl >= 3 ? '#334155' : (canUp ? '#34C759' : '#B45309');
        ctx.fillStyle = upBg; this.rRect(fmX + 10, fmY + 140, fW - 20, 30, 6); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 12px "Google Sans"';
        if (st.lvl < 3) { ctx.fillText('UPGRADE ($' + upCost + ')', fmX + fW/2, fmY + 160); } 
        else { ctx.fillText('MAX LEVEL', fmX + fW/2, fmY + 160); }
        
        // Sell
        ctx.fillStyle = '#EF4444'; this.rRect(fmX + 10, fmY + 175, fW - 20, 25, 6); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 12px "Google Sans"'; ctx.fillText('SELL ($' + refund + ')', fmX + fW/2, fmY + 192);
    }

    // ── Early Wave Call Button ──
    if (this.spawnQueue.length === 0 && this._betweenWaves && !this.paused) {

        this.rRect(W - 200, H - 70, 180, 50, 8); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px "Google Sans"'; ctx.textAlign = 'center';
        ctx.fillText('⏩ CALL WAVE', W - 110, H - 48);
        ctx.font = 'bold 11px "Google Sans"'; ctx.fillText('Bonus: +$' + Math.floor(this._breakTimer/2), W - 110, H - 32);
    }
  },

  _drawMoab: function(m){
    var pct = m.hp / m.maxHp;
    ctx.save(); ctx.translate(m.x, m.y); ctx.rotate(m.angle);
    for(var eng = 0; eng < 3; eng++){
      var ey = (eng - 1) * 22;
      ctx.shadowBlur = 18; ctx.shadowColor = '#FF6600';
      ctx.fillStyle = 'rgba(255,'+(100+Math.floor(pct*155))+',0,0.8)';
      ctx.beginPath();
      ctx.ellipse(-m.r - 12 - Math.abs(Math.sin(this.fc*0.3+eng))*8, ey, 10 + Math.random()*5, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    
    if (pct < 0.4 && this.fc % 3 === 0) {
        this.particles.push({x:m.x + (Math.random()-0.5)*30, y:m.y + (Math.random()-0.5)*30, vx:-(Math.cos(m.angle)*4), vy:-(Math.sin(m.angle)*4), life:0.8, c:'rgba(100,100,100,0.6)', r:8+Math.random()*6});
        if (Math.random() > 0.5) this.particles.push({x:m.x + (Math.random()-0.5)*20, y:m.y + (Math.random()-0.5)*20, vx:0, vy:0, life:0.4, c:'#FF3B30', r:4});
    }

    ctx.shadowBlur = 28; ctx.shadowColor = '#FF003C';
    ctx.fillStyle = '#1a0508'; ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo( m.r,       0);
    ctx.lineTo( m.r*0.62, -m.r*0.54);
    ctx.lineTo(-m.r*0.28, -m.r*0.65);
    ctx.lineTo(-m.r*0.78, -m.r*0.50);
    ctx.lineTo(-m.r,      -m.r*0.28);
    ctx.lineTo(-m.r,       m.r*0.28);
    ctx.lineTo(-m.r*0.78,  m.r*0.50);
    ctx.lineTo(-m.r*0.28,  m.r*0.65);
    ctx.lineTo( m.r*0.62,  m.r*0.54);
    ctx.closePath();
    ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,0,60,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.r*0.2, -m.r*0.35); ctx.lineTo(-m.r*0.55, -m.r*0.35);
    ctx.moveTo(m.r*0.2,  m.r*0.35); ctx.lineTo(-m.r*0.55,  m.r*0.35);
    ctx.moveTo(-m.r*0.1,-m.r*0.5);  ctx.lineTo(-m.r*0.1,   m.r*0.5);
    ctx.stroke();
    if(pct < 0.35){
      var da = (0.35-pct)/0.35;
      ctx.shadowBlur = 18*da; ctx.shadowColor = '#FF4400';
      ctx.fillStyle = 'rgba(255,80,0,'+(da*(0.5+Math.sin(this.fc*0.25)*0.3))+')';
      ctx.beginPath(); ctx.arc(-m.r*0.25, m.r*0.22, 12+Math.sin(this.fc*0.18)*4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(0,229,255,0.2)'; ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8; ctx.shadowColor = '#00E5FF';
    ctx.beginPath(); ctx.ellipse(m.r*0.35, 0, m.r*0.18, m.r*0.14, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
    for(var wt = 0; wt < 2; wt++){
      var wy = (wt*2-1) * m.r * 0.37;
      ctx.fillStyle = '#2a0a0a'; ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, wy, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#FF003C'; ctx.shadowBlur = 6; ctx.shadowColor = '#FF003C';
      ctx.fillRect(7, wy-2, 15, 4); ctx.shadowBlur = 0;
    }
    ctx.restore();
    var bw = m.r * 3.8, bh = 11, bx = m.x - bw/2, by = m.y - m.r - 26;
    ctx.fillStyle = '#1a0508'; ctx.fillRect(bx-2, by-2, bw+4, bh+4);
    ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1.5; ctx.strokeRect(bx-2, by-2, bw+4, bh+4);
    var bc = pct > 0.6 ? '#FF003C' : pct > 0.3 ? '#FF6600' : '#FF0000';
    if(pct < 0.3) ctx.globalAlpha = 0.65 + Math.sin(this.fc * 0.22) * 0.35;
    ctx.fillStyle = bc; ctx.shadowBlur = 8; ctx.shadowColor = bc;
    ctx.fillRect(bx, by, bw*pct, bh);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.fillStyle = '#FF003C'; ctx.font = 'bold 12px "Google Sans",Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.shadowBlur = 5; ctx.shadowColor = '#FF003C';
    ctx.fillText('MOAB  ' + Math.ceil(m.hp).toLocaleString() + ' / ' + Math.ceil(m.maxHp).toLocaleString(), m.x, by - 3);
    ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
  },

  _drawVictoryBtn: function(cx,cy,w,h,label,col){
    ctx.fillStyle='rgba(8,15,30,0.95)'; ctx.strokeStyle=col; ctx.lineWidth=2;
    this.rRect(cx-w/2,cy-h/2,w,h,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 13px "Google Sans",Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,cx,cy);
  },
  
  _victoryClick: function(mx,my,W,H){
    var cy=H/2+70,bh=42;
    if(Math.abs(mx-(W/2-110))<100&&Math.abs(my-cy)<bh/2){
      this.endless=true; this._victoryPending=false; this.state='playing';
      this.wave++; this.endlessBonus=0; this.credits+=500;
      if(typeof showToast==='function') showToast('ENDLESS MODE ACTIVATED — survive as long as you can!');
      if(typeof playSound === 'function') playSound('win');
      var self=this; setTimeout(function(){self.generateWave();},400);
    }
    if(Math.abs(mx-(W/2+110))<80&&Math.abs(my-cy)<bh/2){
      if(typeof triggerGameOver === 'function') triggerGameOver('Sector Secured — Wave 99 Complete! Score: '+rawScore);
    }
  },

  click: function() {}
},
};
// ════════════════════════════════════════════════════════════
//  GAME ENGINE CONTROLLER & UI FUNCTIONS
// ════════════════════════════════════════════════════════════
var confetti=[];
function launchConfetti(){ if(!particlesEnabled) return; resizeConfCanvas();confetti=[]; for(var i=0;i<120;i++)confetti.push({x:Math.random()*confCanvas.width,y:-10,vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,color:['#EA4335','#FBBC05','#34A853','#1A73E8','#9C27B0'][Math.floor(Math.random()*5)],size:Math.random()*8+4,rot:Math.random()*360,rotV:(Math.random()-0.5)*8,a:1}); animateConfetti(); }
function animateConfetti(){ if(!confetti.length)return; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); confetti.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.rot+=c.rotV;c.a-=0.006;confCtx.save();confCtx.globalAlpha=Math.max(0,c.a);confCtx.fillStyle=c.color;confCtx.translate(c.x,c.y);confCtx.rotate(c.rot*Math.PI/180);confCtx.fillRect(-c.size/2,-c.size/2,c.size,c.size);confCtx.restore();}); confetti=confetti.filter(c=>c.a>0&&c.y<confCanvas.height+20); if(confetti.length)requestAnimationFrame(animateConfetti); else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }

function gameLoop(){
  if(isGameOver||isPaused) return; var game=Games[activeGameTitle];if(!game)return;
  if(game.update) game.update();
  if(game.engine==='canvas'){ 
    game.draw(); 
    score=Math.floor(rawScore * diffMult); 
    document.getElementById('hudScore').textContent=score;
  }
  reqAnimFrame=requestAnimationFrame(gameLoop);
}

function launchGame(diff,mult){
  var game=Games[activeGameTitle];if(!game)return; activeDiff=diff;diffMult=mult;
  document.getElementById('bsTitle').textContent = "Connecting to Server...";
  document.getElementById('globalLoader').classList.add('active');
  google.script.run.withSuccessHandler(function(res){
     if(res && res.success) {
        activeSecurityToken = res.token;
        closeModal('appSheetOverlay');
        document.getElementById('globalLoader').classList.remove('active');
        playBGM('bgmGame');
        var gs=document.getElementById('gameScreen'); gs.style.display='flex'; document.getElementById('activeGameTitle').textContent=activeGameTitle;
        logBountyProgress('gamesPlayed', activeGameTitle);
        isGameOver=false;isPaused=false;rawScore=0;score=0;keys={}; document.getElementById('hudScore').textContent='0';
        document.getElementById('gameOverScreen').classList.remove('open'); document.getElementById('pauseOverlay').classList.remove('visible'); document.getElementById('pauseBtn').textContent='⏸ Pause';
        
        // --- FIX: STRICT CANVAS RESET ---
        canvas.width = 700;
        canvas.height = 480;
        ctx.clearRect(0, 0, 700, 480);
        // --------------------------------
        
        if(game.engine==='canvas'){canvas.style.display='block';domEngine.style.display='none';} else{canvas.style.display='none';domEngine.style.display='flex';}
        if(reqAnimFrame){cancelAnimationFrame(reqAnimFrame);reqAnimFrame=null;}
        game.init();
        if(game.engine==='canvas' || game.update) reqAnimFrame=requestAnimationFrame(gameLoop);

function triggerGameOver(msg){
  if(isGameOver) return; isGameOver=true;
  if(reqAnimFrame){cancelAnimationFrame(reqAnimFrame);reqAnimFrame=null;}
  score=Math.floor(rawScore * diffMult);
  document.getElementById('hudScore').textContent=score;
  
  // --- WORK PRIORITIZATION CHECK ---
  sessionGamesCount++;
  if (sessionGamesCount >= 10) {
      setTimeout(() => {
          openModal('workReminderModal');
          playSound('crash');
      }, 800);
      sessionGamesCount = 0;
      sessionStartTime = Date.now();
  }
  // ---------------------------------
  
  document.getElementById('endStateText').textContent=msg||'Game Over';
  
  // THE FIX: This line actively updates the big green number!
  document.getElementById('finalScore').textContent=score; 
  
  document.getElementById('saveStatus').textContent='Encrypting and saving score...'; 
  document.getElementById('pbRibbon').style.display='none'; 
  document.getElementById('newAchievements').innerHTML='';
  document.getElementById('gameOverScreen').classList.add('open'); 
  document.getElementById('economyStatus').textContent='';
  
  logBountyProgress('arcadeScore', Math.floor(score / diffMult));
  
  if(score>0 && activeSecurityToken){
    google.script.run.withSuccessHandler(function(res){
      if(res&&res.success){
        document.getElementById('saveStatus').textContent='Saved ✓  '+(res.isPB?'New best!':'PB: '+res.prevPB);
        
        let econText = `Tickets: ${res.tickets} 🎟️ | Unspent: ${res.unspent.toLocaleString()}<br>`;
        econText += `<span style="color:var(--play-green); font-weight:bold;">+${res.earnedXP.toLocaleString()} XP & Pts</span>`;
        
        if (res.fatigueMult < 1.0) {
            let fatiguePct = Math.round(res.fatigueMult * 100);
            econText += `<br><span style="color:#FF3B30; font-size:11px; font-weight:900;">⚠️ FATIGUE ACTIVE: Rewards reduced to ${fatiguePct}% (Play a different game!)</span>`;
        }

        document.getElementById('economyStatus').innerHTML = econText;
        refreshWalletUI(); 
        document.getElementById('globalTicketCount').textContent = res.tickets;
        
        var uiPts = document.getElementById('uiPoints'); if (uiPts) uiPts.textContent = res.unspent.toLocaleString();
        var uiTkts = document.getElementById('uiTickets'); if (uiTkts) uiTkts.textContent = res.tickets;
        
        if(res.isPB){personalBests[activeGameTitle]=score;document.getElementById('pbRibbon').style.display='block';playSound('pb');launchConfetti();}
        
        var achDiv=document.getElementById('newAchievements');
        (res.newAchievements||[]).forEach(a=>{achDiv.innerHTML+='<span class="new-ach-chip">'+a.label+'</span>';setTimeout(()=>showToast(a.label+' — Achievement Unlocked!'),500);});
      } else { 
        document.getElementById('saveStatus').textContent='Score rejected by server.'; 
      }
      
      activeSecurityToken = null;
    }).withFailureHandler(function(){document.getElementById('saveStatus').textContent='Save error — check connection.';}).saveScore(activeGameTitle,activeDiff,score,activeSecurityToken);
  } else { 
    document.getElementById('saveStatus').textContent='Score too low to save.'; 
    activeSecurityToken = null; 
  }
}

function handleSearch(val) {
  document.getElementById('searchClear').style.display = val ? 'block' : 'none'; 
  var q = val.toLowerCase();
  var matches = Object.keys(Games).filter(n => n.toLowerCase().indexOf(q) !== -1 || Games[n].dev.toLowerCase().indexOf(q) !== -1 || Games[n].cat.toLowerCase().indexOf(q) !== -1);
  
  // Removed 'secLTM' and added null checks to make this crash-proof
  var allSections = ['secFeatured', 'secRecommended', 'secArcade', 'secBrain', 'secCard', 'bountyCard'];
  
  if(!val) { 
    allSections.forEach(id => { var el = document.getElementById(id); if(el) el.style.display = ''; }); 
    document.getElementById('emptySearch').classList.remove('visible'); 
    document.getElementById('recTitle').textContent = 'Recommended for you'; 
    renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3))); 
    return; 
  }
  
  allSections.forEach(id => { var el = document.getElementById(id); if(el) el.style.display = 'none'; });
  
  if(matches.length === 0){ 
    document.getElementById('secRecommended').style.display = 'none'; 
    document.getElementById('emptySearch').classList.add('visible'); 
  } else { 
    document.getElementById('secRecommended').style.display = ''; 
    document.getElementById('emptySearch').classList.remove('visible'); 
    renderRow('rowRecommended', matches); 
    document.getElementById('recTitle').textContent = 'Results for "' + val + '"'; 
  }
}

function filterCategory(cat, el) {
  // Security check: Bounce if locked
  if (el && el.classList.contains('locked')) { showToast('🔒 ' + el.innerText); return; }

  // Call showTab and pass the element ID so the green indicator slides over!
  showTab('storeFront', el ? el.id : null); 
  
  // Safely clear search text without triggering the global handleSearch reset
  var inp = document.getElementById('searchInput');
  if(inp) inp.value = '';
  document.getElementById('searchClear').style.display = 'none';
  
  var isAll = (cat === 'All');
  
  // Crash-proof visibility toggle
  var setDisplay = (id, show) => { var e = document.getElementById(id); if(e) e.style.display = show ? '' : 'none'; };

  // 1. Hide the top fluff if we aren't on the main page
  setDisplay('secFeatured', isAll);
  setDisplay('bountyCard', isAll);
  
  // 2. Hide the static categories so we don't get duplicates
  setDisplay('secArcade', isAll);
  setDisplay('secBrain', isAll);
  setDisplay('secCard', isAll);
  
  document.getElementById('emptySearch').classList.remove('visible');
  
  // 3. Always show the Recommended section, repurposing it for the tabs!
  setDisplay('secRecommended', true);
  
  // 4. Fill the row based on what tab you clicked
  if (isAll) { 
    document.getElementById('recTitle').textContent = 'Recommended for you';
    renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3))); 
  } else if (cat === 'Arcade') {

function loadLeaderboard() {
  var gameEl = document.getElementById('lbSelect');
  var game = gameEl ? gameEl.value : '';
  var el = document.getElementById('leaderboardList'); 
  if(!el) return;
  
  el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">Loading charts...</span></div>';
  
  google.script.run.withSuccessHandler(function(rows){ 
    try {
        var rankEmoji = ['🥇','🥈','🥉']; 
        
        // Failsafe: Ensure we have a valid array
        if (typeof rows === 'string') rows = JSON.parse(rows);
        if(!rows || !Array.isArray(rows) || rows.length === 0) {
            el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">No scores yet for this game. Be the first to play! 🎮</span></div>';
            return;
        } 
        
        // Sanitize and filter out empty/zero scores
        let processedRows = rows.map(r => {
            let rawVal = r.score !== undefined ? r.score : (r.xp !== undefined ? r.xp : 0);
            let numVal = typeof rawVal === 'number' ? rawVal : (parseInt(String(rawVal).replace(/,/g, '')) || 0);
            return { ...r, parsedScore: numVal };
        }).filter(r => r.parsedScore > 0); // Hide players with 0 score

        if(processedRows.length === 0) {
            el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">No scores yet for this game. Be the first to play! 🎮</span></div>';
            return;
        }

        // Re-sort just to be absolutely certain the highest scores are at the top
        processedRows.sort((a, b) => b.parsedScore - a.parsedScore);

        el.innerHTML = processedRows.map((r, index) => {
            let rank = r.rank || (index + 1);
            let rankBadge = rank <= 3 ? ['gold','silver','bronze'][rank-1] : '';
            let rankDisplay = rank <= 3 ? rankEmoji[rank-1] : rank;
            let youChip = r.isYou ? '<span class="lb-you-chip">YOU</span>' : '';
            let diffChip = r.diff ? `<span class="lb-diff-chip ${r.diff}">${r.diff}</span>` : '';
            let ldapStr = r.ldap || r.name || 'Unknown';
            
            return `<div class="lb-row ${r.isYou?'you':''}">
                      <div class="lb-rank ${rankBadge}">${rankDisplay}</div>
                      <div class="lb-ldap">${ldapStr} ${youChip} ${diffChip}</div>
                      <div class="lb-score">${r.parsedScore.toLocaleString()}</div>
                    </div>`;
        }).join(''); 
    } catch (e) {
        console.error("Leaderboard Render Error:", e);
        el.innerHTML = '<div class="lb-row"><span style="color:#FF3B30;font-size:14px;">Error rendering charts. Check console.</span></div>';
    }
  }).withFailureHandler(function(err){
      console.error("Server Error:", err);
      el.innerHTML = '<div class="lb-row"><span style="color:#FF3B30;font-size:14px;">Failed to fetch from server. Try again.</span></div>';
  }).getArcadeLeaderboard(game, lbFilter); // <--- CALLING THE NEW UNIQUE ENDPOINT
}

function buildPodiumStep(user, rank, unit) {
  var cls = rank===1 ? 'podium-1' : rank===2 ? 'podium-2' : 'podium-3';
  let safeUnit = unit || 'XP';
  
  var lvl = Math.floor(Math.sqrt((user.xp || user.score || 0) / 1500)) + 1;
  var rankBadge = rank === 1 ? '1ST' : rank === 2 ? '2ND' : '3RD';
  
  var rankColor = rank === 1 ? '#FFD700' : rank === 2 ? '#E2E8F0' : '#F59E0B';
  var rankShadow = rank === 1 ? '0 2px 10px rgba(255,215,0,0.4)' : '0 2px 8px rgba(0,0,0,0.5)';
  var badgeSize = rank === 1 ? '32px' : '24px';

  return `<div class="podium-step ${cls}">
            <div class="podium-name">${user.tag ? '<span style="color:#FFFDE4; opacity:0.6; font-size:10px; letter-spacing:1px;">['+user.tag+']</span><br>' : ''}${user.ldap}</div>
            <div class="podium-avatar" style="padding:0;">${getMomaAvatar(user.ldap)}</div>
            <div class="podium-block">
              <div style="font-size:${badgeSize}; font-weight:900; color:${rankColor}; text-shadow:${rankShadow}; font-family:'Google Sans Display', sans-serif; letter-spacing:2px;">${rankBadge}</div>
              
              <div style="width: 30px; height: 2px; background: ${rankColor}; opacity: 0.4; margin: 10px 0; border-radius: 2px;"></div>
              
              <div style="font-size:12px; font-weight:700; color:rgba(255,255,255,0.8); letter-spacing:1px; text-transform:uppercase;">Lv. ${lvl}</div>
              <div class="podium-score">${user.score.toLocaleString()}</div>
              <div style="font-size:10px; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1.5px;">${safeUnit}</div>
            </div>
          </div>`;
}

  document.getElementById('drawerContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:14px;">Loading your stats…</div>';
  google.script.run.withSuccessHandler(function(stats){
    if(!stats){ document.getElementById('drawerContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--g-red);font-size:14px;">⚠️ Could not load profile.<br><br><button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="openProfile()">Retry</button></div>'; return; }
    
    var drawerAv = document.getElementById('drawerAvatar'); 
    drawerAv.innerHTML = getMomaAvatar(stats.ldap); 
    drawerAv.style.overflow = 'hidden'; 
    drawerAv.style.padding = '0';
    
    var tier = getTierInfo(stats.xp);
    drawerAv.className = 'drawer-avatar ' + tier.cls;
    document.getElementById('drawerName').innerHTML = stats.ldap + ' <span class="tier-badge '+tier.badge+'" style="margin-left:6px; font-size:10px; padding:2px 6px; vertical-align:middle;">'+tier.icon+' '+tier.name+'</span>';

    var earned=new Set((stats.achievements||[]).map(a=>a.id)), bestEntries=Object.entries(stats.bests||{}).sort((a,b)=>b[1]-a[1]).slice(0,6);
    var favGame=stats.favoriteGame, favIconRaw=favGame&&Games[favGame]?Games[favGame].icon:'🎮';
    var favIconHtml = favIconRaw.startsWith('http') ? `<img src="${favIconRaw}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.2);">` : `<div style="font-size:32px;">${favIconRaw}</div>`;

    let currentXP = stats.xp || 0;
    let playerLvl = Math.floor(Math.sqrt(currentXP / 1500)) + 1;
    let prevLvlPts = Math.pow(playerLvl - 1, 2) * 1500;
    let nextLvlPts = Math.pow(playerLvl, 2) * 1500;
    let expProgress = ((currentXP - prevLvlPts) / (nextLvlPts - prevLvlPts)) * 100;

    let cVal = parseFloat(stats.csat) || 0;
    let aVal = parseFloat(stats.attendance) || 0;
    if (cVal > 0 && cVal <= 1.0) cVal = cVal * 100;
    if (aVal > 0 && aVal <= 1.0) aVal = aVal * 100;

    let totalMult = 1.0;
    if (cVal >= 95) totalMult += 0.5; else if (cVal >= 90) totalMult += 0.25;
    if (aVal >= 100) totalMult += 0.5; else if (aVal >= 95) totalMult += 0.25;
    
    let displayCsat = stats.csat !== '' ? cVal.toFixed(1) + '%' : 'No Data';
    let displayAtt = stats.attendance !== '' ? aVal.toFixed(1) + '%' : 'No Data';

    // ─── MINI-BENTO GRID LAYOUT ───
    var html = `
      <div class="profile-bento-grid">
        <div class="profile-bento-card" style="grid-column: 1 / -1; background: linear-gradient(135deg, rgba(66, 133, 244, 0.1), rgba(124, 77, 255, 0.1)); border-color: rgba(124, 77, 255, 0.3);">
           <div style="display:flex; align-items:center; gap:16px;">
              <div class="level-ring" style="width:48px; height:48px; font-size:22px; flex-shrink:0; box-shadow:0 4px 10px rgba(124,77,255,0.4); border-color: #7c4dff; color: #7c4dff;">${playerLvl}</div>
              <div style="flex:1;">
                 <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; font-weight:bold; color:var(--text-main);">
                    <span>Level ${playerLvl}</span>
                    <span style="color:#7c4dff;">${currentXP.toLocaleString()} / ${nextLvlPts.toLocaleString()} XP</span>
                 </div>
                 <div class="exp-bar-bg" style="width:100%; height:8px; background: rgba(0,0,0,0.2);"><div class="exp-bar-fill" style="width:${Math.max(0, Math.min(100, expProgress))}%; background: linear-gradient(90deg, #4285F4, #7c4dff);"></div></div>
              </div>
           </div>
        </div>

        <div class="profile-bento-card">
           <div style="font-size:10px; font-weight:900; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; letter-spacing:1px;">🕹️ Arcade Stats</div>
           <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span style="font-size:12px; color:var(--text-main);">Games Played</span>
              <span style="font-size:14px; font-weight:900;">${stats.gamesPlayed}</span>
           </div>
           <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span style="font-size:12px; color:var(--text-main);">Total Score</span>
              <span style="font-size:14px; font-weight:900; color:#4ADE80;">${stats.totalScore.toLocaleString()}</span>
           </div>
           <div style="display:flex; justify-content:space-between;">
              <span style="font-size:12px; color:var(--text-main);">Games Tried</span>
              <span style="font-size:14px; font-weight:900;">${Object.keys(stats.bests||{}).length}</span>
           </div>
        </div>

        <div class="profile-bento-card">
           <div style="font-size:10px; font-weight:900; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; letter-spacing:1px;">💼 Work Metrics</div>
           <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span style="font-size:12px; color:var(--text-main);">CSAT</span>
              <span style="font-size:14px; font-weight:900; color:${cVal >= 90 ? '#4ADE80' : 'var(--text-main)'};">${displayCsat}</span>
           </div>
           <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span style="font-size:12px; color:var(--text-main);">Attendance</span>
              <span style="font-size:14px; font-weight:900; color:${aVal >= 95 ? '#4ADE80' : 'var(--text-main)'};">${displayAtt}</span>
           </div>
           <div style="display:flex; justify-content:space-between;">
              <span style="font-size:12px; color:var(--text-main);">Active Buff</span>
              <span style="font-size:13px; font-weight:900; color:${totalMult > 1.0 ? '#FACC15' : 'var(--text-muted)'}; text-shadow:${totalMult > 1.0 ? '0 0 10px rgba(250,204,21,0.5)' : 'none'};">${totalMult}x XP</span>
           </div>
        </div>
      </div>
    `;
    
    if(favGame) html+=`<div class="drawer-section"><div class="drawer-section-title">⭐ Favorite Game</div><div class="fav-game-banner"><div class="fav-game-emoji" style="display:flex;align-items:center;justify-content:center;margin-right:4px;">${favIconHtml}</div><div class="fav-game-text"><h4>${favGame}</h4><p>Played ${stats.gameCounts[favGame]} time${stats.gameCounts[favGame]>1?'s':''}</p></div></div></div>`;
    
    if(bestEntries.length>0) html+=`<div class="drawer-section"><div class="drawer-section-title">🏆 Personal Bests</div>${bestEntries.map(e=>{
       let ic = Games[e[0]] ? Games[e[0]].icon : '🎮';
       let iconRender = ic.startsWith('http') ? `<img src="${ic}" style="width:24px;height:24px;border-radius:6px;object-fit:cover;">` : `<span style="font-size:18px;">${ic}</span>`;
       return `<div class="best-row"><div class="best-game" style="display:flex;align-items:center;gap:10px;">${iconRender} <span>${e[0]}</span></div><div class="best-score">${e[1].toLocaleString()}</div></div>`;
    }).join('')}</div>`;
    
    var isHacker = stats.unlockedThemes?.hacker || earned.has('legend') || stats.totalScore >= 5000; var isRetro = stats.unlockedThemes?.retro_crt || earned.has('hardcore');
    html += `<div class="drawer-section"><div class="drawer-section-title">🎨 Unlockable Themes</div><div style="display:flex; gap:8px; flex-wrap:wrap;"><button class="filter-chip active" onclick="setTheme('light')">Light</button><button class="filter-chip" onclick="setTheme('dark')">Dark</button>${isHacker ? `<button class="filter-chip" onclick="setTheme('hacker')">Matrix 🟢</button>` : ''}${isRetro ? `<button class="filter-chip" onclick="setTheme('retro_crt')">CRT 📺</button>` : ''}${localStorage.getItem('unlocked_vvip') === 'true' ? `<button class="filter-chip" style="background: linear-gradient(135deg, #BF953F, #AA771C); color: #000; font-weight: bold; border: none;" onclick="setTheme('vvip')">VVIP 💳</button>` : ''}${(!isHacker || !isRetro) ? `<p style="font-size:10px; color:#888; margin-top:8px;">Reach 5000 pts or beat Hard mode to unlock more!</p>` : ''}</div>`;

    if(stats.achievementDefs){
      html+=`<div class="drawer-section"><div class="drawer-section-title">🎖️ Achievements (${earned.size}/${Object.keys(stats.achievementDefs).length})</div><div class="ach-grid">`;
      Object.entries(stats.achievementDefs).forEach(entry=>{ var id=entry[0],def=entry[1],isEarned=earned.has(id),parts=def.label.split(' '),icon=parts[0],name=parts.slice(1).join(' '); html+=`<div class="ach-badge ${isEarned?'earned':'ach-locked'}"><div class="ach-badge-icon">${icon}</div><div class="ach-badge-label">${name}</div><div class="ach-badge-desc">${def.desc}</div></div>`; }); html+='</div></div>';
    }
    if(bestEntries.length===0&&earned.size===0) html+=`<div style="padding:30px 20px;text-align:center;color:var(--text-muted);"><div style="font-size:40px;margin-bottom:12px;">🎮</div><div style="font-size:14px;">No games played yet!<br>Pick a game and start playing.</div></div>`;
    document.getElementById('drawerContent').innerHTML=html;
  }).withFailureHandler(function(err){ document.getElementById('drawerContent').innerHTML=`<div style="padding:40px;text-align:center;color:var(--g-red);font-size:14px;">⚠️ Error: ${err&&err.message?err.message:'Unknown error'}<br><br><button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="openProfile()">Retry</button></div>`; }).getProfileStats();
}

function openSettings() {
   openModal('settingsModal');
   // Fetch their current tag/team from server so the boxes aren't blank
   document.getElementById('setTeam').value = 'Loading...';
   document.getElementById('setTag').value = '...';
   google.script.run.withSuccessHandler(function(stats){
       if(stats) {
           document.getElementById('setTeam').value = stats.team || '';
           document.getElementById('setTag').value = stats.tag || '';
       }
   }).getProfileStats();
}

function saveSettings() {
  // Volume, Theme, and Particles save automatically on change, so just close the modal.
  closeModal('settingsModal');

  var team = document.getElementById('setTeam').value.trim();
  var tag = document.getElementById('setTag').value.trim();
  var btn = document.getElementById('btnSaveSettings');
  
  showToast('Saving profile to server...');
  google.script.run.withSuccessHandler(function(res) {
     if(res.success) { 
         showToast('✅ ' + res.message); 
         // Force the leaderboard to refresh so they can see their new tag!
         if(document.getElementById('hallOfFame').classList.contains('active')) loadHallOfFame('xp'); 
     }
     else { showToast('❌ ' + res.message); }
  }).updatePlayerProfile(team, tag);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme); 
  activeThemeName = theme;
  localStorage.setItem('arcade_theme', theme); // <--- SAVE TO STORAGE

  var select = document.getElementById('themeSelect');
  if(select && select.value !== theme) select.value = theme;
  
  document.querySelectorAll('.drawer-section .filter-chip').forEach(c=>c.classList.remove('active'));
  if(event && event.target && event.target.classList) event.target.classList.add('active'); 
}

// Ensure the dropdown removes "disabled" tags when achievements load
function syncThemeUnlocks(stats, earned) {
  var isHacker = stats.unlockedThemes?.hacker || earned.has('legend') || stats.totalScore >= 5000; 
  var isRetro = stats.unlockedThemes?.retro_crt || earned.has('hardcore');
  var isVvip = localStorage.getItem('unlocked_vvip') === 'true';

  if (isHacker) document.getElementById('optHacker').removeAttribute('disabled');
  if (isRetro) document.getElementById('optRetro').removeAttribute('disabled');
  if (isVvip) document.getElementById('optVvip').removeAttribute('disabled');
}

function submitFeedback(){
  var type=document.getElementById('fbType').value, text=document.getElementById('fbText').value.trim(); if(!text){showToast('Please write something first!');return;}
  var btn=document.getElementById('fbBtn');btn.disabled=true;btn.textContent='Sending...';
  google.script.run.withSuccessHandler(function(res){ btn.disabled=false;btn.textContent='Submit Feedback'; if(res&&res.success){document.getElementById('fbText').value='';document.getElementById('fbCharCount').textContent='0';closeModal('feedbackModal');showToast('✅ Feedback saved! Thanks!');} else showToast('❌ Error sending feedback.'); }).withFailureHandler(function(){btn.disabled=false;btn.textContent='Submit Feedback';showToast('❌ Error sending feedback.');}).saveFeedback(type,text);
}

function showToast(msg,dur){ dur=dur||3200; var tc=document.getElementById('toastContainer'), t=document.createElement('div'); t.className='toast'; t.textContent=msg; tc.appendChild(t); setTimeout(()=>{t.style.animation='none';t.style.opacity='0';t.style.transform='translateY(-8px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},dur); }

var isPurchasing = false;
// --- VVIP MODAL CONTROLLER ---
let modalCallback = null;

function showVvipModal(title, body, confirmAction, isAlert = false) {
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalBody').innerHTML = body;
  
  let cancelBtn = document.getElementById('btnModalCancel');
  let confirmBtn = document.getElementById('btnModalConfirm');
  
  if (isAlert) {
    // Alert Mode: Only shows an 'OK' button for receipts/errors
    cancelBtn.style.display = 'none';
    confirmBtn.innerHTML = 'Awesome';
  } else {
    // Confirm Mode: Shows Cancel and Confirm
    cancelBtn.style.display = 'block';
    confirmBtn.innerHTML = 'Confirm Purchase';
  }
  
  modalCallback = confirmAction;
  
  confirmBtn.onclick = function() {
     closeVvipModal();
     if (modalCallback) modalCallback();
  };
  
  let overlay = document.getElementById('vvipModalOverlay');
  overlay.style.display = 'flex';
  setTimeout(() => overlay.classList.add('show'), 10);
}

function closeVvipModal() {
  let overlay = document.getElementById('vvipModalOverlay');
  overlay.classList.remove('show');
  setTimeout(() => overlay.style.display = 'none', 300);
}

function convertPointsToTicket() {
  if (isPurchasing) return;
  
  // Safely grab current points from the UI
  var ptsText = document.getElementById('uiPoints').textContent || '0';
  var currentPts = parseInt(ptsText.replace(/,/g, '')) || 0;
  
  if (currentPts < 500000) {
    showToast('❌ Not enough points! You need 500,000 Pts.');
    return;
  }
  
  // Summon the confirmation modal
  showVvipModal(
    'Mint Arcade Ticket?', 
    `Are you ready to convert <b>500,000 Pts</b> into <b>1 🎟️</b>?`,
    function() {
      isPurchasing = true;
      showToast('Minting Ticket...');
      
      google.script.run.withSuccessHandler(function(res) {
        isPurchasing = false;
        if (res && res.success) {
          // Update UI balances
          var gTkts = document.getElementById('globalTicketCount');
          if (gTkts) gTkts.textContent = res.newTickets; 
          var uiTkts = document.getElementById('uiTickets'); 
          if (uiTkts) uiTkts.textContent = res.newTickets; 
          var uiPts = document.getElementById('uiPoints'); 
          if (uiPts) uiPts.textContent = res.newPoints.toLocaleString();
          
          if(typeof launchConfetti === 'function') launchConfetti();
          showVvipModal('Ticket Minted! 🎟️', 'You successfully converted 500,000 Pts into 1 Ticket.', null, true);
        } else {
          showVvipModal('Transaction Failed', '❌ ' + (res.message || 'Server error.'), null, true);
        }
      }).withFailureHandler(function() {
          isPurchasing = false;
          showVvipModal('Network Error', '❌ Transaction failed. Please check your connection.', null, true);
      }).clientConvertTicket(); // Pings the backend
    }
  );
}
