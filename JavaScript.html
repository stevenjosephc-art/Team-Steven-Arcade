    playSound('crash'); playSound('pb');
    if (typeof showToast === 'function')
      showToast('MOAB DESTROYED! +$'+(900+this.wave*22)+' · 11 survivors dispersed!');
    if (typeof launchConfetti === 'function' && typeof particlesEnabled !== 'undefined' && particlesEnabled)
      launchConfetti();
  },

  // ═══════════════════════════════════════════════════════════════════════
  // GEOMETRY HELPERS
  // ═══════════════════════════════════════════════════════════════════════
  rRect: function(x,y,w,h,r){
    ctx.beginPath();
    if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}
    else{
      ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
    }
  },
  distToSegment: function(px,py,x1,y1,x2,y2){
    var l2=(x1-x2)**2+(y1-y2)**2;
    if(l2===0) return Math.hypot(px-x1,py-y1);
    var t=Math.max(0,Math.min(1,((px-x1)*(x2-x1)+(py-y1)*(y2-y1))/l2));
    return Math.hypot(px-(x1+t*(x2-x1)),py-(y1+t*(y2-y1)));
  },

  // ── Strict placement check using precomputed grid + tower occupancy ──
  isValidTile: function(gx, gy) {
    var W = 1120, H = 680;
    // Reject out-of-bounds (leave 50px margin from canvas edge)
    if (gx < 50 || gx > W - 50 || gy < 60 || gy > H - 50) return false;

    // Check precomputed path block map
    if (this._blockedCells && this._blockedCells.has(gx + '_' + gy)) return false;

    // Check tower occupancy — each tower occupies a 40×40 cell
    for (var ti = 0; ti < this.towers.length; ti++) {
      var t = this.towers[ti];
      // Same cell = same grid-snapped position
      if (Math.abs(t.x - gx) < 36 && Math.abs(t.y - gy) < 36) return false;
    }
    return true;
  },

  // ── Snap raw pixel click to tower grid ───────────────────────────────
  _snapToGrid: function(px, py) {
    var GRID = 40, HALF = GRID / 2;
    var W = 1120, H = 680;
    var gx = Math.floor(px / GRID) * GRID + HALF;
    var gy = Math.floor(py / GRID) * GRID + HALF;
    // Clamp so towers never clip edge
    gx = Math.max(50, Math.min(W - 50, gx));
    gy = Math.max(60, Math.min(H - 50, gy));
    return { x: gx, y: gy };
  },

  // ═══════════════════════════════════════════════════════════════════════
  // UPDATE
  // ═══════════════════════════════════════════════════════════════════════
  update: function(){
    if(this.state!=='playing'||this.paused) return;
    for(var s=0;s<(this.gameSpeed||1);s++) this._step();
  },

  _step: function(){
    this.fc++;
    if(this.screenShake>0) this.screenShake--;
    if(this._flashMsg&&this._flashMsg.timer>0) this._flashMsg.timer--;
    if(this._moabWarning>0) this._moabWarning--;

    // ── Spawn ─────────────────────────────────────────────────────────
    for(var i=this.spawnQueue.length-1;i>=0;i--){
      var sq=this.spawnQueue[i]; sq.timer--;
      if(sq.timer<=0){
        if(sq.type === 'moab'){
          var path  = this.paths[sq.path];
          var mHp   = (9000 + this.wave * 900) *
                      (activeDiff === 'Easy' ? 0.6 : activeDiff === 'Medium' ? 1.0 : 1.8);
          this.moab = {
            x: path[0].x, y: path[0].y,
            pathIdx: sq.path, wp: 1,
            hp: mHp, maxHp: mHp,
            spd: Math.min(0.35 + this.wave * 0.004, 0.9),
            r: 52, angle: 0, slow: 0, stun: 0,
          };
          if (typeof showToast === 'function') showToast('⚠️ MOAB CLASS DREADNOUGHT INCOMING!');
          playSound('pb');
        } else {
          var def  = this.eDef[sq.type], path = this.paths[sq.path];
          this.enemies.push({
            x:path[0].x,y:path[0].y,pathIdx:sq.path,wp:1,
            type:sq.type,
            hp:def.hp*sq.hpMult,maxHp:def.hp*sq.hpMult,
            spd:def.spd*sq.spdMult,
            slow:0,stun:0,pull:0,angle:0,
          });
        }
        this.spawnQueue.splice(i,1);
      }
    }

    // ── Move MOAB ─────────────────────────────────────────────────────
    if(this.moab){
      var m = this.moab;
      if(m.stun > 0){ m.stun--; }
      else {
        if(m.slow > 0) m.slow--;
        var tgt = this.paths[m.pathIdx][m.wp];
        var mSpd = m.spd * (m.slow > 0 ? 0.5 : 1.0);
        var dx   = tgt.x-m.x, dy = tgt.y-m.y, d = Math.hypot(dx,dy);
        m.angle  = Math.atan2(dy, dx);
        if(d < mSpd){
          m.x=tgt.x; m.y=tgt.y; m.wp++;
          if(m.wp >= this.paths[m.pathIdx].length){
            this.lives -= 25; this.screenShake = 35;
            playSound('crash');
            this._burstMoab(m.x, m.y, m.pathIdx, m.wp - 1);
            this.moab = null;
            if(this.lives <= 0){
              this.state = 'gameover'; var self=this;
              setTimeout(function(){triggerGameOver('MOAB Breached the Sector — Wave '+self.wave);},800);
              return;
            }
          }
        } else { m.x+=dx/d*mSpd; m.y+=dy/d*mSpd; }
      }
      if(this.moab && this.moab.hp <= 0){
        this._burstMoab(this.moab.x, this.moab.y, this.moab.pathIdx, this.moab.wp);
        this.moab = null;
      }
    }

    // ── Move enemies ──────────────────────────────────────────────────
    for(var i=this.enemies.length-1;i>=0;i--){
      var e=this.enemies[i], def=this.eDef[e.type];
      if(e.stun>0){e.stun--;continue;}
      if(e.slow>0) e.slow--;

      // Speech bubble tick for MOAB spawns
      if(e.isSpawn && e.speechTimer > 0){
        e.speechTimer--;
        if(e.speechTimer <= 0){
          // Cycle to next phrase
          var MOAB_SPEECH = ['yawa!','tabang!','ouch!','dili!','ayaw!','sakit!','help!','noooo!','ugh!','whyyy!','sus!'];
          e._speechCycle = ((e._speechCycle||0) + 1) % MOAB_SPEECH.length;
          e.speech = MOAB_SPEECH[e._speechCycle];
          e.speechTimer = 100 + Math.floor(Math.random() * 80);
          e.speechVisible = true;
        }
      }

      // Fan push: enemies have e.pushBack > 0 — move backward along path
      if(e.pushBack > 0){
        e.pushBack--;
        // Move backward: retreat toward previous waypoint
        if(e.wp > 1){
          var prevWp = this.paths[e.pathIdx][e.wp - 1];
          var pdx = prevWp.x - e.x, pdy = prevWp.y - e.y, pd = Math.hypot(pdx, pdy);
          if(pd > 2){
            e.x += (pdx/pd) * 2.5;
            e.y += (pdy/pd) * 2.5;
          }
        }
        continue;
      }

      var tgt=this.paths[e.pathIdx][e.wp];
      var spd=e.spd*(e.slow>0?0.4:1.0);
      var dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.hypot(dx,dy);
      e.angle=Math.atan2(dy,dx);
      if(d<spd){
        e.x=tgt.x;e.y=tgt.y;e.wp++;
        if(e.wp>=this.paths[e.pathIdx].length){
          this.lives -= (e.isSpawn ? 25 : 1); // <--- INCREASED FROM 4 TO 25
          playSound('crash'); this.enemies.splice(i,1); this.screenShake=14;
          if(this.lives<=0){
            this.state='gameover'; var self=this;
            setTimeout(function(){triggerGameOver('Sector Breached — Wave '+self.wave);},800);
            return;
          }
          continue;
        }
      } else {e.x+=dx/d*spd;e.y+=dy/d*spd;}
    }

    // ── Towers fire ───────────────────────────────────────────────────
    var self=this;
    this.towers.forEach(function(t){
      if(t.cd>0){t.cd--;return;}
      var base=self.tDef[t.type], lv=self._lvlStat(t.type,t.lvl);
      var moabInRange = self.moab && Math.hypot(self.moab.x-t.x,self.moab.y-t.y) <= lv.r;
      var target=null, maxProg=-1;
      self.enemies.forEach(function(e){
        if(Math.hypot(e.x-t.x,e.y-t.y)<=lv.r){
          var prog=e.wp*1000-Math.hypot(self.paths[e.pathIdx][e.wp].x-e.x,self.paths[e.pathIdx][e.wp].y-e.y);
          if(prog>maxProg){maxProg=prog;target=e;}
        }
      });

      var shootMoab = moabInRange;
      var aimTarget = shootMoab ? self.moab : target;
      if(!aimTarget) return;

      t.rot = Math.atan2(aimTarget.y-t.y, aimTarget.x-t.x);
      t.cd  = Math.max(4, lv.f);

      var applyDmg = function(e, dmg) { e.hp -= dmg; };

      if(t.type===0){ // Pulse
        self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d,col:base.col,isMoab:shootMoab});
        if(t.lvl>=2) self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d*0.6,col:base.col,delay:5,isMoab:shootMoab});
        if(t.lvl>=3) self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:0,dmg:lv.d*0.4,col:base.col,delay:10,isMoab:shootMoab});
        playSound('jump');
      } else if(t.type===1){ // Sniper
        applyDmg(aimTarget, lv.d);
        self.particles.push({type:'ray',x1:t.x,y1:t.y,x2:aimTarget.x,y2:aimTarget.y,life:7,col:base.col});
        if(t.lvl>=3 && !shootMoab){
          var chain=null,bd=Infinity;
          self.enemies.forEach(function(e2){if(e2!==aimTarget){var d=Math.hypot(e2.x-aimTarget.x,e2.y-aimTarget.y);if(d<90&&d<bd){bd=d;chain=e2;}}});
          if(chain){chain.hp-=lv.d*0.5;self.particles.push({type:'ray',x1:aimTarget.x,y1:aimTarget.y,x2:chain.x,y2:chain.y,life:5,col:'#FF8888'});}
        }
        playSound('pb');
      } else if(t.type===2){ // Cryo
        var aoeR=lv.r*(t.lvl>=3?1.0:t.lvl>=2?0.8:0.65);
        self.particles.push({type:'nova',x:t.x,y:t.y,r:aoeR,life:12,col:base.col});
        var sd=70+t.lvl*18;
        self.enemies.forEach(function(e){if(Math.hypot(e.x-t.x,e.y-t.y)<=aoeR){e.slow=sd;e.hp-=lv.d;}});
        if(self.moab&&Math.hypot(self.moab.x-t.x,self.moab.y-t.y)<=aoeR){
          self.moab.slow=Math.max(self.moab.slow,Math.floor(sd*0.35));
          self.moab.hp-=lv.d;
        }
        playSound('jump');
      } else if(t.type===3){ // Artillery
        self.projectiles.push({x:t.x,y:t.y,tx:aimTarget.x,ty:aimTarget.y,target:aimTarget,type:3,dmg:lv.d,col:base.col,lvl:t.lvl,isMoab:shootMoab});
        playSound('jump');
      } else if(t.type===4){ // Tesla
        var hits=[aimTarget], pool=self.enemies.slice(), cur=aimTarget;
        var chains=t.lvl+1;
        for(var c=1;c<chains;c++){
          var next=null,nd=Infinity;
          pool.forEach(function(e){
            if(hits.indexOf(e)<0){var d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<120&&d<nd){nd=d;next=e;}}
          });
          if(!next) break;
          hits.push(next); cur=next;
        }
        var df=1.0;
        for(var h=0;h<hits.length;h++){
          hits[h].hp -= lv.d*df;
          if(hits[h] === self.moab){ hits[h].stun=Math.max(hits[h].stun,6); }
          else { hits[h].stun=Math.max(hits[h].stun,10+t.lvl*5); }
          df*=0.65;
          if(h>0) self.particles.push({type:'arc',x1:hits[h-1].x,y1:hits[h-1].y,x2:hits[h].x,y2:hits[h].y,life:8,col:base.col});
        }
        self.particles.push({type:'arc',x1:t.x,y1:t.y,x2:aimTarget.x,y2:aimTarget.y,life:8,col:base.col});
        if(t.lvl>=3) self.particles.push({type:'nova',x:t.x,y:t.y,r:40,life:8,col:base.col});
        playSound('pb');
      } else if(t.type===5){ // Fan — AoE push every ~5 seconds
        var vR = lv.r * (t.lvl>=3?1.0:t.lvl>=2?0.85:0.7);
        // Push blast visual
        self.particles.push({type:'fanblast',x:t.x,y:t.y,r:vR,life:22,rot:t.rot,col:base.col});
        var basePush = 28 + t.lvl * 14; // frames pushed back
        
        self.enemies.forEach(function(e){
          if(Math.hypot(e.x-t.x,e.y-t.y)<=vR){
            e.hp -= lv.d;
            
            // ANTI-EXPLOIT: Enemies build resistance to the wind!
            e.pushResist = (e.pushResist || 0) + 1;
            var actualPush = Math.max(0, basePush - (e.pushResist * 8)); 
            
            if (actualPush > 0) {
                e.pushBack = Math.max(e.pushBack||0, actualPush);
                e.stun = Math.max(e.stun||0, 8);  // brief stun from impact
            }
          }
        });
        
        // Fan barely affects MOAB — just chip damage
        if(self.moab && Math.hypot(self.moab.x-t.x,self.moab.y-t.y)<=vR){
          self.moab.hp -= lv.d * 0.5;
          self.moab.slow = Math.max(self.moab.slow, 10);
        }
        playSound('jump');
      }
    });

    // ── Projectiles ───────────────────────────────────────────────────
    for(var i=this.projectiles.length-1;i>=0;i--){
      var p=this.projectiles[i];
      if(p.delay>0){p.delay--;continue;}
      var pspd=p.type===0?13:8;
      if(p.isMoab && this.moab){p.tx=this.moab.x;p.ty=this.moab.y;}
      else if(p.target&&p.target.hp>0){p.tx=p.target.x;p.ty=p.target.y;}
      var dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
      if(d<pspd){
        if(p.type===3){
          var sr=65+(((p.lvl||1)-1)*18);
          this.particles.push({type:'explosion',x:p.tx,y:p.ty,r:sr,life:14});
          this.enemies.forEach(function(e){if(Math.hypot(e.x-p.tx,e.y-p.ty)<=sr)e.hp-=p.dmg;});
          if(this.moab&&Math.hypot(this.moab.x-p.tx,this.moab.y-p.ty)<=sr) this.moab.hp-=p.dmg;
          playSound('crash');
        } else {
          if(p.isMoab && this.moab) this.moab.hp-=p.dmg;
          else if(p.target) p.target.hp-=p.dmg;
          for(var k=0;k<6;k++) this.particles.push({x:p.tx,y:p.ty,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,c:p.col||'#00E5FF',r:2});
        }
        this.projectiles.splice(i,1);
      } else {
        p.x+=dx/d*pspd; p.y+=dy/d*pspd;
        if(p.type===3) this.particles.push({x:p.x,y:p.y,vx:0,vy:0,life:0.4,c:'rgba(100,220,100,0.5)',r:5});
      }
    }

    if(this.moab && this.moab.hp <= 0){
      this._burstMoab(this.moab.x, this.moab.y, this.moab.pathIdx, this.moab.wp);
      this.moab = null;
    }

    // ── Kill enemies ──────────────────────────────────────────────────
    for(var i=this.enemies.length-1;i>=0;i--){
      var e=this.enemies[i];
      if(e.hp<=0){
        var def=this.eDef[e.type];
        // Score multiplier: Hard = 1.5×, Medium = 1.2×, Easy = 1.0×
        var scoreMult = activeDiff === 'Hard' ? 1.5 : activeDiff === 'Medium' ? 1.2 : 1.0;
        this.credits += def.rew;
        rawScore += Math.floor(def.rew * 10 * scoreMult);
        for(var k=0;k<18;k++) this.particles.push({x:e.x,y:e.y,
          vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,
          life:1,c:e.isSpawn?'#FF003C':def.col,r:3});
        if(e.type===3&&typeof particlesEnabled!=='undefined'&&particlesEnabled) launchConfetti();
        if(e.type===5) for(var k=0;k<35;k++) this.particles.push({x:e.x,y:e.y,
          vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:1.2,c:'#00FF88',r:4});
        this.enemies.splice(i,1); playSound('coin');
      }
    }

    // ── Wave complete ─────────────────────────────────────────────────
    if(this.enemies.length===0&&this.spawnQueue.length===0&&!this.moab&&!this._betweenWaves&&!this._victoryPending){
      if(!this.endless&&this.wave>=this.maxWaves){
        this._victoryPending=true; this.state='victory';
        rawScore+=15000+this.lives*500;
        playSound('win');
      } else {
        this._betweenWaves=true; this.wave++;
        if(this.endless) this.endlessBonus++;
        var bonus=Math.floor(70+this.wave*7+(this.endless?this.endlessBonus*20:0));
        this.credits+=bonus;
        if(typeof showToast==='function'){
          var isMW = (this.wave % 10 === 0);
          var label = this.endless ? 'ENDLESS Wave '+this.wave : 'Wave '+this.wave;
          showToast(label + (isMW ? ' — ⚠️ MOAB INBOUND!' : ' incoming') + '  +$'+bonus);
        }
        playSound('jump');
        var self=this;
        setTimeout(function(){
          self._betweenWaves=false; self.generateWave();
        }, Math.max(600,Math.round(2600/(self.gameSpeed||1))));
      }
    }

    // ── Particles ─────────────────────────────────────────────────────
    for(var i=this.particles.length-1;i>=0;i--){
      var pt=this.particles[i];
      if(pt.vx!==undefined){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.92;pt.vy*=0.92;pt.life-=0.05;}
      else pt.life--;
      if(pt.life<=0) this.particles.splice(i,1);
    }
  },

  // ═══════════════════════════════════════════════════════════════════════
  // DRAW
  // ═══════════════════════════════════════════════════════════════════════
  draw: function(){
    var W=1120,H=680;
    ctx.save();
    if(this.screenShake>0){
      ctx.translate((Math.random()-.5)*this.screenShake*1.2,(Math.random()-.5)*this.screenShake*1.2);
    }

    ctx.fillStyle='#080c14';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,229,255,0.04)';ctx.lineWidth=1;ctx.beginPath();
    for(var x=0;x<W;x+=40){ctx.moveTo(x,0);ctx.lineTo(x,H);}
    for(var y=0;y<H;y+=40){ctx.moveTo(0,y);ctx.lineTo(W,y);}
    ctx.stroke();
    var vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

    if(this._moabWarning > 0){
      var wa = (Math.sin(this.fc * 0.25) + 1) * 0.5 * (this._moabWarning / 160) * 0.28;
      ctx.fillStyle = 'rgba(255,0,60,' + wa + ')';
      ctx.fillRect(0, 0, W, H);
    }

    var self=this;
    this.paths.forEach(function(p){
      ctx.shadowBlur=22;ctx.shadowColor='#7B2FBE';
      ctx.strokeStyle='rgba(123,47,190,0.35)';ctx.lineWidth=30;ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);ctx.stroke();
      ctx.shadowBlur=8;ctx.shadowColor='#B026FF';
      ctx.strokeStyle='#8A2BE2';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);ctx.stroke();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(200,150,255,0.22)';ctx.lineWidth=1;ctx.setLineDash([6,12]);
      ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);ctx.stroke();ctx.setLineDash([]);
    });
    ctx.shadowBlur=0;

    this.towers.forEach(function(t){self._drawTower(t);});
    this.enemies.forEach(function(e){self._drawEnemy(e);});
    if(this.moab) this._drawMoab(this.moab);

    // Projectiles
    this.projectiles.forEach(function(p){
      if(p.delay>0) return;
      ctx.shadowBlur=10;
      if(p.type===0){ctx.shadowColor='#00E5FF';ctx.fillStyle='#FFF';ctx.fillRect(p.x-3,p.y-3,6,6);}
      else if(p.type===3){ctx.shadowColor='#34A853';ctx.fillStyle='#5CDD7A';ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();}
      ctx.shadowBlur=0;
    });

    // Particles
    this.particles.forEach(function(pt){
      if(pt.type==='ray'||pt.type==='arc'){
        var isArc=pt.type==='arc';
        ctx.strokeStyle=(isArc?'rgba(255,213,0,':'rgba(255,59,48,')+(pt.life/8)+')';
        ctx.lineWidth=isArc?2:3;ctx.shadowBlur=10;ctx.shadowColor=pt.col||'#FF3B30';
        if(isArc){
          ctx.beginPath();var steps=5,px=pt.x1,py=pt.y1,ex=pt.x2,ey=pt.y2;
          ctx.moveTo(px,py);
          for(var k=1;k<steps;k++){var t=k/steps;ctx.lineTo(px+(ex-px)*t+(Math.random()-.5)*18,py+(ey-py)*t+(Math.random()-.5)*18);}
          ctx.lineTo(ex,ey);ctx.stroke();
        } else {ctx.beginPath();ctx.moveTo(pt.x1,pt.y1);ctx.lineTo(pt.x2,pt.y2);ctx.stroke();}
        ctx.shadowBlur=0;
      } else if(pt.type==='nova'){
        var a=pt.life/12;ctx.strokeStyle='rgba(181,234,215,'+a+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/12),0,Math.PI*2);ctx.stroke();
      } else if(pt.type==='fanblast'){
        // Fan blast — directional arc expanding outward
        var a = pt.life / 22;
        var expandR = pt.r * (1 - pt.life / 22);
        ctx.save();
        ctx.translate(pt.x, pt.y);
        ctx.rotate(pt.rot);
        // Draw 3 expanding arc sweeps
        for(var arc=0;arc<3;arc++){
          var arcR = expandR * (0.4 + arc*0.3);
          ctx.strokeStyle = 'rgba(255,159,28,' + (a * (0.7 - arc*0.2)) + ')';
          ctx.lineWidth = 3 - arc;
          ctx.shadowBlur = 8; ctx.shadowColor = '#FF9F1C';
          ctx.beginPath();
          ctx.arc(0, 0, arcR, -Math.PI*0.55, Math.PI*0.55);
          ctx.stroke();
        }
        // Wind lines
        for(var w2=0;w2<5;w2++){
          var ang = -0.5 + w2*0.25, dist = expandR * (0.3 + Math.random()*0.5);
          ctx.strokeStyle = 'rgba(255,200,80,' + (a*0.5) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(Math.cos(ang)*dist*0.5, Math.sin(ang)*dist*0.5);
          ctx.lineTo(Math.cos(ang)*dist, Math.sin(ang)*dist);
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
      } else if(pt.type==='vortex'){
        // Keep for backward compat, draw as fan
        var a=pt.life/20,vr=pt.r*(1-pt.life/20)*0.5+pt.r*0.5;
        ctx.strokeStyle='rgba(255,159,28,'+a*0.7+')';ctx.lineWidth=2;ctx.beginPath();
        for(var k=0;k<3;k++){var ang=pt.rot*0.05+k*(Math.PI*2/3);
          ctx.moveTo(pt.x+Math.cos(ang)*vr*0.2,pt.y+Math.sin(ang)*vr*0.2);
          ctx.arc(pt.x,pt.y,vr*(0.2+k*0.25),ang,ang+Math.PI*1.3);}ctx.stroke();
      } else if(pt.type==='explosion'){
        var a=pt.life/14;
        ctx.fillStyle='rgba(52,168,83,'+a*0.35+')';ctx.shadowBlur=20;ctx.shadowColor='#34A853';
        ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/14),0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(160,255,100,'+a*0.7+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(1-pt.life/14),0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
      } else {
        ctx.globalAlpha=Math.max(0,pt.life);ctx.fillStyle=pt.c;ctx.shadowBlur=6;ctx.shadowColor=pt.c;
        ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.shadowBlur=0;
      }
    });

    if(this.selectedTower) this._drawSelectionUI(this.selectedTower);
    if(this.menu) this._drawBuildMenu(this.menu.x,this.menu.y);
    this._drawHUD(W,H);

    // MOAB warning banner
    if(this._moabWarning > 50){
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,H/2-34,W,68);
      if(this.fc%18<9){
        ctx.fillStyle='#FF003C';ctx.shadowBlur=20;ctx.shadowColor='#FF003C';
        ctx.font='bold 26px "Google Sans",Arial';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('⚠️  MOAB CLASS DREADNOUGHT APPROACHING  ⚠️',W/2,H/2);
        ctx.shadowBlur=0;
      }
      ctx.textBaseline='alphabetic';
    }

    // Victory screen
    if(this.state==='victory'){
      ctx.fillStyle='rgba(5,10,25,0.82)';ctx.fillRect(0,44,W,H-44);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 34px "Google Sans",Arial';
      ctx.fillStyle='#34C759';ctx.shadowBlur=18;ctx.shadowColor='#34C759';
      ctx.fillText('SECTOR SECURED — WAVE 99',W/2,H/2-80);ctx.shadowBlur=0;
      ctx.font='bold 22px "Google Sans",Arial';ctx.fillStyle='#FFD700';
      ctx.fillText('SCORE: '+rawScore,W/2,H/2-40);
      ctx.font='15px "Google Sans",Arial';ctx.fillStyle='#a0b8d0';
      ctx.fillText('All 99 waves defeated. The sector stands.',W/2,H/2-5);
      ctx.fillText('Continue into Endless Mode — enemies scale infinitely.',W/2,H/2+22);
      this._drawVictoryBtn(W/2-110,H/2+58,200,38,'ENDLESS MODE','#00E5FF',true);
      this._drawVictoryBtn(W/2+110,H/2+58,160,38,'RETIRE','#FF3B30',false);
      ctx.textBaseline='alphabetic';
      return;
    }

    // Pause overlay
    if(this.paused){
      ctx.fillStyle='rgba(5,10,25,0.5)';ctx.fillRect(0,44,W,H-44);
      ctx.fillStyle='#FFD700';ctx.font='bold 30px "Google Sans",Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowBlur=14;ctx.shadowColor='#FFD700';
      ctx.fillText('⏸  PAUSED',W/2,H/2);
      ctx.shadowBlur=0;ctx.textBaseline='alphabetic';
    }

    // Flash msg
    if(this._flashMsg&&this._flashMsg.timer>0){
      ctx.globalAlpha=Math.min(1,this._flashMsg.timer/30);
      ctx.fillStyle=this._flashMsg.col;
      ctx.font='bold 16px "Google Sans",Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this._flashMsg.txt,W/2,H/2-40);
      ctx.globalAlpha=1;ctx.textBaseline='alphabetic';
    }
    ctx.restore();
  },

  // ── MOAB Dreadnought draw ─────────────────────────────────────────────
  _drawMoab: function(m){
    var pct = m.hp / m.maxHp;
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);
    for(var eng = 0; eng < 3; eng++){
      var ey = (eng - 1) * 22;
      ctx.shadowBlur = 18; ctx.shadowColor = '#FF6600';
      ctx.fillStyle = 'rgba(255,'+(100+Math.floor(pct*155))+',0,0.8)';
      ctx.beginPath();
      ctx.ellipse(-m.r - 12 - Math.abs(Math.sin(this.fc*0.3+eng))*8, ey,
                  10 + Math.random()*5, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.shadowBlur = 28; ctx.shadowColor = '#FF003C';
    ctx.fillStyle = '#1a0508'; ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo( m.r,       0);
    ctx.lineTo( m.r*0.62, -m.r*0.54);
    ctx.lineTo(-m.r*0.28, -m.r*0.65);
    ctx.lineTo(-m.r*0.78, -m.r*0.50);
    ctx.lineTo(-m.r,      -m.r*0.28);
    ctx.lineTo(-m.r,       m.r*0.28);
    ctx.lineTo(-m.r*0.78,  m.r*0.50);
    ctx.lineTo(-m.r*0.28,  m.r*0.65);
    ctx.lineTo( m.r*0.62,  m.r*0.54);
    ctx.closePath();
    ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,0,60,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.r*0.2, -m.r*0.35); ctx.lineTo(-m.r*0.55, -m.r*0.35);
    ctx.moveTo(m.r*0.2,  m.r*0.35); ctx.lineTo(-m.r*0.55,  m.r*0.35);
    ctx.moveTo(-m.r*0.1,-m.r*0.5);  ctx.lineTo(-m.r*0.1,   m.r*0.5);
    ctx.stroke();
    if(pct < 0.35){
      var da = (0.35-pct)/0.35;
      ctx.shadowBlur = 18*da; ctx.shadowColor = '#FF4400';
      ctx.fillStyle = 'rgba(255,80,0,'+(da*(0.5+Math.sin(this.fc*0.25)*0.3))+')';
      ctx.beginPath(); ctx.arc(-m.r*0.25, m.r*0.22, 12+Math.sin(this.fc*0.18)*4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(0,229,255,0.2)'; ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8; ctx.shadowColor = '#00E5FF';
    ctx.beginPath(); ctx.ellipse(m.r*0.35, 0, m.r*0.18, m.r*0.14, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
    for(var wt = 0; wt < 2; wt++){
      var wy = (wt*2-1) * m.r * 0.37;
      ctx.fillStyle = '#2a0a0a'; ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, wy, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#FF003C'; ctx.shadowBlur = 6; ctx.shadowColor = '#FF003C';
      ctx.fillRect(7, wy-2, 15, 4); ctx.shadowBlur = 0;
    }
    ctx.restore();

    var bw = m.r * 3.8, bh = 11, bx = m.x - bw/2, by = m.y - m.r - 26;
    ctx.fillStyle = '#1a0508';
    ctx.fillRect(bx-2, by-2, bw+4, bh+4);
    ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1.5;
    ctx.strokeRect(bx-2, by-2, bw+4, bh+4);
    var bc = pct > 0.6 ? '#FF003C' : pct > 0.3 ? '#FF6600' : '#FF0000';
    if(pct < 0.3) ctx.globalAlpha = 0.65 + Math.sin(this.fc * 0.22) * 0.35;
    ctx.fillStyle = bc; ctx.shadowBlur = 8; ctx.shadowColor = bc;
    ctx.fillRect(bx, by, bw*pct, bh);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.fillStyle = '#FF003C'; ctx.font = 'bold 12px "Google Sans",Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.shadowBlur = 5; ctx.shadowColor = '#FF003C';
    ctx.fillText('MOAB  ' + Math.ceil(m.hp).toLocaleString() + ' / ' + Math.ceil(m.maxHp).toLocaleString(), m.x, by - 3);
    ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
  },

  _drawVictoryBtn: function(cx,cy,w,h,label,col){
    ctx.fillStyle='rgba(8,15,30,0.95)';
    ctx.strokeStyle=col; ctx.lineWidth=2;
    this.rRect(cx-w/2,cy-h/2,w,h,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 13px "Google Sans",Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,cx,cy);
  },
  _victoryClick: function(mx,my,W,H){
    var cy=H/2+58,bh=38;
    if(Math.abs(mx-(W/2-110))<100&&Math.abs(my-cy)<bh/2){
      this.endless=true; this._victoryPending=false; this.state='playing';
      this.wave++; this.endlessBonus=0; this.credits+=500;
      if(typeof showToast==='function') showToast('ENDLESS MODE ACTIVATED — survive as long as you can!');
      playSound('win');
      var self=this; setTimeout(function(){self.generateWave();},400);
    }
    if(Math.abs(mx-(W/2+110))<80&&Math.abs(my-cy)<bh/2){
      triggerGameOver('Sector Secured — Wave 99 Complete! Score: '+rawScore);
    }
  },

  // ── FIXED click handler: proper canvas coordinate transform ──────────
  click: function(rx, ry) {
    var mx = Math.max(0, Math.min(canvas.width  - 1, rx));
    var my = Math.max(0, Math.min(canvas.height - 1, ry));

    var W = canvas.width, H = canvas.height;

    if(this.state==='victory'){ this._victoryClick(mx,my,W,H); return; }
    if(this.state!=='playing') return;

    // ── Build menu open: map click → tower type ───────────────────────
    if(this.menu){
      var mdx=mx-this.menu.x, mdy=my-this.menu.y;
      var dist = Math.hypot(mdx,mdy);
      if(dist>=10 && dist<=100){
        var ang=(Math.atan2(mdy,mdx)*(180/Math.PI)+360+90)%360;
        var tType=[2,4,3,5,1,0][Math.floor(ang/60)%6];
        var def=this.tDef[tType];
        
        // ANTI-EXPLOIT: Hard cap of 30 towers per map
        if(this.towers.length >= 30) {
            playSound('crash');
            this._flashMsg={txt:'Tower Limit Reached (30/30)!',timer:90,col:'#FF3B30'};
            this.menu=null; return;
        }

        if(this.credits>=def.c){
          this.credits-=def.c; playSound('jump');
          this.towers.push({x:this.menu.x,y:this.menu.y,type:tType,lvl:1,rot:0,cd:0,stun:0});
          for(var i=0;i<14;i++)
            this.particles.push({x:this.menu.x,y:this.menu.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:1,c:def.col,r:3});
        } else {
          playSound('crash');
          this._flashMsg={txt:'Not enough credits!',timer:90,col:'#FF3B30'};
        }
      }
      this.menu=null; return;
    }

    // ── Selection UI: upgrade / sell ──────────────────────────────────
    if(this.selectedTower){
      var st=this.selectedTower, sdx=mx-st.x, sdy=my-st.y;
      if(sdy>20&&sdy<58&&Math.abs(sdx)<44){
        if(st.lvl<3){
          var upCost=this.tDef[st.type].c*st.lvl;
          if(this.credits>=upCost){
            this.credits-=upCost; st.lvl++; playSound('coin');
            for(var i=0;i<16;i++)
              this.particles.push({x:st.x,y:st.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:1,c:this.tDef[st.type].col,r:3.5});
            if(typeof showToast==='function')
              showToast(this.tDef[st.type].n+' → LVL '+st.lvl+' · '+this._lvlStat(st.type,st.lvl).desc);
          } else {
            playSound('crash');
            this._flashMsg={txt:'Not enough credits!',timer:90,col:'#FF3B30'};
          }
        }
        this.selectedTower=null; return;
      }
      if(sdy<-20&&sdy>-58&&Math.abs(sdx)<44){
        var refund=Math.floor(this.tDef[st.type].c*st.lvl*0.6);
        this.credits+=refund;
        this.towers=this.towers.filter(function(t){return t!==st;});
        playSound('jump');
        if(typeof showToast==='function') showToast('Sold for $'+refund);
        this.selectedTower=null; return;
      }
      this.selectedTower=null;
    }

    // ── Tower click or build menu open ────────────────────────────────
    var snap = this._snapToGrid(mx, my);
    var gx = snap.x, gy = snap.y;

    // Check if clicking an existing tower
    var clicked=null;
    for(var ti=0;ti<this.towers.length;ti++){
      if(Math.hypot(this.towers[ti].x-mx,this.towers[ti].y-my)<22){clicked=this.towers[ti];break;}
    }
    if(clicked){
      this.selectedTower=clicked; playSound('jump');
    } else if(my > 48 && this.isValidTile(gx, gy)){
      this.menu={x:gx,y:gy}; playSound('jump');
    }
  },

  // ═══════════════════════════════════════════════════════════════════════

  _drawHUD: function(W,H){
    var hudGrad=ctx.createLinearGradient(0,0,0,46);
    hudGrad.addColorStop(0,'rgba(5,10,25,0.97)');
    hudGrad.addColorStop(1,'rgba(5,10,25,0.75)');
    ctx.fillStyle=hudGrad;ctx.fillRect(0,0,W,46);
    ctx.strokeStyle='rgba(0,229,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,46);ctx.lineTo(W,46);ctx.stroke();
    ctx.font='bold 14px "Google Sans",Arial'; ctx.textBaseline='middle';
    var isMoabWave = (this.wave % 10 === 0);
    var waveLabel  = this.endless ? '∞ '+this.wave : 'WAVE '+this.wave+'/99';
    ctx.fillStyle  = this.endless ? '#D070FF' : (isMoabWave ? '#FF003C' : '#E0E0E0');
    ctx.textAlign  = 'left';
    ctx.shadowBlur = (this.endless || isMoabWave) ? 8 : 0;
    ctx.shadowColor= this.endless ? '#D070FF' : '#FF003C';
    ctx.fillText(waveLabel + (isMoabWave ? ' ⚠️' : ''), 20, 22); ctx.shadowBlur=0;
    ctx.fillStyle='#FFD700';ctx.textAlign='center';
    ctx.shadowBlur=6;ctx.shadowColor='#FFD700';
    ctx.fillText('⬡ ' + this.credits + '   |   🗼 ' + this.towers.length + '/30', W/2, 22); ctx.shadowBlur=0;
    if(this.gameSpeed>1){
      ctx.fillStyle='#00E5FF';ctx.font='bold 10px "Google Sans",Arial';
      ctx.textAlign='left';
      ctx.fillText('▶'.repeat(this.gameSpeed)+' '+this.gameSpeed+'×',W/2+52,22);
      ctx.font='bold 14px "Google Sans",Arial';
    }
    var pct = this.lives / 100;
    var lCol = pct > 0.5 ? '#34C759' : pct > 0.25 ? '#FFD700' : '#FF3B30';
    ctx.fillStyle=lCol; ctx.textAlign='right';
    ctx.shadowBlur=this.lives<=25?8:0; ctx.shadowColor='#FF3B30';
    ctx.fillText('❤ '+this.lives+'  INTEGRITY',W-20,22); ctx.shadowBlur=0;
    var barW=120;
    ctx.fillStyle='#111'; ctx.fillRect(W-barW-20, 32, barW, 6);
    ctx.fillStyle=lCol; ctx.shadowBlur=4; ctx.shadowColor=lCol;
    ctx.fillRect(W-barW-20, 32, barW*pct, 6);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(160,160,180,0.5)';ctx.font='11px "Google Sans",Arial';
    ctx.textAlign='left';ctx.fillText(activeDiff.toUpperCase(),20,38);
    ctx.textAlign='center';ctx.fillText('SCORE '+rawScore,W/2,38);
    if(this.endless){
      ctx.fillStyle='rgba(208,112,255,0.6)';ctx.textAlign='right';
      ctx.fillText('ENDLESS +'+this.endlessBonus,W-20,38);
    }
    ctx.textBaseline='alphabetic';
  },

  _drawTower: function(t){
    var def=this.tDef[t.type],col=def.col,isSel=(t===this.selectedTower),fc=this.fc;
    ctx.save();ctx.translate(t.x,t.y);
    ctx.shadowBlur=isSel?24:12;ctx.shadowColor=col;
    ctx.fillStyle=isSel?'rgba(255,255,255,0.12)':'rgba(18,26,48,0.92)';
    ctx.strokeStyle=col;ctx.lineWidth=isSel?3:2;
    ctx.beginPath();
    if(t.type===0){ctx.arc(0,0,13+t.lvl*2,0,Math.PI*2);}
    else if(t.type===1){var hr=14+t.lvl*2;for(var k=0;k<6;k++){var a=(Math.PI/3)*k-Math.PI/6;k===0?ctx.moveTo(Math.cos(a)*hr,Math.sin(a)*hr):ctx.lineTo(Math.cos(a)*hr,Math.sin(a)*hr);}ctx.closePath();}
    else if(t.type===2){var pts=4+t.lvl*2,cr=15+t.lvl*2,ci=cr*0.45;for(var k=0;k<pts*2;k++){var a=(Math.PI/pts)*k-Math.PI/2,rr=k%2===0?cr:ci;k===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();}
    else if(t.type===3){var ar=13+t.lvl*2;if(t.lvl===3){var ch=ar*.35;ctx.moveTo(-ar+ch,-ar);ctx.lineTo(ar-ch,-ar);ctx.lineTo(ar,-ar+ch);ctx.lineTo(ar,ar-ch);ctx.lineTo(ar-ch,ar);ctx.lineTo(-ar+ch,ar);ctx.lineTo(-ar,ar-ch);ctx.lineTo(-ar,-ar+ch);ctx.closePath();}else ctx.rect(-ar,-ar,ar*2,ar*2);}
    else if(t.type===4){var tr=14+t.lvl*3;ctx.moveTo(0,-tr);ctx.lineTo(tr*.7,0);ctx.lineTo(0,tr);ctx.lineTo(-tr*.7,0);ctx.closePath();}
    else{ // Fan tower — draw as rotating fan blades
      var fr=13+t.lvl*3;
      var blades = 3 + t.lvl;
      for(var b=0;b<blades;b++){
        var ba=(Math.PI*2/blades)*b + fc*0.08;
        ctx.moveTo(0,0);
        ctx.arc(0,0,fr,ba,ba+Math.PI*0.45);
        ctx.closePath();
      }
    }
    ctx.fill();ctx.stroke();
    if(t.lvl>=2){ctx.strokeStyle=col;ctx.globalAlpha=0.35;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,(14+t.lvl*2)*0.55,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    if(t.lvl>=3){ctx.strokeStyle=col;ctx.globalAlpha=0.55;ctx.lineWidth=1.5;ctx.setLineDash([3,6]);ctx.save();ctx.rotate(fc*0.025);ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.setLineDash([]);ctx.globalAlpha=1;}
    ctx.shadowBlur=0;
    ctx.save();ctx.rotate(t.rot);ctx.fillStyle=col;ctx.shadowBlur=6;ctx.shadowColor=col;
    if(t.type===0){ctx.fillRect(0,-5,18+t.lvl*3,3);ctx.fillRect(0,2,18+t.lvl*3,3);if(t.lvl>=2){ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();}if(t.lvl>=3){ctx.fillRect(0,-10,14,2);ctx.fillRect(0,8,14,2);ctx.fillStyle='#fff';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
    else if(t.type===1){var bLen=30+t.lvl*9;ctx.fillRect(-4,-3,bLen,6);if(t.lvl>=2){ctx.fillStyle='#111';ctx.fillRect(bLen-12,-5,10,10);ctx.fillStyle=col;ctx.fillRect(bLen-11,-4,8,8);ctx.fillStyle='#111';ctx.fillRect(bLen-9,-2,4,4);}if(t.lvl>=3){ctx.fillStyle=col;ctx.globalAlpha=0.7;ctx.fillRect(-2,3,2,9);ctx.fillRect(4,3,2,9);ctx.globalAlpha=1;}ctx.fillStyle='#FFF';ctx.fillRect(bLen-2,-1.5,5,3);}
    else if(t.type===2){var s=(8+t.lvl*3)+Math.sin(fc*.12)*2.5;ctx.beginPath();if(t.lvl===1){ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);ctx.closePath();}else if(t.lvl===2){ctx.moveTo(0,-s*1.3);ctx.lineTo(s,0);ctx.lineTo(0,s*.8);ctx.lineTo(-s,0);ctx.closePath();}else{ctx.moveTo(0,-s*1.4);ctx.lineTo(s*.8,-s*.3);ctx.lineTo(s*.5,s*.8);ctx.lineTo(-s*.5,s*.8);ctx.lineTo(-s*.8,-s*.3);ctx.closePath();}ctx.fill();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    else if(t.type===3){ctx.fillRect(-6,-6,12,12);ctx.fillStyle='#111';ctx.fillRect(3,-5,5,4);ctx.fillRect(3,1,5,4);if(t.lvl>=2){ctx.fillStyle=col;ctx.fillRect(5,-7,4,14);ctx.fillStyle='#111';ctx.fillRect(3,-8,5,3);}if(t.lvl>=3){ctx.fillStyle=col;ctx.fillRect(-11,-4,5,8);ctx.fillStyle='#111';ctx.fillRect(-11,-3,4,6);}}
    else if(t.type===4){ctx.fillRect(-3,-14,6,14+t.lvl*3);ctx.beginPath();ctx.arc(0,-(14+t.lvl*3),4+t.lvl,0,Math.PI*2);ctx.fill();if(t.lvl>=2){ctx.fillRect(-9,-(12+t.lvl*2),4,3);ctx.fillRect(5,-(12+t.lvl*2),4,3);}if(t.lvl>=3){ctx.strokeStyle=col;ctx.globalAlpha=0.5+Math.sin(fc*.15)*0.3;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-(14+t.lvl*3),(6+Math.sin(fc*.2)*2),0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}}
    else{ // Fan barrel — wide nozzle
      var bW=6+t.lvl*2;
      ctx.fillRect(-bW/2,-bW/2,18+t.lvl*4,bW);
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.fillRect(14+t.lvl*4,-bW/2,4,bW);
      // CD cooldown arc indicator
      var cdMax=this._lvlStat(t.type,t.lvl).f;
      var cdPct=Math.max(0,1-t.cd/cdMax);
      ctx.strokeStyle=col;ctx.globalAlpha=0.5;ctx.lineWidth=2;ctx.beginPath();
      ctx.arc(0,0,10,0,Math.PI*2*cdPct);ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.restore(); ctx.shadowBlur=0;
    for(var l=0;l<t.lvl;l++){ctx.fillStyle=col;ctx.shadowBlur=5;ctx.shadowColor=col;ctx.beginPath();ctx.arc(-6+l*6,26,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.restore();
  },

  // ── Draw enemy — MOAB spawns are LARGER (r=28) with speech bubbles ──
  _drawEnemy: function(e){
    var def=this.eDef[e.type], frozen=e.slow>0, stunned=e.stun>0;
    var col=stunned?'#FFD700':(frozen?'#00E5FF':def.col);

    if(e.isSpawn){
      var SPAWN_R = 28;  // bigger than before (was 18)
      ctx.save(); ctx.translate(e.x,e.y);
      ctx.shadowBlur=18; ctx.shadowColor='#FF003C';
      ctx.fillStyle='#FF003C'; ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,SPAWN_R,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      // Damage flash
      if(stunned){ ctx.globalAlpha=0.5; ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(0,0,SPAWN_R,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
      ctx.save();
      ctx.beginPath(); ctx.arc(0,0,SPAWN_R-2,0,Math.PI*2); ctx.clip();
      var img = this.moabImgs && this.moabImgs[e.spawnLdap];
      try {
        if(img && img.complete && img.naturalWidth > 0){
          ctx.drawImage(img, -SPAWN_R+2,-SPAWN_R+2, (SPAWN_R-2)*2,(SPAWN_R-2)*2);
        } else {
          ctx.fillStyle='#222'; ctx.fill();
          ctx.fillStyle='#FFF'; ctx.font='16px Arial';
          ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('👾',0,1);
        }
      } catch(err){}
      ctx.restore();
      ctx.restore();
      // HP bar
      if(e.hp < e.maxHp) this._drawHPBar(e, {r:SPAWN_R});
      // Speech bubble
      if(e.speechVisible && e.speech){
        this._drawSpeechBubble(e.x, e.y - SPAWN_R - 6, e.speech);
      }
      return;
    }

    ctx.save(); ctx.translate(e.x,e.y);
    ctx.shadowBlur=stunned?22:(frozen?18:12); ctx.shadowColor=col;
    ctx.fillStyle='#0d1526'; ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath();
    if(e.type===0){ctx.save();ctx.rotate(e.angle);ctx.moveTo(def.r,0);ctx.lineTo(-def.r,def.r*.8);ctx.lineTo(-def.r*.4,0);ctx.lineTo(-def.r,-def.r*.8);ctx.closePath();ctx.restore();}
    else if(e.type===1){ctx.rect(-def.r,-def.r,def.r*2,def.r*2);}
    else if(e.type===2){ctx.save();ctx.rotate(e.angle);ctx.moveTo(def.r,0);ctx.lineTo(-def.r,def.r);ctx.lineTo(-def.r,-def.r);ctx.closePath();ctx.restore();}
    else if(e.type===3){for(var i=0;i<8;i++){var a=(Math.PI/4)*i+(this.fc*.025);i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,def.r*.5,0,Math.PI*2);ctx.fillStyle=def.col;ctx.fill();var pulse=.6+Math.sin(this.fc*.08)*.25;ctx.beginPath();ctx.arc(0,0,def.r*.2*pulse,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;ctx.restore();if(e.hp<e.maxHp)this._drawHPBar(e,def);return;}
    else if(e.type===4){ctx.save();ctx.rotate(e.angle+this.fc*.05);for(var i=0;i<6;i++){var a=(Math.PI/3)*i;i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.restore();}
    else{for(var i=0;i<12;i++){var a=(Math.PI/6)*i+(this.fc*.012);i===0?ctx.moveTo(Math.cos(a)*def.r,Math.sin(a)*def.r):ctx.lineTo(Math.cos(a)*def.r,Math.sin(a)*def.r);}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();for(var i=0;i<8;i++){var a=(Math.PI/4)*i-(this.fc*.018);i===0?ctx.moveTo(Math.cos(a)*def.r*.6,Math.sin(a)*def.r*.6):ctx.lineTo(Math.cos(a)*def.r*.6,Math.sin(a)*def.r*.6);}ctx.closePath();ctx.fillStyle=def.col;ctx.fill();ctx.stroke();var cPulse=.55+Math.sin(this.fc*.06)*.3;ctx.beginPath();ctx.arc(0,0,def.r*.25*cPulse,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;ctx.restore();if(e.hp<e.maxHp)this._drawHPBar(e,def);return;}
    ctx.fill(); ctx.stroke();
    if(frozen||stunned){ctx.globalAlpha=0.3;ctx.fillStyle=stunned?'#FFD700':'#B5EAD7';ctx.beginPath();ctx.arc(0,0,def.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    ctx.shadowBlur=0; ctx.restore();
    if(e.hp<e.maxHp) this._drawHPBar(e,def);
  },

  // ── Speech bubble for MOAB spawn enemies ─────────────────────────────
  _drawSpeechBubble: function(ex, ey, text) {
    ctx.save();
    ctx.font = 'bold 11px "Google Sans",Arial';
    var tw = ctx.measureText(text).width;
    var bw = tw + 14, bh = 18;
    var bx = ex - bw/2, by = ey - bh - 4;
    // Bubble body
    ctx.fillStyle = 'rgba(255,255,220,0.92)';
    ctx.strokeStyle = '#FF003C';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 6; ctx.shadowColor = '#FF003C';
    this.rRect(bx, by, bw, bh, 5);
    ctx.fill(); ctx.stroke();
    // Bubble tail (pointing down)
    ctx.beginPath();
    ctx.moveTo(ex - 5, by + bh);
    ctx.lineTo(ex,     by + bh + 6);
    ctx.lineTo(ex + 5, by + bh);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,220,0.92)';
    ctx.fill();
    ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ex - 5, by + bh);
    ctx.lineTo(ex,     by + bh + 6);
    ctx.lineTo(ex + 5, by + bh);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Text
    ctx.fillStyle = '#CC0000';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, ex, by + bh/2);
    ctx.restore();
  },

  _drawHPBar: function(e,def){
    var pct=e.hp/e.maxHp, bw=Math.max(28,def.r*2.6), bx=e.x-bw/2, by=e.y-def.r-11;
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(bx,by,bw,5);
    ctx.fillStyle=pct>.6?'#34C759':pct>.3?'#FFD700':'#FF3B30';
    ctx.fillRect(bx,by,bw*pct,5);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,5);
  },

  _drawSelectionUI: function(st){
    var def=this.tDef[st.type],lv=this._lvlStat(st.type,st.lvl),range=lv.r;
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.strokeStyle=def.col;ctx.lineWidth=1;
    ctx.setLineDash([4,8]);ctx.beginPath();ctx.arc(st.x,st.y,range,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.setLineDash([]);
    var upCost=def.c*st.lvl,refund=Math.floor(def.c*st.lvl*0.6),canUp=st.lvl<3&&this.credits>=upCost;
    var nextLv=st.lvl<3?this._lvlStat(st.type,st.lvl+1):null;
    ctx.fillStyle='rgba(8,14,30,0.92)';ctx.strokeStyle='rgba(0,229,255,0.25)';ctx.lineWidth=1;
    this.rRect(st.x-62,st.y-74,124,22,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=def.col;ctx.font='bold 11px "Google Sans",Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(def.n.toUpperCase()+'  LVL '+st.lvl+(st.lvl>=3?' [MAX]':''),st.x,st.y-63);
    ctx.fillStyle='rgba(8,14,30,0.92)';ctx.strokeStyle='rgba(0,229,255,0.12)';ctx.lineWidth=1;
    this.rRect(st.x-62,st.y-52,124,18,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(180,200,255,0.7)';ctx.font='9px "Google Sans",Arial';
    ctx.fillText(lv.desc,st.x,st.y-43);
    ctx.fillStyle='rgba(10,20,40,0.94)';
    ctx.strokeStyle=st.lvl>=3?'#444':(canUp?'#34C759':'#886633');ctx.lineWidth=2;
    this.rRect(st.x-42,st.y+22,84,30,5);ctx.fill();ctx.stroke();
    ctx.fillStyle=st.lvl>=3?'#555':(canUp?'#34C759':'#886633');
    ctx.font='bold 11px "Google Sans",Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    var ul=st.lvl<3?'▲ $'+upCost:'✦ MAX';
    if(st.lvl<3&&nextLv)ul+=' · '+nextLv.desc.split(' ')[0];
    ctx.fillText(ul,st.x,st.y+37);
    ctx.fillStyle='rgba(10,20,40,0.94)';ctx.strokeStyle='#FF3B30';ctx.lineWidth=2;
    this.rRect(st.x-42,st.y-52,84,30,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='#FF3B30';ctx.fillText('▼ $'+refund,st.x,st.y-37);
    ctx.textBaseline='alphabetic';
  },

  _drawBuildMenu: function(bx,by){
    var self=this;
    ctx.fillStyle='rgba(4,8,22,0.92)';ctx.strokeStyle='rgba(0,229,255,0.5)';ctx.lineWidth=2;
    ctx.shadowBlur=18;ctx.shadowColor='#00E5FF';
    ctx.beginPath();ctx.arc(bx,by,95,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    for(var k=0;k<6;k++){var a=(Math.PI/3)*k-Math.PI/2;ctx.strokeStyle='rgba(0,229,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a)*95,by+Math.sin(a)*95);ctx.stroke();}
    var opts=[
      {l:'Cryo',c:120,col:'#B5EAD7'},{l:'Tesla',c:200,col:'#FFD700'},
      {l:'Arty', c:140,col:'#34A853'},{l:'Fan',  c:190,col:'#FF9F1C'},
      {l:'Sniper',c:175,col:'#FF3B30'},{l:'Pulse',c:60,col:'#00E5FF'},
    ];
    ctx.font='bold 9px "Google Sans",Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    opts.forEach(function(o,idx){
      var a=(Math.PI/3)*idx-Math.PI/2,ox=bx+Math.cos(a)*58,oy=by+Math.sin(a)*58;
      var canAfford=self.credits>=o.c;
      ctx.fillStyle=canAfford?o.col+'28':'#11111188';
      ctx.strokeStyle=canAfford?o.col+'CC':'#33333388';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(ox,oy,26,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle=canAfford?o.col:'#444';
      ctx.shadowBlur=canAfford?8:0;ctx.shadowColor=o.col;
      ctx.beginPath();ctx.arc(ox,oy-11,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle=canAfford?'#FFF':'#555';ctx.fillText(o.l,ox,oy+1);
      ctx.fillStyle=canAfford?'#FFD700':'#444';ctx.fillText('$'+o.c,ox,oy+12);
    });
    ctx.textBaseline='alphabetic';
  },
},
};

var confetti=[];
function launchConfetti(){ if(!particlesEnabled) return; resizeConfCanvas();confetti=[]; for(var i=0;i<120;i++)confetti.push({x:Math.random()*confCanvas.width,y:-10,vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,color:['#EA4335','#FBBC05','#34A853','#1A73E8','#9C27B0'][Math.floor(Math.random()*5)],size:Math.random()*8+4,rot:Math.random()*360,rotV:(Math.random()-0.5)*8,a:1}); animateConfetti(); }
function animateConfetti(){ if(!confetti.length)return; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); confetti.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.rot+=c.rotV;c.a-=0.006;confCtx.save();confCtx.globalAlpha=Math.max(0,c.a);confCtx.fillStyle=c.color;confCtx.translate(c.x,c.y);confCtx.rotate(c.rot*Math.PI/180);confCtx.fillRect(-c.size/2,-c.size/2,c.size,c.size);confCtx.restore();}); confetti=confetti.filter(c=>c.a>0&&c.y<confCanvas.height+20); if(confetti.length)requestAnimationFrame(animateConfetti); else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }

function gameLoop(){
  if(isGameOver||isPaused) return; var game=Games[activeGameTitle];if(!game)return;
  if(game.update) game.update();
  if(game.engine==='canvas'){ 
    game.draw(); 
    score=Math.floor(rawScore * diffMult); 
    document.getElementById('hudScore').textContent=score;
  }
  reqAnimFrame=requestAnimationFrame(gameLoop);
}

function launchGame(diff,mult){
  var game=Games[activeGameTitle];if(!game)return; activeDiff=diff;diffMult=mult;
  document.getElementById('bsTitle').textContent = "Connecting to Server...";
  document.getElementById('globalLoader').classList.add('active');
  google.script.run.withSuccessHandler(function(res){
     if(res && res.success) {
        activeSecurityToken = res.token;
        closeModal('appSheetOverlay');
        document.getElementById('globalLoader').classList.remove('active');
        playBGM('bgmGame');
        var gs=document.getElementById('gameScreen'); gs.style.display='flex'; document.getElementById('activeGameTitle').textContent=activeGameTitle;
        logBountyProgress('gamesPlayed', activeGameTitle);
        isGameOver=false;isPaused=false;rawScore=0;score=0;keys={}; document.getElementById('hudScore').textContent='0';
        document.getElementById('gameOverScreen').classList.remove('open'); document.getElementById('pauseOverlay').classList.remove('visible'); document.getElementById('pauseBtn').textContent='⏸ Pause';
        
        // --- FIX: STRICT CANVAS RESET ---
        canvas.width = 700;
        canvas.height = 480;
        ctx.clearRect(0, 0, 700, 480);
        // --------------------------------
        
        if(game.engine==='canvas'){canvas.style.display='block';domEngine.style.display='none';} else{canvas.style.display='none';domEngine.style.display='flex';}
        if(reqAnimFrame){cancelAnimationFrame(reqAnimFrame);reqAnimFrame=null;}
        game.init();
        if(game.engine==='canvas' || game.update) reqAnimFrame=requestAnimationFrame(gameLoop);
     } else { 
        showToast('❌ Security error connecting to vault.'); closeModal('appSheetOverlay');
     }
  }).withFailureHandler(function(){ 
      document.getElementById('globalLoader').classList.remove('active'); 
      showToast('❌ Connection failed.'); 
      closeModal('appSheetOverlay'); 
  }).startGame(activeGameTitle, activeDiff);
}

function triggerGameOver(msg){
  if(isGameOver) return; isGameOver=true;
  if(reqAnimFrame){cancelAnimationFrame(reqAnimFrame);reqAnimFrame=null;}
  score=Math.floor(rawScore * diffMult);
  document.getElementById('hudScore').textContent=score;
  
  // --- WORK PRIORITIZATION CHECK ---
  sessionGamesCount++;
  if (sessionGamesCount >= 10) {
      setTimeout(() => {
          openModal('workReminderModal');
          playSound('crash');
      }, 800);
      sessionGamesCount = 0;
      sessionStartTime = Date.now();
  }
  // ---------------------------------
  
  document.getElementById('endStateText').textContent=msg||'Game Over';
  
  // THE FIX: This line actively updates the big green number!
  document.getElementById('finalScore').textContent=score; 
  
  document.getElementById('saveStatus').textContent='Encrypting and saving score...'; 
  document.getElementById('pbRibbon').style.display='none'; 
  document.getElementById('newAchievements').innerHTML='';
  document.getElementById('gameOverScreen').classList.add('open'); 
  document.getElementById('economyStatus').textContent='';
  
  logBountyProgress('arcadeScore', Math.floor(score / diffMult));
  
  if(score>0 && activeSecurityToken){
    google.script.run.withSuccessHandler(function(res){
      if(res&&res.success){
        document.getElementById('saveStatus').textContent='Saved ✓  '+(res.isPB?'New best!':'PB: '+res.prevPB);
        
        let econText = `Tickets: ${res.tickets} 🎟️ | Unspent: ${res.unspent.toLocaleString()}<br>`;
        econText += `<span style="color:var(--play-green); font-weight:bold;">+${res.earnedXP.toLocaleString()} XP & Pts</span>`;
        
        if (res.fatigueMult < 1.0) {
            let fatiguePct = Math.round(res.fatigueMult * 100);
            econText += `<br><span style="color:#FF3B30; font-size:11px; font-weight:900;">⚠️ FATIGUE ACTIVE: Rewards reduced to ${fatiguePct}% (Play a different game!)</span>`;
        }

        document.getElementById('economyStatus').innerHTML = econText;
        refreshWalletUI(); 
        document.getElementById('globalTicketCount').textContent = res.tickets;
        
        var uiPts = document.getElementById('uiPoints'); if (uiPts) uiPts.textContent = res.unspent.toLocaleString();
        var uiTkts = document.getElementById('uiTickets'); if (uiTkts) uiTkts.textContent = res.tickets;
        
        if(res.isPB){personalBests[activeGameTitle]=score;document.getElementById('pbRibbon').style.display='block';playSound('pb');launchConfetti();}
        
        var achDiv=document.getElementById('newAchievements');
        (res.newAchievements||[]).forEach(a=>{achDiv.innerHTML+='<span class="new-ach-chip">'+a.label+'</span>';setTimeout(()=>showToast(a.label+' — Achievement Unlocked!'),500);});
      } else { 
        document.getElementById('saveStatus').textContent='Score rejected by server.'; 
      }
      
      activeSecurityToken = null;
    }).withFailureHandler(function(){document.getElementById('saveStatus').textContent='Save error — check connection.';}).saveScore(activeGameTitle,activeDiff,score,activeSecurityToken);
  } else { 
    document.getElementById('saveStatus').textContent='Score too low to save.'; 
    activeSecurityToken = null; 
  }
}

function closeGame(){ 
  isGameOver=true; isPaused=false;
  if(reqAnimFrame){cancelAnimationFrame(reqAnimFrame); reqAnimFrame=null;} 
  document.getElementById('gameScreen').style.display='none'; document.getElementById('gameOverScreen').classList.remove('open'); 
  document.getElementById('pauseOverlay').classList.remove('visible'); confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); 
  playBGM('bgmLobby');
  
  // --- FIX: WIPE PIXELS ON EXIT ---
  canvas.width = 700;
  canvas.height = 480;
  ctx.clearRect(0, 0, 700, 480);
  // --------------------------------
  
  keys={}; var hint = document.getElementById('gameCanvasHint'); if(hint) hint.style.display='none'; 
  domEngine.onclick = null;
  domEngine.innerHTML = ''; buildStore();
}

function togglePause(){ 
  if(isGameOver)return; 
  isPaused=!isPaused; 
  document.getElementById('pauseOverlay').classList.toggle('visible',isPaused); 
  document.getElementById('pauseBtn').textContent=isPaused?'▶ Resume':'⏸ Pause'; 
  if(!isPaused&&Games[activeGameTitle]&&(Games[activeGameTitle].engine==='canvas'||Games[activeGameTitle].update)) reqAnimFrame=requestAnimationFrame(gameLoop);
}

var BRAIN   = ['2048', '4 Emojis 1 Word', 'Candy Crush', 'Cosmic Merge', 'Memory Flip', 'Minesweeper', 'Sudoku', 'Tetris'];
var CARD    = ['Playdle', 'Solitaire'];

var CURRENT_SEASON = { name: "LTM: THE CASINO", title: "Vegas", desc: "Bet your unspent points. Double your risk, half your reward.", endDate: "2026-04-30T23:59:59", featured: ['Candy Crush', '4 Emojis 1 Word', 'Cosmic Merge', 'Cyber Jump'] };

function buildStore(){
  renderFeatured(CURRENT_SEASON.featured); renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3)));
  renderRow('rowArcade', ARCADE); renderRow('rowBrain', BRAIN); renderRow('rowCard', CARD); populateLbSelect();

  google.script.run.withSuccessHandler(function(bests){
    personalBests=bests||{}; renderFeatured(CURRENT_SEASON.featured); 
    renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3)));
    renderRow('rowArcade', ARCADE); renderRow('rowBrain', BRAIN); renderRow('rowCard', CARD);
  }).withFailureHandler(function(){}).getAllPersonalBests();
}

function renderFeatured(names){
  var row=document.getElementById('rowFeatured');if(!row)return;row.innerHTML='';
  var badges={'Severity 1: Core Breach':'🔥 Event', 'Tetris':'🏆 Top Rated','Playdle':'🟩 Word Game','Cyber Jump':'🔥 Hot','2048':'🧠 Brain Flex','PacMan':'💥 Action', '4 Emojis 1 Word':'🧩 New Puzzle'};
  var badgeClass={'Severity 1: Core Breach':'hot', 'Tetris':'top','Playdle':'new','Cyber Jump':'hot','2048':'new','PacMan':'hot', '4 Emojis 1 Word':'new'};
  names.forEach(name=>{ 
    var game=Games[name];if(!game)return; 
    var pb=personalBests[name]; 
    
    // THE FIX: Check if it's an HTTP link. If not, render an Emoji block!
    var safeIcon = game.icon || '🎮';
    var iconHtml = safeIcon.startsWith('http') ? 
      `<div class="feat-banner" style="background-image: url('${safeIcon}'); background-size: cover; background-position: center;"></div><div class="feat-icon" style="background-image: url('${safeIcon}'); background-size: cover; background-position: center;"></div>` : 
      `<div class="feat-banner" style="background: ${GAME_BG[name]||'var(--surface-2)'}; display:flex; align-items:center; justify-content:center; font-size: 72px;">${safeIcon}</div><div class="feat-icon" style="background: ${GAME_BG[name]||'var(--surface-2)'}; font-size: 24px;">${safeIcon}</div>`;
       
    row.innerHTML+=`<div class="feat-card" onclick="openAppSheet('${name}')" role="button" tabindex="0">${iconHtml}<div class="feat-info"><div class="feat-meta"><h4>${name}</h4><p>${game.dev} · ${game.rating}★</p><span class="feat-badge ${badgeClass[name]||'new'}">${badges[name]||'Featured'}</span>${pb?'<p style="font-size:10px;color:var(--play-green);margin-top:3px;">PB: '+pb+'</p>':''}</div></div></div>`;
  });
}

function renderRow(rowId,names){
  var row=document.getElementById(rowId);if(!row)return;row.innerHTML='';
  
  // Turn the Recommended row into an Asymmetric Bento Grid
  if(rowId === 'rowRecommended') row.classList.add('bento-grid');
  else row.classList.remove('bento-grid');

  names.forEach((name, index)=>{ 
    var game=Games[name];if(!game)return; 
    var pb=personalBests[name]; 
    
    // Check if it's the hero spotlight of the Bento Grid
    var isBentoHero = (rowId === 'rowRecommended' && index === 0);
    var cardClass = isBentoHero ? 'app-card featured-bento' : 'app-card';

    var safeIcon = game.icon || '🎮';
    var iconHtml = safeIcon.startsWith('http') ? 
      `<div class="app-icon" style="background-image: url('${safeIcon}'); background-size: cover; background-position: center;"></div>` : 
      `<div class="app-icon" style="background: ${GAME_BG[name]||'var(--surface-2)'}; font-size:${isBentoHero ? '90px' : '68px'};">${safeIcon}</div>`;
       
    row.innerHTML+=`<button class="${cardClass}" onclick="openAppSheet('${name}')"><div class="app-icon-wrap">${pb?'<div class="pb-badge">PB:'+pb+'</div>':''}${iconHtml}</div><div class="app-title">${name}</div><div class="app-dev">${game.dev}</div><div class="app-meta"><span class="star">★</span>${game.rating} · ${game.installs}</div></button>`; 
  });
}

function handleSearch(val) {
  document.getElementById('searchClear').style.display = val ? 'block' : 'none'; 
  var q = val.toLowerCase();
  var matches = Object.keys(Games).filter(n => n.toLowerCase().indexOf(q) !== -1 || Games[n].dev.toLowerCase().indexOf(q) !== -1 || Games[n].cat.toLowerCase().indexOf(q) !== -1);
  
  // Removed 'secLTM' and added null checks to make this crash-proof
  var allSections = ['heroBanner', 'secFeatured', 'secRecommended', 'secArcade', 'secBrain', 'secCard', 'bountyCard'];
  
  if(!val) { 
    allSections.forEach(id => { var el = document.getElementById(id); if(el) el.style.display = ''; }); 
    document.getElementById('emptySearch').classList.remove('visible'); 
    document.getElementById('recTitle').textContent = 'Recommended for you'; 
    renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3))); 
    return; 
  }
  
  allSections.forEach(id => { var el = document.getElementById(id); if(el) el.style.display = 'none'; });
  
  if(matches.length === 0){ 
    document.getElementById('secRecommended').style.display = 'none'; 
    document.getElementById('emptySearch').classList.add('visible'); 
  } else { 
    document.getElementById('secRecommended').style.display = ''; 
    document.getElementById('emptySearch').classList.remove('visible'); 
    renderRow('rowRecommended', matches); 
    document.getElementById('recTitle').textContent = 'Results for "' + val + '"'; 
  }
}

function clearSearch() { 
  var inp = document.getElementById('searchInput');
  if(inp) { inp.value = ''; handleSearch(''); }
}

function filterCategory(cat, el) {
  // Security check: Bounce if locked
  if (el && el.classList.contains('locked')) { showToast('🔒 ' + el.innerText); return; }

  // Call showTab and pass the element ID so the green indicator slides over!
  showTab('storeFront', el ? el.id : null); 
  
  // Safely clear search text without triggering the global handleSearch reset
  var inp = document.getElementById('searchInput');
  if(inp) inp.value = '';
  document.getElementById('searchClear').style.display = 'none';
  
  var isAll = (cat === 'All');
  
  // Crash-proof visibility toggle
  var setDisplay = (id, show) => { var e = document.getElementById(id); if(e) e.style.display = show ? '' : 'none'; };

  // 1. Hide the top fluff if we aren't on the main page
  setDisplay('heroBanner', isAll);
  setDisplay('secFeatured', isAll);
  setDisplay('bountyCard', isAll);
  
  // 2. Hide the static categories so we don't get duplicates
  setDisplay('secArcade', isAll);
  setDisplay('secBrain', isAll);
  setDisplay('secCard', isAll);
  
  document.getElementById('emptySearch').classList.remove('visible');
  
  // 3. Always show the Recommended section, repurposing it for the tabs!
  setDisplay('secRecommended', true);
  
  // 4. Fill the row based on what tab you clicked
  if (isAll) { 
    document.getElementById('recTitle').textContent = 'Recommended for you';
    renderRow('rowRecommended', ARCADE.slice(0,3).concat(BRAIN.slice(0,3))); 
  } else if (cat === 'Arcade') { 
    document.getElementById('recTitle').textContent = '🕹️ Arcade Action'; 
    renderRow('rowRecommended', ARCADE);
  } else if (cat === 'Puzzle') { 
    document.getElementById('recTitle').textContent = '🧠 Brain & Logic'; 
    renderRow('rowRecommended', BRAIN);
  } else if (cat === 'Card') { 
    document.getElementById('recTitle').textContent = '🃏 Card & Word Games'; 
    renderRow('rowRecommended', CARD);
  }
}

function populateLbSelect(){ var sel=document.getElementById('lbSelect');if(!sel)return;sel.innerHTML=''; Object.keys(Games).forEach(name=>{sel.innerHTML+=`<option value="${name}">${name}</option>`;}); }

function setLbFilter(f,el){ lbFilter=f; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); loadLeaderboard(); }
function loadLeaderboard() {
  var gameEl = document.getElementById('lbSelect');
  var game = gameEl ? gameEl.value : '';
  var el = document.getElementById('leaderboardList'); 
  if(!el) return;
  
  el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">Loading charts...</span></div>';
  
  google.script.run.withSuccessHandler(function(rows){ 
    try {
        var rankEmoji = ['🥇','🥈','🥉']; 
        
        // Failsafe: Ensure we have a valid array
        if (typeof rows === 'string') rows = JSON.parse(rows);
        if(!rows || !Array.isArray(rows) || rows.length === 0) {
            el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">No scores yet for this game. Be the first to play! 🎮</span></div>';
            return;
        } 
        
        // Sanitize and filter out empty/zero scores
        let processedRows = rows.map(r => {
            let rawVal = r.score !== undefined ? r.score : (r.xp !== undefined ? r.xp : 0);
            let numVal = typeof rawVal === 'number' ? rawVal : (parseInt(String(rawVal).replace(/,/g, '')) || 0);
            return { ...r, parsedScore: numVal };
        }).filter(r => r.parsedScore > 0); // Hide players with 0 score

        if(processedRows.length === 0) {
            el.innerHTML = '<div class="lb-row"><span style="color:var(--text-muted);font-size:14px;">No scores yet for this game. Be the first to play! 🎮</span></div>';
            return;
        }

        // Re-sort just to be absolutely certain the highest scores are at the top
        processedRows.sort((a, b) => b.parsedScore - a.parsedScore);

        el.innerHTML = processedRows.map((r, index) => {
            let rank = r.rank || (index + 1);
            let rankBadge = rank <= 3 ? ['gold','silver','bronze'][rank-1] : '';
            let rankDisplay = rank <= 3 ? rankEmoji[rank-1] : rank;
            let youChip = r.isYou ? '<span class="lb-you-chip">YOU</span>' : '';
            let diffChip = r.diff ? `<span class="lb-diff-chip ${r.diff}">${r.diff}</span>` : '';
            let ldapStr = r.ldap || r.name || 'Unknown';
            
            return `<div class="lb-row ${r.isYou?'you':''}">
                      <div class="lb-rank ${rankBadge}">${rankDisplay}</div>
                      <div class="lb-ldap">${ldapStr} ${youChip} ${diffChip}</div>
                      <div class="lb-score">${r.parsedScore.toLocaleString()}</div>
                    </div>`;
        }).join(''); 
    } catch (e) {
        console.error("Leaderboard Render Error:", e);
        el.innerHTML = '<div class="lb-row"><span style="color:#FF3B30;font-size:14px;">Error rendering charts. Check console.</span></div>';
    }
  }).withFailureHandler(function(err){
      console.error("Server Error:", err);
      el.innerHTML = '<div class="lb-row"><span style="color:#FF3B30;font-size:14px;">Failed to fetch from server. Try again.</span></div>';
  }).getArcadeLeaderboard(game, lbFilter); // <--- CALLING THE NEW UNIQUE ENDPOINT
}

function buildPodiumStep(user, rank, unit) {
  var tier = getTierInfo(user.xp);
  var cls = rank===1 ? 'podium-1' : rank===2 ? 'podium-2' : 'podium-3';
  var crown = rank===1 ? '<div class="podium-crown">👑</div>' : '';
  let safeUnit = unit || 'XP';
  
  // Calculate their exact Level
  var lvl = Math.floor(Math.sqrt((user.xp || user.score || 0) / 1500)) + 1;
  
  return `<div class="podium-step ${cls}">
            ${crown}
            <div class="podium-name">${user.tag ? '<span style="color:#FFFDE4; opacity:0.8; font-size:11px;">['+user.tag+']</span><br>' : ''}${user.ldap}</div>
            <div class="podium-avatar ${tier.cls}" style="overflow:hidden; padding:0;">${getMomaAvatar(user.ldap)}</div>
            <div class="podium-block">
              <div style="font-size:13px; font-weight:900; color:rgba(255,255,255,0.9); margin-bottom:4px; letter-spacing:0.5px;">Lv. ${lvl}</div>
              <div class="podium-score">${user.score.toLocaleString()} ${safeUnit}</div>
            </div>
          </div>`;
}

function openProfile(){
  document.getElementById('drawerOverlay').classList.add('open'); document.getElementById('profileDrawer').classList.add('open');
  document.getElementById('drawerContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:14px;">Loading your stats…</div>';
  google.script.run.withSuccessHandler(function(stats){
    if(!stats){ document.getElementById('drawerContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--g-red);font-size:14px;">⚠️ Could not load profile.<br><br><button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="openProfile()">Retry</button></div>'; return; }
    
    var drawerAv = document.getElementById('drawerAvatar'); 
    drawerAv.innerHTML = getMomaAvatar(stats.ldap); 
    drawerAv.style.overflow = 'hidden'; 
    drawerAv.style.padding = '0';
    
    var tier = getTierInfo(stats.xp);
    drawerAv.className = 'drawer-avatar ' + tier.cls;
    document.getElementById('drawerName').innerHTML = stats.ldap + ' <span class="tier-badge '+tier.badge+'" style="margin-left:6px; font-size:10px; padding:2px 6px; vertical-align:middle;">'+tier.icon+' '+tier.name+'</span>';

    var earned=new Set((stats.achievements||[]).map(a=>a.id)), bestEntries=Object.entries(stats.bests||{}).sort((a,b)=>b[1]-a[1]).slice(0,6);
    var favGame=stats.favoriteGame, favIconRaw=favGame&&Games[favGame]?Games[favGame].icon:'🎮';
    
    // Check if the favorite icon is a URL or an emoji
    var favIconHtml = favIconRaw.startsWith('http') ? `<img src="${favIconRaw}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.2);">` : `<div style="font-size:32px;">${favIconRaw}</div>`;

    // Calculate RPG Level Progress using the new XP column
    let currentXP = stats.xp || 0;
    let playerLvl = Math.floor(Math.sqrt(currentXP / 1500)) + 1;
    let prevLvlPts = Math.pow(playerLvl - 1, 2) * 1500;
    let nextLvlPts = Math.pow(playerLvl, 2) * 1500;
    let expProgress = ((currentXP - prevLvlPts) / (nextLvlPts - prevLvlPts)) * 100;

    // Calculate Performance Buff UI
    let cVal = parseFloat(stats.csat) || 0;
    let aVal = parseFloat(stats.attendance) || 0;
    
    // Sheets formula fix: Convert decimals to whole percentages
    if (cVal > 0 && cVal <= 1.0) cVal = cVal * 100;
    if (aVal > 0 && aVal <= 1.0) aVal = aVal * 100;

    let cBuff = cVal >= 95 ? '+0.5x' : (cVal >= 90 ? '+0.25x' : '+0.0x');
    let aBuff = aVal >= 100 ? '+0.5x' : (aVal >= 95 ? '+0.25x' : '+0.0x');
    
    let totalMult = 1.0;
    if (cVal >= 95) totalMult += 0.5; else if (cVal >= 90) totalMult += 0.25;
    if (aVal >= 100) totalMult += 0.5; else if (aVal >= 95) totalMult += 0.25;
    
    // Format the display to 1 decimal place (e.g., 82.1%)
    let displayCsat = stats.csat !== '' ? cVal.toFixed(1) + '%' : 'No Data';
    let displayAtt = stats.attendance !== '' ? aVal.toFixed(1) + '%' : 'No Data';

    let buffUI = totalMult > 1.0 
      ? `<div style="background:var(--play-green-light); color:var(--play-green); border:1px solid var(--play-green); padding:8px; border-radius:8px; text-align:center; font-weight:bold; margin-top:8px;">🔥 Active Multiplier: ${totalMult}x XP & Pts!</div>`

    var html = `
      <div class="drawer-section">
        <div class="drawer-section-title">🌟 Player Progression</div>
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px;">
           <div class="level-ring" style="width:48px; height:48px; font-size:22px; flex-shrink:0; box-shadow:0 4px 10px rgba(1,135,95,0.4);">${playerLvl}</div>
           <div style="flex:1;">
              <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; font-weight:bold; color:var(--text-main);">
                 <span>Level ${playerLvl}</span>
                 <span style="color:var(--play-green);">${currentXP.toLocaleString()} / ${nextLvlPts.toLocaleString()} XP</span>
              </div>
              <div class="exp-bar-bg" style="width:100%; height:8px;"><div class="exp-bar-fill" style="width:${Math.max(0, Math.min(100, expProgress))}%"></div></div>
           </div>
        </div>
        
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px;">

// --- 5-STAR UNIVERSAL BOUNTY ENGINE ---
function getTodayBounties() {
  const masterBounties = [
    // TIER 1 (10k Pts) - Quick Tasks
    { tier: 1, key: 'gamesPlayed', desc: 'Play 3 different games today.', label: '+10k Pts', pts: 10000, max: 3, unit: 'Games' },
    { tier: 1, key: 'blackjackWin', desc: 'Win 3 hands of Imperial 21.', label: '+10k Pts', pts: 10000, max: 3, unit: 'Wins' },
    { tier: 1, key: 'slotSpins', desc: 'Spin Sovereign Gold Slots 25 times.', label: '+10k Pts', pts: 10000, max: 25, unit: 'Spins' },

    // TIER 2 (25k Pts) - Moderate Challenge
    { tier: 2, key: 'baccaratWin', desc: 'Defeat the Monaco Banker 15 times.', label: '+25k Pts', pts: 25000, max: 15, unit: 'Wins' },
    { tier: 2, key: 'arcadeScore', desc: 'Score 100,000 points in Arcade Action.', label: '+25k Pts', pts: 25000, max: 100000, unit: 'Pts' },
    { tier: 2, key: 'casinoWager', desc: 'Wager 100,000 points in the Casino.', label: '+25k Pts', pts: 25000, max: 100000, unit: 'Pts' },

    // TIER 3 (1 Ticket 🎟️) - VIRTUALLY IMPOSSIBLE (Zero Points involved)
    { tier: 3, key: 'puzzle', desc: 'Reach the 2048 tile 10 separate times.', label: '+1 Ticket 🎟️', pts: 500000, max: 10, unit: 'Times' },
    { tier: 3, key: 'tetris', desc: 'Clear a Tetris (4 lines at once) 100 times.', label: '+1 Ticket 🎟️', pts: 500000, max: 100, unit: 'Clears' },
    { tier: 3, key: 'derbyWin', desc: 'Guess the winning Derby horse 250 times.', label: '+1 Ticket 🎟️', pts: 500000, max: 250, unit: 'Wins' }
  ];
  
  var today = new Date().toDateString(); let seed = 0;
  for (let i = 0; i < today.length; i++) seed += today.charCodeAt(i);
  
  return [
    masterBounties.filter(b => b.tier === 1)[seed % 3], 
    masterBounties.filter(b => b.tier === 2)[(seed + 1) % 3], 
    masterBounties.filter(b => b.tier === 3)[(seed + 2) % 3]
  ];
}

function renderBounties(state) {
  var todayBounties = getTodayBounties();

  todayBounties.forEach(function(b, i) {
    var btnNum = i + 1;
    var current = (b.key === 'gamesPlayed') ? (state.gamesPlayed || []).length : (state[b.key] || 0);

      if (!isClaimed && current >= b.max) hasUnclaimed = true;

  // --- QoL: UNCLAIMED BOUNTY RED DOT ---

     if (hasUnclaimed) {

function initBounties() {
  var today = new Date().toDateString(); 
  var state = {};
  
  // 1. Safely parse local storage
  try {
    state = JSON.parse(localStorage.getItem('arcade_bounties')) || {};
  } catch(e) {
    state = {}; 
  }
  
  if(state.date !== today || !state.claimed || !state.gamesPlayed) {
    state = { date: today, gamesPlayed: [], tetris: 0, puzzle: 0, arcadeScore: 0, blackjackWin: 0, derbyWin: 0, casinoWager: 0, slotSpins: 0, baccaratWin: 0, claimed: [false, false, false] };
    localStorage.setItem('arcade_bounties', JSON.stringify(state));
  }
  
  // 3. FAILSAFE: Wrap the UI render in a try/catch so a visual bug never stops the app from booting
  try {
     renderDailyBounties();
     renderBounties(state);
  } catch(e) {
     console.warn("Bounty render failed, bypassing to save app boot.", e);
  }
}

function logBountyProgress(key, amount) {
  var state = null;
  try {
     state = JSON.parse(localStorage.getItem('arcade_bounties')); 
  } catch(e) {}
  
  if(!state) return;
  
  if(key === 'gamesPlayed') { if(state.gamesPlayed.indexOf(amount) === -1) state.gamesPlayed.push(amount); } 
  else { state[key] = (state[key] || 0) + amount; }
  
  localStorage.setItem('arcade_bounties', JSON.stringify(state));
  renderDailyBounties();
  renderBounties(state);
}

function claimBounty(id, reward) {
  var state = null;
  try {
     state = JSON.parse(localStorage.getItem('arcade_bounties')); 
  } catch(e) {}
  
  if(!state) return;

  // Anti-Spam: Stop them if they already claimed it locally
  if (state.claimed[id - 1]) {
      showToast('❌ Already claimed today!');
      return;
  }

  // Immediately disable the button so they can't double-click while it loads
  var btn = document.getElementById('btnBounty' + id);
  if(btn) { btn.disabled = true; btn.textContent = 'Claiming...'; }

  // Ping the server to verify and pay out
  google.script.run.withSuccessHandler(function(res) {
    if (res && res.success) {
      
      // 1. Update live balances if the server returns them
      if (res.tickets !== undefined) {
         document.getElementById('globalTicketCount').textContent = res.tickets;
         var uiTkts = document.getElementById('uiTickets'); if(uiTkts) uiTkts.textContent = res.tickets;
      }
      if (res.unspent !== undefined) {
         var uiPts = document.getElementById('uiPoints'); if(uiPts) uiPts.textContent = res.unspent.toLocaleString();
      }

      // 2. THE LOCKDOWN: Permanently mark it as claimed in local storage
      state.claimed[id - 1] = true;
      localStorage.setItem('arcade_bounties', JSON.stringify(state));

      // 3. Update the UI to show the grayed-out "Claimed ✓" state
      renderDailyBounties();
      renderBounties(state);
      showToast('🎁 Bounty Claimed! Reward added.');
      if(typeof launchConfetti === 'function') launchConfetti();

    } else {
      // If the Pit Boss (server) rejected it because they already claimed it on another device
      showToast('❌ ' + (res.message || 'Transaction failed.'));
      
      if (res.message && res.message.includes('already claimed')) {
          // Force the local lockdown anyway to fix their screen
          state.claimed[id - 1] = true;
          localStorage.setItem('arcade_bounties', JSON.stringify(state));
      }
      
      // Reset the button visual state
      renderDailyBounties();
      renderBounties(state);
    }
  }).claimBountyReward(id, reward);
}

function updateExpUI(totalXP, perfMult) {
  let safeXP = totalXP || 0;
  
  // Use pure XP for the level curve
  let playerLvl = Math.floor(Math.sqrt(safeXP / 1500)) + 1;
  currentPlayerLevel = playerLvl;
  enforceLevelGates();
  let prevLvlPts = Math.pow(playerLvl - 1, 2) * 1500;
  let nextLvlPts = Math.pow(playerLvl, 2) * 1500;
  let expProgress = ((safeXP - prevLvlPts) / (nextLvlPts - prevLvlPts)) * 100;
  
  let lvlEl = document.getElementById('uiLevel');
  let fillEl = document.getElementById('uiExpFill');
  let badgeEl = document.getElementById('uiPerfBadge');
  
  if (lvlEl) lvlEl.textContent = playerLvl;
  if (fillEl) fillEl.style.width = Math.min(100, Math.max(0, expProgress)) + '%';
  
  if (badgeEl && perfMult) {
    if (perfMult > 1.0) {
       badgeEl.style.display = 'inline-block';
       badgeEl.textContent = '🔥 ' + perfMult + 'x';
    } else {
       badgeEl.style.display = 'none';
    }
  }
}

var pixieCanvas = document.createElement('canvas');
pixieCanvas.id = 'pixieCanvas';
pixieCanvas.style.cssText = 'position:fixed; top:0; left:0; pointer-events:none; z-index:9999; display:block !important; background:transparent !important; max-height:none !important; aspect-ratio:auto !important;';
document.body.appendChild(pixieCanvas);
var pixieCtx = pixieCanvas.getContext('2d');
var pixies = [];

function resizePixie() {
  pixieCanvas.width = window.innerWidth;
  pixieCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizePixie);
