    _renderGTSListings: function(listings) {
        var self = this;
        var container = document.getElementById('gtsListingsContainer');
        if (!container) return;
        
        // 1. Cache data so filters apply instantly without hitting the server again
        if (listings) this.gtsData = listings;
        if (!this.gtsData) this.gtsData = [];
        
        // Initialize default filter/sort states
        if (!this.gtsSort) this.gtsSort = 'time';
        if (!this.gtsFilter) this.gtsFilter = 'all';

        if (this.gtsTimerInterval) clearInterval(this.gtsTimerInterval);

        // 2. Build the Sticky Control Bar (Filters & Sorting)
        var controlsHtml = "<div style='display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; background:rgba(0,0,0,0.4); padding:12px 20px; border-radius:12px; border:1px solid #334155;'>" +
            "<div style='font-weight:900; color:#38BDF8; letter-spacing:1px; text-transform:uppercase;'>Global Trade Station</div>" +
            "<div style='display:flex; gap:12px;'>" +
                "<select onchange='Games[\"Pokemon Play\"].gtsFilter=this.value; Games[\"Pokemon Play\"]._renderGTSListings()' style='background:#1E293B; color:#FFF; border:1px solid #475569; border-radius:6px; padding:6px 12px; outline:none; font-weight:bold; cursor:pointer;'>" +
                    "<option value='all' "+(this.gtsFilter==='all'?'selected':'')+">🌟 All Rarities</option>" +
                    "<option value='Epic' "+(this.gtsFilter==='Epic'?'selected':'')+">🟣 Epic</option>" +
                    "<option value='Rare' "+(this.gtsFilter==='Rare'?'selected':'')+">🔵 Rare</option>" +
                    "<option value='Uncommon' "+(this.gtsFilter==='Uncommon'?'selected':'')+">🟢 Uncommon</option>" +
                    "<option value='Common' "+(this.gtsFilter==='Common'?'selected':'')+">⚪ Common</option>" +
                "</select>" +
                "<select onchange='Games[\"Pokemon Play\"].gtsSort=this.value; Games[\"Pokemon Play\"]._renderGTSListings()' style='background:#1E293B; color:#FFF; border:1px solid #475569; border-radius:6px; padding:6px 12px; outline:none; font-weight:bold; cursor:pointer;'>" +
                    "<option value='time' "+(this.gtsSort==='time'?'selected':'')+">⏳ Ending Soon</option>" +
                    "<option value='price_asc' "+(this.gtsSort==='price_asc'?'selected':'')+">💵 Lowest Bid</option>" +
                    "<option value='price_desc' "+(this.gtsSort==='price_desc'?'selected':'')+">💰 Highest Bid</option>" +
                "</select>" +
            "</div>" +
        "</div>";

        if (this.gtsData.length === 0) {
            container.innerHTML = controlsHtml + "<div style='background:rgba(0,0,0,0.4); border:2px dashed #334155; border-radius:12px; padding:40px; color:#94A3B8; font-weight:bold;'>No active auctions at the moment. Check back later!</div>";
            return;
        }

        // 3. Process, Filter, and Sort the Data
        var processed = [];
        this.gtsData.forEach(function(l) {
            var d = null; for(var j=0; j<POKEDEX.length; j++){ if(POKEDEX[j].id === l.pokeId) { d = POKEDEX[j]; break; } }
            if(!d) return;

            // Calculate Rarity
            var bst = d.hp + d.atk;
            var rarity = 'Common'; var rCol = '#94A3B8';
            if (bst >= 190 || d.name === "Mewtwo" || d.name === "Mew") { rarity = 'Epic'; rCol = '#C084FC'; }
            else if (bst >= 140) { rarity = 'Rare'; rCol = '#38BDF8'; }
            else if (bst >= 100) { rarity = 'Uncommon'; rCol = '#4ADE80'; }

            // Apply Rarity Filter
            if (self.gtsFilter !== 'all' && rarity !== self.gtsFilter) return;

            // Stats Math (Applying Nature if it exists, otherwise defaulting to Hardy)
            var nature = l.nature || 'Hardy';
            var nMult = self.natures[nature] || { hp: 1.0, atk: 1.0 };
            var calcHp = Math.floor(d.hp * Math.pow(1.1, l.lvl-1) * nMult.hp);
            var calcAtk = Math.floor(d.atk * Math.pow(1.1, l.lvl-1) * nMult.atk);

            processed.push({ orig: l, d: d, rarity: rarity, rCol: rCol, nature: nature, hp: calcHp, atk: calcAtk });
        });

        processed.sort(function(a, b) {
            if (self.gtsSort === 'price_asc') return a.orig.bid - b.orig.bid;
            if (self.gtsSort === 'price_desc') return b.orig.bid - a.orig.bid;
            return a.orig.endTime - b.orig.endTime; // Default: Time Ending Soon
        });

        // 4. Render the UI
        var lHtml = controlsHtml + "<div style='display:flex; flex-direction:column; gap:12px; text-align:left;'>";
        var activeTimers = [];

        if (processed.length === 0) {
            lHtml += "<div style='text-align:center; padding:40px; color:#64748B; font-weight:bold;'>No Pokémon match your current filters.</div>";
        }

        processed.forEach(function(p) {
            var l = p.orig; var d = p.d;
            var tCol = self.typeColors[d.type] || '#A0AAB2';
            var shinyBorder = l.shiny ? "border:2px solid #FFD700; box-shadow:0 0 15px rgba(255,215,0,0.2);" : "border:1px solid #334155;";
            var minBid = l.bid + 1000;
            var natureColor = p.nature === 'Hardy' ? '#94A3B8' : (p.nature === 'Adamant' || p.nature === 'Brave' ? '#F87171' : '#4ADE80');

            if (l.endTime > 0) activeTimers.push({ row: l.row, endTime: l.endTime });

            lHtml += "<div style='display:grid; grid-template-columns:auto 1fr auto; gap:20px; align-items:center; background:linear-gradient(90deg, #0f172a, #1e293b); border-radius:12px; padding:16px; " + shinyBorder + " transition:transform 0.2s;' onmouseover='this.style.transform=\"scale(1.02)\"' onmouseout='this.style.transform=\"scale(1)\"'>" +
                
                // Column 1: Image
                "<div style='width:90px; height:90px; background:radial-gradient(circle at center, " + tCol + "40 0%, transparent 70%); position:relative; border-radius:8px;'>" + 
                (l.shiny ? "<div style='position:absolute; top:-10px; left:-10px; font-size:24px; animation:spin 3s linear infinite; filter:drop-shadow(0 0 8px #FFD700);'>✨</div>" : "") + 
                "<img src='" + d.img + "' style='width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.6)); position:relative; z-index:2;'></div>" +
                
                // Column 2: Deep Stats & Info
                "<div>" +
                    "<div style='display:flex; align-items:baseline; gap:10px; margin-bottom:6px;'>" +
                        "<div style='font-size:22px; font-weight:900; color:#FFF; text-transform:uppercase; text-shadow:0 2px 4px rgba(0,0,0,0.5);'>" + d.name + "</div>" +
                        "<div style='font-size:12px; font-weight:900; color:" + p.rCol + ";'>" + p.rarity + "</div>" +
                    "</div>" +
                    "<div style='display:flex; gap:8px; margin-bottom:12px; align-items:center;'>" +
                        "<div style='font-size:11px; background:" + tCol + "40; border:1px solid " + tCol + "; color:#FFF; padding:2px 6px; border-radius:4px; font-weight:bold;'>Lv. " + l.lvl + "</div>" +
                        "<div style='font-size:11px; border:1px solid " + natureColor + "; color:" + natureColor + "; padding:2px 6px; border-radius:4px; font-weight:bold;'>" + p.nature + "</div>" +
                        "<div style='font-size:11px; color:#94A3B8; padding-left:4px;'>Seller: <span style='color:#FFF; font-weight:bold;'>" + l.seller + "</span></div>" +
                    "</div>" +
                    "<div style='display:flex; gap:12px; align-items:center;'>" +
                        "<div style='font-size:12px; font-weight:900; background:rgba(0,0,0,0.4); padding:4px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.05);'><span style='color:#4ADE80; margin-right:4px;'>HP</span> " + p.hp + "</div>" +
                        "<div style='font-size:12px; font-weight:900; background:rgba(0,0,0,0.4); padding:4px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.05);'><span style='color:#F87171; margin-right:4px;'>ATK</span> " + p.atk + "</div>" + 
                        (l.endTime > 0 ? "<div id='gts-timer-" + l.row + "' style='font-size:11px; font-weight:bold; background:rgba(227, 53, 13, 0.2); border:1px solid #E3350D; color:#FCA5A5; padding:4px 8px; border-radius:6px; min-width:110px; text-align:center;'>⏳ Calc...</div>" : "") + 
                    "</div>" +
                "</div>" +
                
                // Column 3: Bidding Actions
                "<div style='display:flex; flex-direction:column; align-items:flex-end; gap:6px; border-left:1px solid #334155; padding-left:20px;'>" +
                    "<div style='font-size:11px; color:#94A3B8; font-weight:bold; text-transform:uppercase;'>Current Bid</div>" +
                    "<div style='font-size:26px; font-weight:900; color:#4ADE80; text-shadow:0 2px 4px rgba(0,0,0,0.4);'>" + l.bid.toLocaleString() + "</div>" +
                    "<div style='font-size:10px; color:#FACC15; font-weight:bold; margin-bottom:6px;'>Top: " + (l.bidder || "None") + "</div>" +
                    "<div style='display:flex; gap:8px; width:100%; justify-content:flex-end;'>" +
                        (l.seller === self.playerData.trainerName ?
                        "<button onclick='Games[\"Pokemon Play\"]._delistListing(" + l.row + ")' style='background:#EF4444;color:#FFF;border:none;padding:10px 16px;border-radius:8px;font-weight:900;cursor:pointer;'>DELIST</button>" :
                        "<button onclick='Games[\"Pokemon Play\"]._placeBid(" + l.row + ", " + minBid + ")' style='background:#38BDF8;color:#000;border:none;padding:10px 16px;border-radius:8px;font-weight:900;cursor:pointer;box-shadow:0 4px 10px rgba(56,189,248,0.3);'>BID " + minBid.toLocaleString() + "</button>") + 
                        (l.buyout > 0 ? "<button onclick='Games[\"Pokemon Play\"]._buyoutListing(" + l.row + ")' style='background:linear-gradient(90deg, #F59E0B, #D97706); color:#FFF; border:none; padding:10px 16px; border-radius:8px; font-weight:900; cursor:pointer; box-shadow:0 4px 10px rgba(245, 158, 11, 0.4);'>BUYOUT " + l.buyout.toLocaleString() + "</button>" : "") + 
                    "</div>" +
                "</div>" +
            "</div>";
        });
        lHtml += "</div>";
        container.innerHTML = lHtml;

        // 5. The Live Timer Loop
        this.gtsTimerInterval = setInterval(function() {
            var now = new Date().getTime();
            activeTimers.forEach(function(t) {
                var el = document.getElementById('gts-timer-' + t.row);
                if (el) {
                    var distance = t.endTime - now;
                    if (distance < 0) {
                        el.innerHTML = "⏳ Resolving...";
                        el.style.background = "transparent"; 
                        el.style.border = "none";
                        el.style.color = "#4ADE80"; // Bright green for success
                        
                        // Prevent the loop from spamming the server
                        if (!t.resolving) {
                            t.resolving = true;
                            // Wait 2 seconds for visual effect, then silently refresh the GTS
                            setTimeout(function() {
                                if (Games["Pokemon Play"].activeTab === 'gts') {
                                    Games["Pokemon Play"].renderHub();
                                }
                            }, 2000);
                        }
                    } else {
                        var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        var s = Math.floor((distance % (1000 * 60)) / 1000);
                        el.innerHTML = "⏳ " + h + "h " + m + "m " + s + "s";
                    }
                }
            });
        }, 1000);
    },

    _buyoutListing: function(rowIdx) {
        if(typeof showToast === 'function') showToast('⏳ Processing Buyout...'); playSound('coin'); var self = this;
        google.script.run.withSuccessHandler(function(res) {
            if(res.success) {
                playSound('win'); if(typeof showToast === 'function') showToast('✅ ' + res.message);
                var nId = res.card.id;

    init: function() {

      this.totalCash = 0;
      this.clickPower = 1;
      this.dps = 0; 
      
      // --- NEW: ANTI-CHEAT & OVERTIME VARS ---
      this.clicksThisSecond = 0;
      this.lastSecondTime = Date.now();
      this.overheated = 0; // If > 0, the cup is locked!

      // --- NEW: CAFFEINE RUSH VARS ---

      this.rushTimer = 0;

      // Fixed upgrade math: Removed the baseCost scaling bug
      this.upgrades = [
         { name: 'Tip Jar (Click +1)', baseCost: 25, cost: 25, count: 0, type: 'click', val: 1, c: '#A1887F', desc: 'Customers leave spare change' },
         { name: 'Barista (+2/sec)', baseCost: 100, cost: 100, count: 0, type: 'auto', val: 2, c: '#4FC3F7', desc: 'Brews coffee automatically' },
         { name: 'Espresso Machine (+15/sec)', baseCost: 1200, cost: 1200, count: 0, type: 'auto', val: 15, c: '#81C995', desc: 'Commercial grade brewing power' },
         { name: 'Drive-Thru (+80/sec)', baseCost: 15000, cost: 15000, count: 0, type: 'auto', val: 80, c: '#FBC02D', desc: 'Serves commuters on the go' },
         { name: 'Franchise (+400/sec)', baseCost: 180000, cost: 180000, count: 0, type: 'auto', val: 400, c: '#B026FF', desc: 'Open locations nationwide' },
         { name: 'Global Monopoly (+2k/sec)', baseCost: 2500000, cost: 2500000, count: 0, type: 'auto', val: 2000, c: '#FF3B30', desc: 'Coffee is now a global currency' }
      ];

    },
    
    click: function(x, y) {
      if(this.over || isPaused) return;

      // 1. Click the Coffee Cup (Left Side)
      let cx = 260, cy = 360, cr = 140;
      if (Math.hypot(x - cx, y - cy) < cr) {
          
          // --- ANTI-AUTOCLICKER LOGIC ---
          let now = Date.now();
          if (now - this.lastSecondTime > 1000) { 
              this.clicksThisSecond = 0; 
              this.lastSecondTime = now; 
          }
          this.clicksThisSecond++;
          
          // If they click more than 15 times a second, lock the cup for 3 seconds!
          if (this.clicksThisSecond > 15) {
              if (this.overheated <= 0 && typeof showToast === 'function') {
                  showToast("🔥 CUP OVERHEATED! Slow down!");
                  if(typeof playSound === 'function') playSound('crash');
              }
              this.overheated = 180; // 3 seconds (60fps)
          }
          if (this.overheated > 0) return; // Prevent earning if locked
          // ------------------------------

          // --- CAFFEINE RUSH LOGIC ---
          let isRush = this.rushTimer > 0;
          let earned = isRush ? (this.clickPower * 3) : this.clickPower;
          
          if (!isRush) {
              this.combo += 2; // Build combo heat
              if (this.combo >= 100) {
                  this.rushTimer = 600; // 10 seconds at 60 FPS
                  this.combo = 0;
                  if(typeof showToast === 'function') showToast('⚡ CAFFEINE RUSH! 3x CLICK POWER!');
                  if(typeof playSound === 'function') playSound('win');
              }
          }

          this.cash += earned;
          this.totalCash += earned;
          this.coreScale = isRush ? 1.15 : 1.05; // Bigger pump during rush
          
          if(this.fc % 3 === 0 && typeof playSound === 'function') playSound('jump');
          this.popups.push({ x: x + (Math.random()*40-20), y: y - 20, txt: '+$'+earned, a: 1, c: isRush ? '#00E5FF' : '#FFD700' });
          if(typeof particlesEnabled !== 'undefined' && particlesEnabled) {
             for(let i=0; i<3; i++) this.particles.push({x: x, y: y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, c: isRush ? '#00E5FF' : '#EFEBE9'});
          }
          return;
      }

      // 2. Buy Upgrades (Right Side)
      let startY = 60;
      for(let i=0; i<this.upgrades.length; i++) {
          let u = this.upgrades[i];
          let bx = 520, by = startY + i * 92, bw = 400, bh = 80;
          if (x > bx && x < bx + bw && y > by && y < by + bh) {
              if (this.cash >= u.cost) {
                  if(typeof playSound === 'function') playSound('coin');
                  this.cash -= u.cost;
                  u.count++;
                  
                  if (u.type === 'click') this.clickPower += u.val;
                  else this.dps += u.val;
                  
                  // FIXED MATH: Classic 15% incremental scaling
                  u.cost = Math.floor(u.baseCost * Math.pow(1.15, u.count));
                  
                  if(typeof particlesEnabled !== 'undefined' && particlesEnabled) {
                     for(let p=0; p<15; p++) this.particles.push({x: bx + bw/2, y: by + bh/2, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, c: u.c});
                  }
              } else {
                  if(typeof playSound === 'function') playSound('crash');
              }
              return;
          }
      }

      // 3. Buy Overtime Check (With Hard Caps!)
      let timeBx = 30, timeBy = 135, timeBw = 180, timeBh = 45;
      if (x > timeBx && x < timeBx + timeBw && y > timeBy && y < timeBy + timeBh) {
          if (this.overtimePurchases >= 5) {
              if(typeof showToast === 'function') showToast('❌ Max Overtime Reached!');
              if(typeof playSound === 'function') playSound('crash');
              return;
          }
          if (this.cash >= this.overtimeCost) {
              if(typeof playSound === 'function') playSound('coin');
              this.cash -= this.overtimeCost;
              this.timer += 10 * 60; 
              this.overtimePurchases++;
              this.popups.push({ x: timeBx + timeBw/2, y: timeBy - 10, txt: '+10 SECONDS!', a: 1, c: '#4ADE80' });
              
              // Only scale 2.5x instead of 5.0x
              this.overtimeCost = Math.floor(this.overtimeCost * 2.5);
          } else {
              if(typeof playSound === 'function') playSound('crash');
              if(typeof showToast === 'function') showToast('❌ Need $' + this.overtimeCost.toLocaleString() + ' for Overtime!');
          }
          return;
      }
    },
    
    // QoL: Spacebar/Enter brewing
    handleKey: function(key) {
      if (this.over) return;
      if (key === ' ' || key === 'Spacebar' || key === 'Enter') {
          this.click(260, 360); 
      }
    },
    
    update: function() {
      if(this.over) return;
      this.fc++;
      this.timer--;

      // --- CAFFEINE RUSH TICKER ---
      if (this.rushTimer > 0) {
          this.rushTimer--;
      } else if (this.combo > 0 && this.fc % 4 === 0) {
          this.combo--; // Drain combo rapidly if they stop clicking!
      }

      // Generate passive income (60 frames per second = dps / 60 per frame)
      if (this.dps > 0) {
          let gain = this.dps / 60;
          this.cash += gain;
          this.totalCash += gain;
      }

      // Constantly sync total cash to rawScore for the Arcade wrapper!
      rawScore = Math.floor(this.totalCash);

      // Animations
      if(this.coreScale > 1.0) this.coreScale -= 0.005;
      
      this.popups.forEach(p => { p.y -= 1.5; p.a -= 0.02; });
      this.popups = this.popups.filter(p => p.a > 0);
      
      this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
      this.particles = this.particles.filter(p => p.life > 0);
      
      this.steamBg.forEach(b => { 
          b.y -= b.v; 
          b.x += Math.sin(this.fc * 0.05 + b.s) * 0.5; // Drift side to side
          if(b.y < -50) { b.y = 690; b.x = Math.random() * 960; }
      });
      
      if (this.timer <= 0) {
          this.over = true;
          if(typeof playSound === 'function') playSound('win');
          if(typeof particlesEnabled !== 'undefined' && particlesEnabled && typeof launchConfetti === 'function') launchConfetti();
          setTimeout(() => triggerGameOver('Cafe Franchised! Final Revenue: $' + Math.floor(this.totalCash).toLocaleString()), 1500);
      }
    },

       }
       if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W') {
           this.jump();
       }
    },

    update: function() {
       if (this.state !== 'playing') return;
       
       this.fc++;
       this.bgOffset += this.speed * 0.3;
       this.dayCycle += 0.05; // Slowly shift sky colors
       
       if (this.fc % 300 === 0) {
           this.speed += 0.5;
           this.popups.push({ x: this.p.x + 30, y: this.p.y - 20, txt: 'SPEED UP!', a: 1, vy: -1, c: '#FF3B30' });
       }
       if (this.fc % 10 === 0) rawScore += 5;

       // 1. QoL TIMERS (Coyote Time, Jump Buffer, Magnet)
       if (this.p.grounded) this.coyoteTimer = 8; else this.coyoteTimer--;
       if (this.jumpBuffer > 0) this.jumpBuffer--;
       if (this.magnetTimer > 0) this.magnetTimer--;

       // 2. QoL JUMP LOGIC
       if (this.jumpBuffer > 0) {
           if (this.coyoteTimer > 0 && this.p.jumps === 0) {
               // Normal/Coyote Jump
               this.p.vy = -12.5; this.p.grounded = false; this.coyoteTimer = 0; this.jumpBuffer = 0; this.p.jumps = 1;
               playSound('jump');
               if (particlesEnabled) for(let i=0; i<6; i++) this.particles.push({x: this.p.x + this.p.w/2, y: this.p.y + this.p.h, vx: (Math.random()-0.5)*4, vy: Math.random()*2, life: 1, c: '#FFF'});
           } else if (!this.p.grounded && this.p.jumps < 2) {
               // Double Jump
               this.p.vy = -11; this.p.jumps = 2; this.jumpBuffer = 0;
               playSound('jump');
               if (particlesEnabled) for(let i=0; i<6; i++) this.particles.push({x: this.p.x + this.p.w/2, y: this.p.y + this.p.h, vx: (Math.random()-0.5)*6, vy: Math.random()*4, life: 1, c: '#00E5FF'});
           }
       }

       // 3. APPLY GRAVITY
       this.p.vy += this.gravity;
       if (this.p.vy > 16) this.p.vy = 16;
       this.p.y += this.p.vy;

       // 4. PLATFORM COLLISION
       this.p.grounded = false;
       for (let i = 0; i < this.platforms.length; i++) {
           let plat = this.platforms[i];
           // Fair Hitbox: Allow slight clipping on the sides
           if (this.p.vy > 0 && this.p.x + this.p.w > plat.x + 15 && this.p.x < plat.x + plat.w - 15 && 
               this.p.y + this.p.h >= plat.y && this.p.y + this.p.h <= plat.y + 24) {
               this.p.y = plat.y - this.p.h;
               this.p.vy = 0;
               this.p.grounded = true;
               this.p.jumps = 0; 
           }
       }

       // 5. MOVE WORLD LEFT
       this.platforms.forEach(plat => plat.x -= this.speed);
       this.coins.forEach(c => c.x -= this.speed);
       this.hazards.forEach(h => h.x -= this.speed);

       // 6. CLEANUP & SPAWNING
       if (this.platforms[0].x + this.platforms[0].w < -100) this.platforms.shift();
       if (this.platforms[this.platforms.length - 1].x < 960) this.spawnPlatform();

       // 7. COIN COLLECTION & MAGNET
       for(let i=this.coins.length-1; i>=0; i--) {
           let c = this.coins[i];
           let pcx = this.p.x + this.p.w/2; let pcy = this.p.y + this.p.h/2;
           
           // Magnet Pull
           if (this.magnetTimer > 0) {
               let dx = pcx - c.x; let dy = pcy - c.y;
               let dist = Math.hypot(dx, dy);
               if (dist < 400) { c.x += (dx/dist)*12; c.y += (dy/dist)*12; }
           }

           let dist = Math.hypot(pcx - c.x, pcy - c.y);
           if (!c.collected && dist < 50) {
               c.collected = true;
               if (c.type === 2) {
                   // Blue Candy = Sugar Rush Magnet!
                   this.magnetTimer = 600; // 10 seconds
                   rawScore += 500;
                   playSound('win');
                   this.popups.push({ x: c.x, y: c.y, txt: 'SUGAR RUSH!', a: 1, vy: -1.5, c: '#00E5FF' });
               } else {
                   rawScore += 100;
                   playSound('pb');
                   this.popups.push({ x: c.x, y: c.y, txt: '+100', a: 1, vy: -1, c: '#FFD700' });
               }
               
               if (particlesEnabled) {
                   for(let p=0; p<8; p++) this.particles.push({x: c.x, y: c.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: c.type===2 ? '#00E5FF' : '#FFD700'});
               }
           }
           if (c.x < -50 || c.collected) this.coins.splice(i, 1);
       }

       // 8. HAZARD COLLISION (Peppermint Spikes)
       for(let i=0; i<this.hazards.length; i++) {
           let h = this.hazards[i];
           // Forgiving Hitbox: Player must be deeply inside the spike
           if (this.p.x + this.p.w - 15 > h.x && this.p.x + 15 < h.x + h.w &&
               this.p.y + this.p.h > h.y + 10 && this.p.y + 10 < h.y + h.h) {
               this.state = 'dead';
               playSound('crash');
               if(particlesEnabled) for(let p=0; p<30; p++) this.particles.push({x: this.p.x + 30, y: this.p.y + 40, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.5, c: '#FF3B30'});
               if (navigator.vibrate) navigator.vibrate([100,50,100]);
               setTimeout(() => triggerGameOver('Impaled on Peppermint!'), 1000);
           }
           if (h.x < -50) this.hazards.splice(i, 1);
       }

       // 9. FALL DEATH
       if (this.p.y > 640) {
           this.state = 'dead';
           playSound('crash');
           if (navigator.vibrate) navigator.vibrate([100,50,100]);
           setTimeout(() => triggerGameOver('Fell into the frosting!'), 1000);
       }

       // 10. CLEANUP EFFECTS
       this.particles.forEach((pt, i) => { pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.05; if(pt.life <= 0) this.particles.splice(i, 1); });
       this.popups.forEach(p => { p.y += p.vy; p.a -= 0.02; });
       this.popups = this.popups.filter(p => p.a > 0);
    },

    drawSprite: function(img, x, y, w, h) {
        if (!img || !img.complete || img.naturalWidth === 0 || img.src.includes('PASTE_')) {
            ctx.fillStyle = this.magnetTimer > 0 ? '#00E5FF' : '#FF9AA2'; 
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
            return;
        }

        let cols = 9; let rows = 3;
        let spriteW = img.naturalWidth / cols; let spriteH = img.naturalHeight / rows;
        let sx = 0, sy = 0;

        if (this.state === 'menu') {
            sy = 0; sx = 0; y += Math.sin(Date.now() * 0.005) * 5;
        } else if (!this.p.grounded) {
            sy = spriteH; sx = spriteW * 1;
        } else {
            sy = 0;
            // Run animation speeds up based on game speed!
            let runFrame = Math.floor(this.fc / (20 / this.speed)) % 3;
            sx = spriteW * (runFrame + 2);
        }

        // Magnet Aura Glow around player
        if (this.magnetTimer > 0 && this.state !== 'menu') {
            ctx.shadowBlur = 20; ctx.shadowColor = '#00E5FF';
            ctx.fillStyle = `rgba(0, 229, 255, ${Math.abs(Math.sin(this.fc * 0.2)) * 0.4})`;
            ctx.beginPath(); ctx.arc(x + w/2, y + h/2, 50, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.drawImage(img, sx, sy, spriteW, spriteH, x - 10, y - 10, w + 20, h + 10);
    },

    draw: function() {
       var W = 960, H = 640;
       
       // 1. Dynamic Sky (Day to Night Cycle)
       var skyHue = this.dayCycle % 360;
       var bg = ctx.createLinearGradient(0,0,0,H);
       bg.addColorStop(0, `hsl(${skyHue}, 60%, 75%)`); 
       bg.addColorStop(1, `hsl(${skyHue + 20}, 70%, 85%)`);
       ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

       // 2. Parallax Clouds
       ctx.fillStyle = 'rgba(255,255,255,0.4)';
       for(let i=0; i<4; i++) {
           let cx = ((i * 300) - this.bgOffset) % 1200;
           if (cx < -100) cx += 1200;
           ctx.beginPath(); ctx.arc(cx, 150 + (i%2*50), 40, 0, Math.PI*2); 
           ctx.arc(cx+40, 140 + (i%2*50), 50, 0, Math.PI*2);
           ctx.arc(cx+80, 150 + (i%2*50), 40, 0, Math.PI*2); ctx.fill();
       }

       // 3. Platforms
       let envImg = this.images['env'];
       let hasEnv = (envImg && envImg.complete && envImg.naturalWidth > 0 && !envImg.src.includes('PASTE_'));

       this.platforms.forEach(plat => {
           if (hasEnv) {
               const TILE = 70; 
               for (let tx = plat.x; tx < plat.x + plat.w; tx += TILE) {
                   let drawW = Math.min(TILE, plat.x + plat.w - tx);
                   let srcW = (drawW / TILE) * TILE; 
                   ctx.drawImage(envImg, 70, 0, srcW, TILE, tx, plat.y, drawW, TILE);
                   for(let ty = plat.y + TILE; ty < plat.y + plat.h; ty += TILE) {
                       let drawH = Math.min(TILE, plat.y + plat.h - ty);
                       let srcH = (drawH / TILE) * TILE;
                       ctx.drawImage(envImg, 70, 70, srcW, srcH, tx, ty, drawW, drawH);
                   }
               }
           } else {
               ctx.fillStyle = '#CBA87C'; ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
               ctx.fillStyle = '#FFD1DC'; ctx.fillRect(plat.x, plat.y, plat.w, 15);
           }
       });

       // 4. Hazards (Peppermint Spikes)
       this.hazards.forEach(h => {
           ctx.shadowBlur = 15; ctx.shadowColor = '#FF3B30';
           ctx.fillStyle = '#FFF';
           ctx.beginPath(); ctx.moveTo(h.x + h.w/2, h.y); ctx.lineTo(h.x + h.w, h.y + h.h); ctx.lineTo(h.x, h.y + h.h); ctx.fill();
           ctx.fillStyle = '#FF3B30'; // Red stripes
           ctx.beginPath(); ctx.moveTo(h.x + h.w/2, h.y + 10); ctx.lineTo(h.x + h.w - 5, h.y + h.h); ctx.lineTo(h.x + 5, h.y + h.h); ctx.fill();
           ctx.shadowBlur = 0;
       });

       // 5. Candies
       this.coins.forEach(c => {
           ctx.shadowBlur = 10; ctx.shadowColor = c.type === 2 ? '#00E5FF' : '#FFF';
           let pulse = Math.sin(this.fc * 0.1) * 5;
           
           if (hasEnv && c.type !== 2) {
               let candySrc = [ {x: 490, y: 70}, {x: 560, y: 70} ]; // Yellow & Green
               let src = candySrc[c.type] || candySrc[0];
               ctx.drawImage(envImg, src.x, src.y, 70, 70, c.x - 20, c.y - 20 + pulse, 40, 40);
           } else {
               // Draw the Rare Blue Magnet Candy manually if spritesheet fails or it's type 2
               ctx.fillStyle = c.type === 2 ? '#00E5FF' : '#FFD700';
               ctx.beginPath(); ctx.arc(c.x, c.y + pulse, c.type === 2 ? 18 : 15, 0, Math.PI*2); ctx.fill();
               ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(c.x - 5, c.y + pulse - 5, 4, 0, Math.PI*2); ctx.fill();
           }
           ctx.shadowBlur = 0;
       });

       // 6. Particles & Popups
       this.particles.forEach(pt => {
           ctx.globalAlpha = Math.max(0, pt.life);
           ctx.fillStyle = pt.c;
           ctx.shadowBlur = 10; ctx.shadowColor = pt.c;
           ctx.beginPath(); ctx.arc(pt.x, pt.y, 4 + pt.life*3, 0, Math.PI*2); ctx.fill();
           ctx.shadowBlur = 0;
       });
       this.popups.forEach(p => {
           ctx.globalAlpha = Math.max(0, p.a);
           ctx.fillStyle = p.c;
           ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.6)';
           ctx.font = 'bold 24px "Google Sans"'; ctx.textAlign = 'center';
           ctx.fillText(p.txt, p.x, p.y);
           ctx.shadowBlur = 0;
       });
       ctx.globalAlpha = 1.0;

       // 7. Player
       if (this.state !== 'dead') {
           let activeHeroImg = this.images['char_' + this.selectedChar];
           this.drawSprite(activeHeroImg, this.p.x, this.p.y, this.p.w, this.p.h);
       }

       // 8. Menus
       if (this.state === 'menu') {
           ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
           
           ctx.fillStyle = '#FFF'; ctx.textAlign = 'center';
           ctx.font = 'bold 48px "Google Sans Display"';
           ctx.fillText('CANDY RUN', W/2, H/2 - 100);
           
           ctx.font = 'bold 24px "Google Sans"'; ctx.fillStyle = '#FFD700';
           ctx.fillText('CHOOSE YOUR HERO', W/2, H/2 - 30);
           
           ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.roundRect(W/2 - 60, H/2 + 20, 120, 120, 16); ctx.fill();
           let activeHeroImg = this.images['char_' + this.selectedChar];
           this.drawSprite(activeHeroImg, W/2 - 40, H/2 + 30, 80, 100);
           
           ctx.fillStyle = '#FFF'; ctx.font = 'bold 18px "Google Sans"';
           ctx.fillText(this.charNames[this.selectedChar], W/2, H/2 + 170);

           ctx.font = 'bold 40px Arial';
           ctx.fillText('◀', W/2 - 100, H/2 + 90);
           ctx.fillText('▶', W/2 + 100, H/2 + 90);
           
           let pulse = Math.sin(Date.now() * 0.005) * 0.5 + 0.5;
           ctx.fillStyle = `rgba(52, 199, 89, ${0.5 + pulse*0.5})`;
           ctx.beginPath(); ctx.roundRect(W/2 - 100, H/2 + 200, 200, 50, 25); ctx.fill();
           ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px "Google Sans"';
           ctx.fillText('CLICK TO RUN!', W/2, H/2 + 233);
       }
    }
  },

    useHint: function() {

       }

    guess: function(letter) {
       if (this.state !== 'playing') return;
       if (this.guessed.includes(letter)) return;
       
       this.guessed.push(letter);
       
       if (this.targetWord.includes(letter)) {
           playSound('coin');
           rawScore += 50;
           
           let won = true;
           for(let i=0; i<this.targetWord.length; i++) {
              if (this.targetWord[i] !== ' ' && !this.guessed.includes(this.targetWord[i])) won = false;
           }
           if (won) {
              this.state = 'stage_clear';
              playSound('win');
              rawScore += 500;
              for(let i=0; i<30; i++) this.particles.push({ x: 150, y: this.avatarY, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, c: '#FFD700', r: Math.random()*4+2 });
           }

           playSound('pb');
           this.wrongs++;

              let b = unpopped[Math.floor(Math.random() * unpopped.length)];

          if (mx > 330 && mx < 630 && my > 250 && my < 310) { playSound('jump'); this.startGame('Easy'); }
          if (mx > 330 && mx < 630 && my > 340 && my < 400) { playSound('jump'); this.startGame('Medium'); }
          if (mx > 330 && mx < 630 && my > 430 && my < 490) { playSound('jump'); this.startGame('Hard'); }
          return;
       }

       if (this.state === 'stage_clear') {
          this.stage++;
          if (this.stage >= 10) {
             this.state = 'won';
             // 2. UNUSED HINT BONUS INTEGRATED
             let hintBonus = this.hints * 1500; 
             rawScore += 5000 + hintBonus;
             playSound('win');
             setTimeout(() => triggerGameOver(`You won! 🎉 (+${hintBonus} Hint Bonus)`), 1500);
          } else {
             this.loadStage();
          }
          return;
       }

       if (this.state === 'playing') {
          if (mx > 800 && mx < 940 && my > 20 && my < 60) this.useHint();

          this.keyBoxes.forEach(kb => {
             if (mx >= kb.x && mx <= kb.x + kb.w && my >= kb.y && my <= kb.y + kb.h) {

                this.guess(kb.l);
             }
          });

          }
       } else if (this.state === 'stage_clear') {
          if (k === 'Enter' || k === ' ') {
             this.stage++;
             if (this.stage >= 10) {
                this.state = 'won';
                // 2. UNUSED HINT BONUS INTEGRATED

    drawKawaiiFace: function(cx, cy, w, h, style) {
       ctx.save();
       ctx.translate(cx, cy);
       
       // Made the face much smaller and tucked at the bottom
       let eyeOff = w * 0.12; 
       let eyeSize = Math.max(1.5, w * 0.035);
       let faceY = h * 0.32; // Pushed down to the bottom
       
       // Blush (Softer and smaller)
       ctx.fillStyle = 'rgba(255, 100, 100, 0.25)';
       ctx.beginPath(); ctx.arc(-eyeOff * 1.5, faceY + eyeSize, eyeSize * 1.5, 0, Math.PI*2); ctx.fill();
       ctx.beginPath(); ctx.arc(eyeOff * 1.5, faceY + eyeSize, eyeSize * 1.5, 0, Math.PI*2); ctx.fill();

       // Eyes & Mouth (Softer brown, thinner lines)
       ctx.strokeStyle = 'rgba(74, 59, 50, 0.6)'; 
       ctx.fillStyle = 'rgba(74, 59, 50, 0.6)';
       ctx.lineWidth = Math.max(1, w * 0.025);
       ctx.lineCap = 'round'; ctx.lineJoin = 'round';

       ctx.beginPath(); ctx.arc(-eyeOff, faceY, eyeSize, 0, Math.PI*2); ctx.fill();
       ctx.beginPath(); ctx.arc(eyeOff, faceY, eyeSize, 0, Math.PI*2); ctx.fill();
       
       ctx.beginPath();
       if (style === 0) { // 'w' mouth
           ctx.moveTo(-eyeOff * 0.4, faceY + eyeSize*0.5);
           ctx.quadraticCurveTo(-eyeOff * 0.2, faceY + eyeSize*2, 0, faceY + eyeSize);
           ctx.quadraticCurveTo(eyeOff * 0.2, faceY + eyeSize*2, eyeOff * 0.4, faceY + eyeSize*0.5);
       } else if (style === 1) { // 'o' mouth
           ctx.arc(0, faceY + eyeSize*1.5, eyeSize * 0.6, 0, Math.PI*2);
       } else { // 'u' smile
           ctx.moveTo(-eyeOff * 0.4, faceY + eyeSize);
           ctx.quadraticCurveTo(0, faceY + eyeSize*2.5, eyeOff * 0.4, faceY + eyeSize);
       }
       ctx.stroke();
       ctx.restore();
    },

    draw: function() {
      var W = 960, H = 640;
      
      var bg = ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0, '#FFE8D6'); 
      bg.addColorStop(0.6, '#FFD3B6');
      bg.addColorStop(0.6, '#E4C59E'); 
      bg.addColorStop(1, '#CBA87C');
      ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

      var boardSize = 460; var gap = 12; 
      var bw = (boardSize - gap*(this.size+1)) / this.size; var bh = bw;
      var offX = Math.floor((W-boardSize)/2); var offY = Math.floor((H-boardSize)/2) + 20; 
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
      ctx.beginPath(); ctx.roundRect(offX, offY, boardSize, boardSize, 24); ctx.fill();
      ctx.strokeStyle = '#D9B48F'; ctx.lineWidth = 10; ctx.stroke();

      ctx.fillStyle = '#4A3B32'; ctx.font = 'bold 20px "Google Sans"'; ctx.textBaseline='middle'; 
      var comboText = this.combo > 1 ? this.combo + 'x COMBO! 🔥' : '';
      ctx.textAlign='left'; ctx.fillText(comboText, offX, offY - 25); 
      ctx.textAlign='right'; ctx.fillText('Max: ' + this.maxCombo + 'x', offX + boardSize, offY - 25);
      
      ctx.textAlign='center';
      
      for(var r=0; r<this.size; r++){ 
         for(var c=0; c<this.size; c++){ 
            var val = this.grid[r][c]; 
            var x = offX + gap + c*(bw+gap);
            var y = offY + gap + r*(bh+gap); 
            
            if(val === 0) {
               ctx.fillStyle = 'rgba(255,255,255,0.3)';
               ctx.beginPath(); ctx.roundRect(x, y, bw, bh, 16); ctx.fill();
            } else {
               ctx.fillStyle = this.colors[val] || '#FFB7B2';
               if(val >= 2048 && particlesEnabled) { ctx.shadowColor = '#FFF'; ctx.shadowBlur = 15; } 
               ctx.beginPath(); ctx.roundRect(x, y, bw, bh, 16); ctx.fill();
               ctx.shadowBlur = 0; 
               
               // Better glossy highlight
               ctx.save();
               ctx.beginPath(); ctx.roundRect(x, y, bw, bh, 16); ctx.clip();
               ctx.fillStyle = 'rgba(255,255,255,0.5)';
               ctx.beginPath(); ctx.ellipse(x + bw/2, y + bh*0.15, bw*0.4, bh*0.15, 0, 0, Math.PI*2); ctx.fill();
               ctx.restore();

               // Tiny Kawaii Face at the bottom
               let faceStyle = (Math.log2(val)) % 3;
               this.drawKawaiiFace(x + bw/2, y + bh/2, bw, bh, faceStyle);

               // Big, bold number dead-center
               ctx.fillStyle = '#4A3B32'; 
               var fontSize = bw * 0.45;
               if(val >= 100) fontSize = bw * 0.35; 
               if(val >= 1000) fontSize = bw * 0.28;
               if(val >= 10000) fontSize = bw * 0.22; 
               ctx.font = '900 ' + fontSize + 'px "Google Sans"';
               ctx.fillText(val, x+bw/2, y+bh/2 - bh*0.05); 
            } 
         } 
      }
      
      this.particles.forEach(p => {
         ctx.save();
         ctx.translate(p.x, p.y);
         ctx.rotate(p.rot);
         ctx.globalAlpha = Math.max(0, p.life);
         ctx.font = '28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
         ctx.fillText(p.e, 0, 0);
         ctx.restore();
      });
      ctx.globalAlpha = 1.0;

      ctx.textAlign='center'; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.font='bold 14px Roboto';
      ctx.fillText('Arrow keys to slide. Press U to Undo.', W/2, H-15); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    }

    getBFSPath: function(startCol, startRow, targetCol, targetRow) {

         ctx.shadowBlur = 15; ctx.shadowColor = '#34C759';
         ctx.fillStyle = '#111'; ctx.strokeStyle = '#34C759'; ctx.lineWidth = 2;
         ctx.beginPath(); ctx.roundRect(cr.x - 12, cr.y - 12 + floatY, 24, 24, 4); ctx.fill(); ctx.stroke();
         ctx.fillStyle = '#34C759'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText('✚', cr.x, cr.y + 6 + floatY);
         ctx.shadowBlur = 0;
      });

      // Draw Files
      this.files.forEach(f => {
         if(!f.collected) {
            let floatY = Math.sin(f.hover) * 5;
            ctx.shadowBlur = 15; ctx.shadowColor = '#00E5FF';
            ctx.fillStyle = '#00E5FF';
            ctx.beginPath(); ctx.roundRect(f.x - 10, f.y - 8 + floatY, 20, 16, 4); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.fillRect(f.x - 6, f.y - 4 + floatY, 12, 3);
            ctx.shadowBlur = 0;
         }
      });

      this.bullets.forEach(b => {
         ctx.shadowBlur = 15; ctx.shadowColor = '#00E5FF'; ctx.fillStyle = '#FFF';
         ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
         ctx.shadowBlur = 0;
      });

      this.particles.forEach(p => {
         ctx.globalAlpha = Math.max(0, p.life);
         ctx.shadowBlur = 10; ctx.shadowColor = p.c; ctx.fillStyle = p.c;
         ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

          let glowColor = isStunned ? '#00E5FF' : '#FF003C';
          this.drawAvatar(ctx, this.enemyImgs[st.imgIdx] || null, st.x, st.y, st.radius, glowColor);
          
          if(!isStunned) {
              ctx.strokeStyle = '#FF003C'; ctx.lineWidth = 2;

                 let ang = (Math.PI*2/6) * i + (this.fc*0.1);

                 ctx.beginPath(); 
                 ctx.moveTo(st.x, st.y);
                 ctx.lineTo(st.x + Math.cos(ang)*(st.radius + jag), st.y + Math.sin(ang)*(st.radius + jag));

              }
          }
      });

      // Draw Player
      ctx.save();
      ctx.translate(this.p.x, this.p.y);
      ctx.rotate(this.p.rot);
      
      // Flashlight/Gun barrel
      ctx.fillStyle = '#333'; ctx.fillRect(10, 4, 22, 6); 
      ctx.fillStyle = '#00E5FF'; ctx.fillRect(10, -8, 26, 4); 
      ctx.restore(); 

      // Draw actual avatar face without rotation
      this.drawAvatar(ctx, this.playerImg, this.p.x, this.p.y, this.p.radius, '#1A73E8');

      ctx.restore(); // Restore world camera translation

      // --- TRUE LINE-OF-SIGHT RAYCASTING ---
      let sprintActive = keys['Shift'];
      let coneAngle = sprintActive ? Math.PI / 3.5 : Math.PI / 2.0; 
      let lightDist = this.flashlight ? 700 : 0; 
      
      let lCtx = this.lightCtx;
      
      lCtx.globalCompositeOperation = 'source-over';
      lCtx.fillStyle = '#010103'; // Pitch Black overlay
      lCtx.fillRect(0, 0, W, H);
      
      lCtx.globalCompositeOperation = 'destination-out';
      
      if (this.flashlight) {
         let rayCount = 180; 
         let points = [{x: W/2, y: H/2}]; 
         let startAngle = this.p.rot - coneAngle/2;
         
         for(let i=0; i<=rayCount; i++) {
            let angle = startAngle + (i/rayCount) * coneAngle;
            let dx = Math.cos(angle); let dy = Math.sin(angle);
            let dist = 0; let hit = false;
            
            while(!hit && dist < lightDist) {
               dist += 4; 
               let cx = Math.floor((this.p.x + dx*dist)/ts);
               let cy = Math.floor((this.p.y + dy*dist)/ts);
               if (this.map[cy] && this.map[cy][cx] === 1) hit = true;
            }
            points.push({x: W/2 + dx*dist, y: H/2 + dy*dist});
         }
         
         lCtx.beginPath();
         lCtx.moveTo(points[0].x, points[0].y);
         for(let i=1; i<points.length; i++) lCtx.lineTo(points[i].x, points[i].y);
         lCtx.closePath();

         let coneGrad = lCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, lightDist);
         coneGrad.addColorStop(0, 'rgba(255,255,255,1)');
         coneGrad.addColorStop(0.8, 'rgba(255,255,255,0.7)');
         coneGrad.addColorStop(1, 'rgba(255,255,255,0)');
         
         lCtx.fillStyle = coneGrad;
         lCtx.fill();
      }

      // Very dim self-glow so you aren't completely blind with the flashlight off
      let ambientGrad = lCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 18);
      ambientGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
      ambientGrad.addColorStop(1, 'rgba(255,255,255,0)');
      lCtx.fillStyle = ambientGrad;
      lCtx.beginPath(); lCtx.arc(W/2, H/2, 18, 0, Math.PI*2); lCtx.fill();

      // PHOSPHORESCENT FILES: Soft glow cuts through the darkness
      this.files.forEach(f => {
         if (!f.collected) {
            let screenX = W/2 - this.p.x + f.x;
            let screenY = H/2 - this.p.y + f.y;
            
            if (screenX > -50 && screenX < W+50 && screenY > -50 && screenY < H+50) {
               let fileGrad = lCtx.createRadialGradient(screenX, screenY, 0, screenX, screenY, 45);
               fileGrad.addColorStop(0, 'rgba(0, 229, 255, 0.4)');
               fileGrad.addColorStop(1, 'rgba(0, 229, 255, 0)');
               lCtx.fillStyle = fileGrad;
               lCtx.beginPath(); lCtx.arc(screenX, screenY, 45, 0, Math.PI*2); lCtx.fill();
            }
         }
      });
      
      // Paint the darkness overlay over the bright game world
      ctx.drawImage(this.lightCanvas, 0, 0);

      // --- UI LAYER ---
      
      // Extraction Phase Red Sirens
      if (this.extractionPhase) {
         ctx.fillStyle = `rgba(255, 0, 0, ${0.15 + Math.sin(this.fc * 0.1) * 0.15})`;
         ctx.fillRect(0,0,W,H);
      }

      // Heartbeat Glitch
      let minStalkerDist = 9999;
      this.stalkers.forEach(st => {
         if (st.stunTimer <= 0) {
            let d = Math.hypot(this.p.x - st.x, this.p.y - st.y);
            if (d < minStalkerDist) minStalkerDist = d;
         }
      });

      if(minStalkerDist < 300) {
         let intensity = (300 - minStalkerDist) / 300;
         let pulse = (Math.sin(this.fc * 0.1) + 1) / 2;
         let alpha = intensity * pulse * 0.25; 
         let redGrd = ctx.createRadialGradient(W/2, H/2, H/4, W/2, H/2, W/1.5);
         redGrd.addColorStop(0, 'rgba(255,0,0,0)');
         redGrd.addColorStop(1, `rgba(200,0,20,${alpha})`);
         ctx.fillStyle = redGrd; ctx.fillRect(0,0,W,H);
      }

      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 22px "Google Sans"'; ctx.textAlign = 'left';
      let collected = this.files.filter(f=>f.collected).length;
      ctx.fillText(this.extractionPhase ? `RETURN TO EXTRACTION ZONE!` : `FILES SECURED: ${collected} / 8`, 35, 45);
      
      ctx.fillStyle = this.flashlight ? '#34C759' : '#888';
      ctx.font = 'bold 16px "Google Sans"';
      ctx.fillText(`FLASHLIGHT [F] ${this.flashlight ? 'ON' : 'OFF (STEALTH)'}`, 35, 75);

      ctx.fillStyle = this.ammo > 0 ? '#00E5FF' : '#FF3B30';
      ctx.fillText(`TRANQ DARTS: ${this.ammo} / 6`, 35, 100);

      let maxStunTimer = 0;
      this.stalkers.forEach(st => { if (st.stunTimer > maxStunTimer) maxStunTimer = st.stunTimer; });
      if (maxStunTimer > 0) {
         ctx.fillStyle = '#00E5FF';
         ctx.textAlign = 'center';
         ctx.font = 'bold 28px "Google Sans"';
         ctx.fillText(`STUN ACTIVE: ${Math.ceil(maxStunTimer / 60)}s`, W/2, 50);
      }

      if (isPaused) {
         ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
         ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.font = 'bold 36px "Google Sans"';
         ctx.fillText('PAUSED', W/2, H/2);
      }
    }

  'Cosmic Merge': {

    click: function(x, y) {
      if(this.cooldown <= 0 && !this.over) {
         let r = this.tiers[this.currentDrop].r;
         let dropX = Math.max(this.boxX + r + 5, Math.min(this.boxX + this.boxW - r - 5, x));
         
         this.planets.push({
            x: dropX, y: 70, oldX: dropX, oldY: 70,

         });
         
         playSound('jump');
         this.currentDrop = this.nextDrop;
         this.nextDrop = Math.floor(Math.random() * 4);
         this.cooldown = 25;

      }

    update: function() {
      if(this.over) return;
      this.fc++;
      if(this.cooldown > 0) this.cooldown--;

      let mergesThisFrame = [];
      let subSteps = 10;
      let dt = 1 / subSteps;
      let gravity = 0.6; 

      for(let step = 0; step < subSteps; step++) {
         this.planets.forEach(p => {
            if(!p.merged) {
               let vx = (p.x - p.oldX) * 0.98; 
               let vy = (p.y - p.oldY) * 0.98;
               p.oldX = p.x; p.oldY = p.y;
               p.x += vx; 
               p.y += vy + (gravity * dt); 
               p.rot += (vx * 0.05);
            }
         });

         this.planets.forEach(p => {
            if(p.merged) return;
            let r = this.tiers[p.tier].r;
            
            if(p.y > this.boxY + this.boxH - r - 5) { 
               p.y = this.boxY + this.boxH - r - 5; 
               p.oldY = p.y + (p.oldY - p.y) * 0.3; 
               p.oldX = p.x + (p.oldX - p.x) * 0.7; 
            }
            if(p.x < this.boxX + r + 5) { 
               p.x = this.boxX + r + 5; p.oldX = p.x + (p.oldX - p.x) * 0.5; 
            }
            if(p.x > this.boxX + this.boxW - r - 5) { 
               p.x = this.boxX + this.boxW - r - 5; p.oldX = p.x + (p.oldX - p.x) * 0.5; 
            }
         });

         for(let i = 0; i < this.planets.length; i++) {
            for(let j = i + 1; j < this.planets.length; j++) {
               let p1 = this.planets[i], p2 = this.planets[j];
               if(p1.merged || p2.merged) continue;

               let dx = p1.x - p2.x; let dy = p1.y - p2.y;
               let dist = Math.hypot(dx, dy);
               let r1 = this.tiers[p1.tier].r, r2 = this.tiers[p2.tier].r;
               let minDist = r1 + r2;
               
               if(dist < minDist) {
                  if(p1.tier === p2.tier && p1.tier < 10) {
                     p1.merged = true; p2.merged = true;
                     mergesThisFrame.push({ x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2, tier: p1.tier + 1 });
                  } else {
                     let overlap = minDist - dist;
                     let nx = dx / dist, ny = dy / dist;
                     let m1 = r1 * r1, m2 = r2 * r2; 
                     let totalM = m1 + m2;
                     let ratio1 = m2 / totalM, ratio2 = m1 / totalM;
                     
                     p1.x += nx * overlap * ratio1; p1.y += ny * overlap * ratio1;
                     p2.x -= nx * overlap * ratio2; p2.y -= ny * overlap * ratio2;
                  }
               }
            }
         }
      }

      mergesThisFrame.forEach(m => {
         playSound('pb');
         rawScore += this.tiers[m.tier].pts;
         // Set mergeTimer to 45 so it makes an excited face for 45 frames
         this.planets.push({ x: m.x, y: m.y, oldX: m.x, oldY: m.y - 2, tier: m.tier, merged: false, age: 0, rot: 0, mergeTimer: 45 });
         
         if(particlesEnabled) {
            let emojis = ['✨', '⭐', '💖', '✨'];
            for(let i=0; i<8; i++) {
               let angle = Math.random() * Math.PI * 2;
               let speed = Math.random() * 4 + 2;
               this.particles.push({ 
                  x: m.x, y: m.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, 
                  life: 1.0, e: emojis[Math.floor(Math.random()*emojis.length)], rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.2
               });
            }
         }
      });

      this.planets = this.planets.filter(p => !p.merged);
      
      this.particles.forEach((p, i) => {
         p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.rot += p.rotV; p.life -= 0.02;
         if(p.life <= 0) this.particles.splice(i, 1);
      });

      this.planets.forEach(p => {
         p.age = (p.age || 0) + 1;
         if (p.mergeTimer > 0) p.mergeTimer--;
      });

      this.planets.forEach(p => {
   let topEdge = p.y - this.tiers[p.tier].r;
   let isAboveLine = topEdge < this.redLineY;
   let isSettled = Math.abs(p.y - p.oldY) < 0.5 && Math.abs(p.x - p.oldX) < 0.5;

   if (isAboveLine && isSettled && p.age > 90) {
      p.dangerTimer = (p.dangerTimer || 0) + 1;
   } else {
      p.dangerTimer = 0;
   }
});

if(!this.over && this.planets.some(p => (p.dangerTimer || 0) >= 90)) {
   this.over = true;
   playSound('crash');
   triggerGameOver('Box Overflow!');
}

    drawKawaiiFace: function(cx, cy, r, style, rot, isExcited) {
       ctx.save();
       ctx.translate(cx, cy);
       ctx.rotate(rot);
       
       let eyeOff = r * 0.35;
       let eyeSize = Math.max(2, r * 0.12);
       
       // Blush
       ctx.fillStyle = 'rgba(255, 100, 100, 0.4)';
       ctx.beginPath(); ctx.arc(-eyeOff * 1.3, eyeOff * 0.2, eyeSize * 1.5, 0, Math.PI*2); ctx.fill();
       ctx.beginPath(); ctx.arc(eyeOff * 1.3, eyeOff * 0.2, eyeSize * 1.5, 0, Math.PI*2); ctx.fill();

       ctx.strokeStyle = '#4A3B32'; ctx.fillStyle = '#4A3B32';
       ctx.lineWidth = Math.max(1.5, r * 0.05);
       ctx.lineCap = 'round'; ctx.lineJoin = 'round';

       if (isExcited) {
           // > < excited eyes
           ctx.beginPath();
           ctx.moveTo(-eyeOff - eyeSize, -eyeOff*0.3); ctx.lineTo(-eyeOff, -eyeOff*0.1); ctx.lineTo(-eyeOff - eyeSize, eyeOff*0.1);
           ctx.moveTo(eyeOff + eyeSize, -eyeOff*0.3); ctx.lineTo(eyeOff, -eyeOff*0.1); ctx.lineTo(eyeOff + eyeSize, eyeOff*0.1);
           ctx.stroke();
           
           // Big open mouth 'D'
           ctx.beginPath();
           ctx.arc(0, eyeOff * 0.4, eyeSize, 0, Math.PI);
           ctx.closePath();
           ctx.fill();
       } else {
           // Normal Eyes
           ctx.beginPath(); ctx.arc(-eyeOff, -eyeOff * 0.1, eyeSize, 0, Math.PI*2); ctx.fill();
           ctx.beginPath(); ctx.arc(eyeOff, -eyeOff * 0.1, eyeSize, 0, Math.PI*2); ctx.fill();
           
           // Kawaii sparkle highlight
           ctx.fillStyle = '#FFF';
           ctx.beginPath(); ctx.arc(-eyeOff + eyeSize*0.3, -eyeOff * 0.1 - eyeSize*0.3, eyeSize*0.4, 0, Math.PI*2); ctx.fill();
           ctx.beginPath(); ctx.arc(eyeOff + eyeSize*0.3, -eyeOff * 0.1 - eyeSize*0.3, eyeSize*0.4, 0, Math.PI*2); ctx.fill();

           // Normal Mouth styles
           ctx.beginPath();
           if (style === 0) { // 'w' mouth
               ctx.moveTo(-eyeOff * 0.4, eyeOff * 0.3);
               ctx.quadraticCurveTo(-eyeOff * 0.2, eyeOff * 0.7, 0, eyeOff * 0.4);
               ctx.quadraticCurveTo(eyeOff * 0.2, eyeOff * 0.7, eyeOff * 0.4, eyeOff * 0.3);
           } else if (style === 1) { // 'o' mouth
               ctx.arc(0, eyeOff * 0.4, eyeSize * 0.8, 0, Math.PI*2);
           } else { // 'u' smile
               ctx.moveTo(-eyeOff * 0.4, eyeOff * 0.2);
               ctx.quadraticCurveTo(0, eyeOff * 0.8, eyeOff * 0.4, eyeOff * 0.2);
           }
           ctx.stroke();
       }
       ctx.restore();
    },

      ctx.lineTo(this.boxX, this.boxY + this.boxH); 
      ctx.lineTo(this.boxX + this.boxW, this.boxY + this.boxH);

      ctx.lineWidth = 4; ctx.setLineDash([15, 15]);

      ctx.fillStyle = '#A88D73'; ctx.font = 'bold 16px "Google Sans"'; ctx.textAlign = 'center';
      ctx.fillText('NEXT', this.boxX + this.boxW + 95, this.boxY + 28);
      
      let nextT = this.tiers[this.nextDrop];

      this.planets.forEach(p => {

            ctx.restore();
         }

         ctx.fillStyle = t.c;
         ctx.beginPath(); ctx.arc(p.x, p.y, drawR, 0, Math.PI*2); ctx.fill();
         
         ctx.save();

    updateMovesUI: function() {
      var mc = document.getElementById('moveCountEl');
      if(mc) mc.textContent = this.moves;
    },
    useHint: function() {
      if(this.hints <= 0 || this.currAns.every(c => c !== null)) return;
      playSound('coin');
      
      var targetWord = this.levels[this.levelIdx].w;
      var emptyIdx = this.currAns.findIndex(c => c === null);
      var targetChar = targetWord[emptyIdx];
      
      var poolChar = this.letters.find(l => !l.used && l.char === targetChar);
      if(poolChar) {
        this.addLetter(poolChar.id, true);
        this.hints--;
        var hBtn = document.getElementById('hintBtn');
        if(hBtn) {
          hBtn.textContent = '💡 HINT (' + this.hints + ')';
          if(this.hints === 0) {
             hBtn.style.opacity = '0.5';
             hBtn.style.filter = 'grayscale(1)';
          }
        }
      }
    },
    loadLevel: function() {
      if (this.levelIdx >= this.levels.length) {
         rawScore += 15000; playSound('win'); triggerGameOver('You beat all 35 puzzles! 🎉'); return;
      }
      var lvl = this.levels[this.levelIdx];
      
      var bonusMoves = activeDiff === 'Easy' ? 8 : (activeDiff === 'Medium' ? 5 : 2);
      this.moves = lvl.w.length + bonusMoves;
      this.updateMovesUI();

      this.currAns = Array(lvl.w.length).fill(null);
      
      var currentStage = Math.floor(this.levelIdx / 7) + 1;
      var levelInStage = (this.levelIdx % 7) + 1;
      
      document.getElementById('stageCounter').textContent = currentStage;
      document.getElementById('lvlCounter').textContent = levelInStage;

      for(let i=0; i<4; i++) { 
         let el = document.getElementById('emj'+i);
         el.textContent = lvl.e[i]; 
         el.style.animation = 'none'; 
         void el.offsetWidth; 
         el.style.animation = `popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) ${i*0.08}s both, floatBob ${3 + i*0.2}s ease-in-out infinite alternate ${i%2===0?'':'reverse'}`;
      }
      
      var pool = lvl.w.split('');
      var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      
      while(pool.length < 16) { pool.push(alphabet[Math.floor(Math.random() * alphabet.length)]); }
      this.letters = pool.sort(() => Math.random() - 0.5).map((l, i) => ({ char: l, id: i, used: false }));
      
      this.renderAns();
      this.renderPool();
    },
    renderAns: function() {
      var grid = document.getElementById('ansGrid');
      var html = '';
      this.currAns.forEach((char, i) => {
        if(char !== null) {
          html += `<div class="jewel-slot" onclick="Games['4 Emojis 1 Word'].removeLetter(${i})">${char.char}</div>`;
        } else {
          html += `<div class="jewel-slot-empty"></div>`;
        }
      });
      grid.innerHTML = html;
    },
    renderPool: function() {
      var pool = document.getElementById('letterPool');
      var html = '';
      this.letters.forEach((l) => {
        if(!l.used) {
          html += `<button class="candy-letter-btn" onclick="Games['4 Emojis 1 Word'].addLetter(${l.id}, false)">${l.char}</button>`;
        } else {
          html += `<div style="width:100%; height:clamp(36px, 10vw, 48px);"></div>`;
        }
      });
      pool.innerHTML = html;
    },
    addLetter: function(id, isHint) {
      if (this.moves <= 0 && !isHint) {
         playSound('crash'); showToast('Out of moves!'); return;
      }
      
      var emptyIdx = this.currAns.findIndex(c => c === null);
      if (emptyIdx !== -1) {
        playSound('jump');
        var letterObj = this.letters.find(l => l.id === id);
        letterObj.used = true;
